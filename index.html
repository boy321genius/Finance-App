  function renderDebtTab(g) {
    const balance   = Number(g.debtBalance  ?? g.currentAmount ?? 0);
    const origBal   = Number(g.debtOriginal ?? balance);
    const apr       = Number(g.debtApr      ?? 0);
    const minPmt    = Number(g.debtMinPmt   ?? 0);
    const yourPmt   = Number(g.debtYourPmt  ?? minPmt);
    const monthRate = apr / 100 / 12;

    function monthsTo(bal, rate, pmt) {
      if (pmt <= 0 || bal <= 0) return null;
      if (rate === 0) return Math.ceil(bal / pmt);
      if (pmt <= bal * rate) return null; // never pays off
      return Math.ceil(-Math.log(1 - (bal * rate) / pmt) / Math.log(1 + rate));
    }
    function payoffDate(months) {
      if (months === null) return "Never (payment too low)";
      const d = new Date(); d.setMonth(d.getMonth() + months);
      return d.toLocaleString(undefined, { month: "long", year: "numeric" });
    }
    function totalInt(bal, rate, pmt, months) {
      if (months === null || pmt <= 0) return null;
      return Math.max(0, pmt * months - bal);
    }
    // Balance after N months
    function balanceAfter(bal, rate, pmt, months) {
      if (rate === 0) return Math.max(0, bal - pmt * months);
      let b = bal;
      for (let i = 0; i < months; i++) {
        b = b * (1 + rate) - pmt;
        if (b <= 0) return 0;
      }
      return b;
    }

    const yourMonths  = monthsTo(balance, monthRate, yourPmt);
    const minMonths   = monthsTo(balance, monthRate, minPmt);
    const yourInt     = totalInt(balance, monthRate, yourPmt, yourMonths);
    const minInt      = totalInt(balance, monthRate, minPmt, minMonths);
    const intSaved    = (yourInt !== null && minInt !== null) ? Math.max(0, minInt - yourInt) : null;
    const mthsSaved   = (yourMonths !== null && minMonths !== null) ? Math.max(0, minMonths - yourMonths) : null;
    const paidOff     = Math.max(0, origBal - balance);
    const pct         = origBal > 0 ? Math.min((paidOff / origBal) * 100, 100) : 0;
    const barColor    = pct >= 80 ? "var(--color-success)" : pct >= 40 ? "var(--color-warning)" : "var(--color-danger)";
    const payingExtra = yourPmt > minPmt && minPmt > 0;

    // Amortization snapshot rows
    const snapYears = [1, 2, 3, 5];
    const snapRows = snapYears.map(y => {
      const mo  = y * 12;
      const bal = balanceAfter(balance, monthRate, yourPmt, mo);
      const done = bal <= 0;
      return `<div class="debt-amort-row">
        <span style="font-size:12px;color:var(--color-text-secondary);">After ${y} yr${y>1?"s":""}</span>
        <span style="font-size:13px;font-weight:700;color:${done?"var(--color-success)":"var(--color-text-primary)"};">${done?"✅ Paid off!":fmt(bal)}</span>
      </div>`;
    }).join("");

    return `
      <div class="card">
        <div class="card-header"><h2 class="card-title">⚙️ Your Numbers</h2></div>
        <div class="card-body">
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;">
            <div><label class="goal-field-label">Original Balance ($)</label><input class="goal-input" type="number" step="100" min="0" data-debt="debtOriginal" value="${origBal}" placeholder="0"></div>
            <div><label class="goal-field-label">Current Balance ($)</label><input class="goal-input" type="number" step="100" min="0" data-debt="debtBalance" value="${balance}" placeholder="0"></div>
            <div><label class="goal-field-label">Interest Rate (APR %)</label><input class="goal-input" type="number" step="0.01" min="0" data-debt="debtApr" value="${apr}" placeholder="0"></div>
            <div><label class="goal-field-label">Min Monthly Payment ($)</label><input class="goal-input" type="number" step="10" min="0" data-debt="debtMinPmt" value="${minPmt}" placeholder="0"></div>
            <div class="full"><label class="goal-field-label">Your Planned Payment ($)</label><input class="goal-input" type="number" step="10" min="0" data-debt="debtYourPmt" value="${yourPmt}" placeholder="0"></div>
          </div>
          <button class="btn" style="width:100%;padding:10px;font-size:14px;font-weight:700;" data-goal-action="save-debt" data-id="${g.id}">📊 Update</button>
        </div>
      </div>

      <div class="card">
        <div class="card-header"><h2 class="card-title">📊 Payoff Status</h2></div>
        <div class="card-body">
          <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:6px;">
            <span style="font-weight:700;color:var(--color-danger);">${fmt(balance)} remaining</span>
            <span style="color:var(--color-text-secondary);">${fmt(origBal)} original</span>
          </div>
          <div class="progress-bar-track" style="height:10px;margin-bottom:6px;">
            <div class="progress-bar-fill" style="width:${pct}%;background:${barColor};border-radius:5px;"></div>
          </div>
          <div style="display:flex;justify-content:space-between;font-size:11px;color:var(--color-text-secondary);">
            <span>${pct.toFixed(1)}% paid off</span>
            <span style="color:var(--color-success);">${fmt(paidOff)} paid</span>
          </div>
          <div class="stat-grid-2" style="margin-top:14px;">
            <div class="stat-tile"><div class="stat-tile-label">Current Balance</div><div class="stat-tile-value" style="font-size:18px;color:var(--color-danger);">${fmt(balance)}</div></div>
            <div class="stat-tile"><div class="stat-tile-label">Interest Rate</div><div class="stat-tile-value" style="font-size:18px;color:var(--color-warning);">${apr}%</div><div class="stat-tile-sub">APR</div></div>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="card-header"><h2 class="card-title">🗓️ Your Payoff Plan</h2></div>
        <div class="card-body">
          ${yourPmt <= 0 ? `<p style="font-size:12px;color:var(--color-text-secondary);margin:0;font-style:italic;">Enter your planned monthly payment above.</p>` : `
          <div class="stat-grid-2" style="margin-bottom:14px;">
            <div class="stat-tile"><div class="stat-tile-label">Debt-Free Date</div><div class="stat-tile-value" style="font-size:14px;color:var(--color-primary);line-height:1.2;">${payoffDate(yourMonths)}</div></div>
            <div class="stat-tile"><div class="stat-tile-label">Months to Go</div><div class="stat-tile-value" style="color:var(--color-primary);">${yourMonths !== null ? yourMonths : "—"}</div></div>
            <div class="stat-tile"><div class="stat-tile-label">Your Payment</div><div class="stat-tile-value" style="font-size:18px;">${fmt(yourPmt)}<span style="font-size:10px;color:var(--color-text-secondary);">/mo</span></div></div>
            <div class="stat-tile"><div class="stat-tile-label">Total Interest</div><div class="stat-tile-value" style="font-size:18px;color:var(--color-warning);">${yourInt !== null ? fmt(yourInt) : "—"}</div></div>
          </div>
          <div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--color-text-secondary);margin-bottom:6px;">Balance Over Time</div>
          ${snapRows}`}
        </div>
      </div>

      ${payingExtra ? `
      <div class="card">
        <div class="card-header"><h2 class="card-title">⚡ Extra Payment Impact</h2></div>
        <div class="card-body">
          <p style="font-size:11px;color:var(--color-text-secondary);margin:0 0 12px;line-height:1.5;">Paying <strong style="color:var(--color-success);">${fmt(yourPmt - minPmt)}/mo extra</strong> vs the minimum ${fmt(minPmt)} saves you:</p>
          <div class="debt-vs-row"><span style="font-size:20px;">⏰</span><div style="flex:1;"><div style="font-size:13px;font-weight:700;color:var(--color-success);">${mthsSaved !== null ? mthsSaved + " months faster" : "—"}</div><div style="font-size:11px;color:var(--color-text-secondary);">Paid off ${payoffDate(yourMonths)} vs ${payoffDate(minMonths)}</div></div></div>
          <div class="debt-vs-row"><span style="font-size:20px;">💰</span><div style="flex:1;"><div style="font-size:13px;font-weight:700;color:var(--color-success);">${intSaved !== null ? fmt(intSaved) + " less interest" : "—"}</div><div style="font-size:11px;color:var(--color-text-secondary);">${fmt(yourInt ?? 0)} total vs ${fmt(minInt ?? 0)} at minimum</div></div></div>
        </div>
      </div>` : ""}

      <div style="display:flex;justify-content:center;padding:4px 0 8px;">
        <button class="admin-btn admin-btn-danger" style="padding:6px 14px;" data-goal-action="delete" data-id="${g.id}">🗑️ Remove Goal</button>
      </div>`;
  }

  function renderInvestmentTab(g) {
    const current     = Number(g.currentAmount     ?? 0);
    const monthly     = Number(g.monthlyContribution ?? 0);
    const target      = Number(g.targetAmount      ?? 0);
    const years       = Number(g.investYears        ?? 10);
    const hasTarget   = target > 0;

    function fv(principal, mo, rate, yrs) {
      if (yrs <= 0) return principal;
      const r = rate / 100 / 12, n = yrs * 12;
      if (r === 0) return principal + mo * n;
      return principal * Math.pow(1+r, n) + mo * ((Math.pow(1+r, n) - 1) / r);
    }
    function fmtBig(n) {
      if (n >= 1e6) return "$" + (n/1e6).toFixed(2) + "M";
      if (n >= 1e3) return "$" + (n/1e3).toFixed(0) + "K";
      return "$" + Number(n).toFixed(0);
    }

    const RATES = [
      { label:"4%",  rate:4,  color:"var(--color-text-secondary)" },
      { label:"6%",  rate:6,  color:"var(--color-warning)"        },
      { label:"7%",  rate:7,  color:"var(--color-primary)"        },
      { label:"8%",  rate:8,  color:"var(--color-success)"        },
      { label:"10%", rate:10, color:"#fb923c"                     },
    ];

    const hero7 = fv(current, monthly, 7, years);
    const totalContrib = current + monthly * years * 12;
    const growth7 = Math.max(0, hero7 - totalContrib);

    // Build table years: smart set
    const rowYearSet = new Set([1, 2, 3, 5, 7]);
    [10, 15, 20, 25, 30].forEach(y => { if (y <= years + 5) rowYearSet.add(y); });
    rowYearSet.add(years);
    const rowYears = Array.from(rowYearSet).sort((a, b) => a - b);

    const tableRows = rowYears.map(y => {
      const isGoal = y === years;
      return `<tr${isGoal ? ' class="ret-row-retire"' : ''}>
        <td style="color:${isGoal?"var(--color-primary)":"var(--color-text-secondary)"};font-weight:${isGoal?"700":"400"};white-space:nowrap;">${isGoal?"🎯 ":""}${y} yr${y!==1?"s":""}</td>
        ${RATES.map(s => {
          const val = fv(current, monthly, s.rate, y);
          const hit = hasTarget && val >= target;
          return `<td style="text-align:right;font-weight:${isGoal?"800":"500"};color:${hit?"var(--color-success)":isGoal?s.color:"var(--color-text-primary)"};">${fmtBig(val)}${hit?" ✓":""}</td>`;
        }).join("")}
      </tr>`;
    }).join("");

    // When does each rate hit the target?
    const targetRows = hasTarget ? RATES.map(s => {
      if (current >= target) return `<div class="ret-income-row"><span style="font-size:13px;font-weight:700;color:${s.color};">${s.label}</span><span style="font-size:13px;font-weight:800;color:var(--color-success);">Already there ✅</span></div>`;
      let yrsNeeded = null;
      for (let y = 1; y <= 60; y++) { if (fv(current, monthly, s.rate, y) >= target) { yrsNeeded = y; break; } }
      return `<div class="ret-income-row">
        <span style="font-size:13px;font-weight:700;color:${s.color};">${s.label} return</span>
        <span style="font-size:13px;font-weight:800;color:${yrsNeeded !== null ? (yrsNeeded <= years ? "var(--color-success)" : "var(--color-warning)") : "var(--color-danger)"};">${yrsNeeded !== null ? yrsNeeded + " years" : "60+ years"}</span>
      </div>`;
    }).join("") : "";

    return `
      <div class="card">
        <div class="card-header"><h2 class="card-title">⚙️ Your Numbers</h2></div>
        <div class="card-body">
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;">
            <div><label class="goal-field-label">Current Amount ($)</label><input class="goal-input" type="number" step="500" min="0" data-inv="currentAmount" value="${current}" placeholder="0"></div>
            <div><label class="goal-field-label">Monthly Contribution ($)</label><input class="goal-input" type="number" step="50" min="0" data-inv="monthlyContribution" value="${monthly}" placeholder="0"></div>
            <div><label class="goal-field-label">Target Amount (optional $)</label><input class="goal-input" type="number" step="1000" min="0" data-inv="targetAmount" value="${target||""}" placeholder="Leave blank if open-ended"></div>
            <div><label class="goal-field-label">Time Horizon (years)</label><input class="goal-input" type="number" step="1" min="1" max="50" data-inv="investYears" value="${years}"></div>
          </div>
          <button class="btn" style="width:100%;padding:10px;font-size:14px;font-weight:700;" data-goal-action="save-investment" data-id="${g.id}">📊 Update Projections</button>
        </div>
      </div>

      <div class="card">
        <div class="card-header">
          <h2 class="card-title">📊 ${years}-Year Projection</h2>
          <span style="font-size:11px;font-weight:600;color:var(--color-primary);background:rgba(106,166,255,0.1);border:1px solid rgba(106,166,255,0.22);border-radius:6px;padding:3px 8px;">7% expected</span>
        </div>
        <div class="card-body">
          <div class="ret-snapshot-hero">
            <div class="ret-snapshot-label">Projected Value in ${years} Year${years!==1?"s":""}</div>
            <div class="ret-snapshot-value">${fmtBig(hero7)}</div>
            ${hasTarget ? `<div class="ret-snapshot-sub" style="color:${hero7>=target?"var(--color-success)":"var(--color-warning)"};">${hero7>=target?"✅ Exceeds":"⚠️ Short of"} your ${fmtBig(target)} target</div>` : ""}
          </div>
          <div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--color-text-secondary);margin-bottom:4px;display:flex;justify-content:space-between;">
            <span>Your Contributions</span><span>Market Growth</span>
          </div>
          <div class="ret-stacked-bar">
            <div class="ret-bar-contrib" style="width:${hero7>0?Math.max(3,(totalContrib/hero7)*100):50}%;"></div>
            <div class="ret-bar-growth"  style="width:${hero7>0?Math.max(3,(growth7/hero7)*100):50}%;"></div>
          </div>
          <div class="ret-bar-labels">
            <span style="color:var(--color-primary);">${fmtBig(totalContrib)}</span>
            <span style="color:var(--color-success);">${fmtBig(growth7)} growth</span>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="card-header"><h2 class="card-title">📈 Growth by Rate of Return</h2></div>
        <div class="card-body">
          <div style="overflow-x:auto;-webkit-overflow-scrolling:touch;">
            <table class="ret-table">
              <thead><tr>
                <th style="text-align:left;color:var(--color-text-secondary);"></th>
                ${RATES.map(s=>`<th style="text-align:right;color:${s.color};">${s.label}</th>`).join("")}
              </tr></thead>
              <tbody>${tableRows}</tbody>
            </table>
          </div>
          <p style="font-size:10px;color:var(--color-text-secondary);margin:10px 0 0;line-height:1.4;">Starting with ${fmtBig(current)}, adding ${fmt(monthly)}/mo. ${hasTarget?"✓ marks when target is hit. ":""}Returns compounded monthly.</p>
        </div>
      </div>

      ${hasTarget ? `
      <div class="card">
        <div class="card-header"><h2 class="card-title">🎯 Years to Hit ${fmtBig(target)}</h2></div>
        <div class="card-body">${targetRows}</div>
      </div>` : ""}

      <div style="display:flex;justify-content:center;padding:4px 0 8px;">
        <button class="admin-btn admin-btn-danger" style="padding:6px 14px;" data-goal-action="delete" data-id="${g.id}">🗑️ Remove Goal</button>
      </div>`;
  }

  function renderGenericTab(g) {
    const isEditing  = editingGoalId === g.id;
    const current    = Number(g.currentAmount || 0);
    const target     = Number(g.targetAmount  || 0);
    const pct        = target ? Math.min((current / target) * 100, 100) : 0;
    const color      = pct>=100?"var(--color-success)":pct>=80?"var(--color-warning)":"var(--color-primary)";
    const proj       = goalProjection(g);
    const remaining  = Math.max(0, target - current);

    // Date-locked: compute required monthly savings
    let dateLockHtml = "";
    if (g.targetDate) {
      const [ty, tm] = g.targetDate.split("-").map(Number);
      const now = new Date();
      const monthsLeft = Math.max(0, (ty - now.getFullYear()) * 12 + (tm - now.getMonth() - 1));
      const required = monthsLeft > 0 ? remaining / monthsLeft : remaining;
      const contrib  = Number(g.monthlyContribution || 0);
      const onTrack  = contrib >= required;
      dateLockHtml = `
        <div style="margin-top:12px;padding:12px 14px;border-radius:10px;background:${onTrack?"rgba(74,222,128,0.07)":"rgba(251,191,36,0.07)"};border:1px solid ${onTrack?"rgba(74,222,128,0.25)":"rgba(251,191,36,0.25)"};">
          <div style="font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;color:${onTrack?"var(--color-success)":"var(--color-warning)"};margin-bottom:4px;">📅 Date-Locked · ${g.targetDate}</div>
          <div style="display:flex;justify-content:space-between;align-items:center;gap:8px;">
            <div>
              <div style="font-size:12px;color:var(--color-text-secondary);">Required/mo to hit goal</div>
              <div style="font-size:18px;font-weight:800;color:${onTrack?"var(--color-success)":"var(--color-warning)"};">${fmt(required)}</div>
            </div>
            <div style="text-align:right;">
              <div style="font-size:12px;color:var(--color-text-secondary);">Your contribution</div>
              <div style="font-size:18px;font-weight:800;color:${onTrack?"var(--color-success)":"var(--color-primary)"};">${contrib > 0 ? fmt(contrib) : "—"}</div>
            </div>
          </div>
          ${!onTrack && contrib > 0 ? `<div style="font-size:11px;color:var(--color-warning);margin-top:6px;">⚠️ You need ${fmt(required - contrib)}/mo more to hit your target date</div>` : ""}
          <div style="font-size:10px;color:var(--color-text-secondary);margin-top:4px;">${monthsLeft} month${monthsLeft!==1?"s":""} remaining</div>
        </div>`;
    }
    return `
      <div class="card">
        <div class="card-header"><h2 class="card-title">${g.icon||"🎯"} Progress</h2></div>
        <div class="card-body">
          <div style="margin-bottom:14px;">
            <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:6px;"><span style="font-weight:700;color:${color};">${fmt(current)}</span><span style="color:var(--color-text-secondary);">${fmt(target)} goal</span></div>
            <div class="progress-bar-track" style="height:10px;"><div class="progress-bar-fill" style="width:${pct}%;background:${color};border-radius:5px;"></div></div>
            <div style="text-align:center;margin-top:8px;font-size:20px;font-weight:800;color:${color};">${pct.toFixed(1)}%</div>
          </div>
          <div class="goal-stats-grid">
            <div class="goal-stat-tile"><div class="goal-stat-label">Remaining</div><div class="goal-stat-value">${fmt(remaining)}</div></div>
            <div class="goal-stat-tile"><div class="goal-stat-label">Monthly Contribution</div><div class="goal-stat-value">${g.monthlyContribution?fmt(g.monthlyContribution):"—"}</div></div>
            <div class="goal-stat-tile"><div class="goal-stat-label">Projected Completion</div><div class="goal-stat-value" style="font-size:13px;line-height:1.2;">${proj.projectedDate}</div></div>
            <div class="goal-stat-tile"><div class="goal-stat-label">${g.targetDate?"Target Date":"Months to Goal"}</div><div class="goal-stat-value">${g.targetDate?g.targetDate:(proj.monthsLeft!==null?proj.monthsLeft:"—")}</div></div>
          </div>
          ${dateLockHtml}
          ${g.note?`<div class="goal-note" style="margin-top:12px;">${g.note}</div>`:""}
        </div>
      </div>
      ${isEditing?`
      <div class="card">
        <div class="card-header"><h2 class="card-title">✏️ Edit Goal</h2></div>
        <div class="card-body">
          <div class="goal-edit-grid">
            <div><label class="goal-field-label">Current Saved ($)</label><input class="goal-input" type="number" step="0.01" data-edit-field="currentAmount" value="${g.currentAmount||0}"></div>
            <div><label class="goal-field-label">Goal Target ($)</label><input class="goal-input" type="number" step="0.01" data-edit-field="targetAmount" value="${g.targetAmount||0}"></div>
            <div><label class="goal-field-label">Monthly Contribution ($)</label><input class="goal-input" type="number" step="0.01" data-edit-field="monthlyContribution" value="${g.monthlyContribution||0}"></div>
            <div><label class="goal-field-label">Target Date (optional)</label><input class="goal-input" type="month" data-edit-field="targetDate" value="${g.targetDate||""}"></div>
            <div class="full"><label class="goal-field-label">Goal Name</label><input class="goal-input" type="text" data-edit-field="name" value="${g.name||""}"></div>
            <div class="full"><label class="goal-field-label">Note (optional)</label><input class="goal-input" type="text" data-edit-field="note" value="${g.note||""}" placeholder="Any helpful context"></div>
          </div>
          <div class="goal-actions" style="margin-top:10px;">
            <button class="admin-btn admin-btn-danger" data-goal-action="delete" data-id="${g.id}">🗑️ Delete</button>
            <button class="admin-btn" data-goal-action="cancel-edit" data-id="${g.id}">Cancel</button>
            <button class="admin-btn admin-btn-success" data-goal-action="save-edit" data-id="${g.id}">✓ Save</button>
          </div>
        </div>
      </div>`:`
      <div style="display:flex;justify-content:center;gap:8px;">
        <button class="admin-btn" data-goal-action="edit" data-id="${g.id}">✏️ Edit Goal</button>
        <button class="admin-btn admin-btn-danger" style="padding:6px 12px;" data-goal-action="delete" data-id="${g.id}">🗑️ Delete</button>
      </div>`}`;
  }

  const ICONS = ["🎯","🛡️","🏖️","🏠","🚗","✈️","💍","🎓","💼","🌟","🏥","📦","🌴","💡","🐾"];
  let tabContent = "";

  if (futureActiveTab === "overview") {
    tabContent = renderOverview();
  } else {
    const g = goals.find(g=>g.id===futureActiveTab);
    if (g) {
      if      (g.type==="emergency")  tabContent = renderEmergencyTab(g);
      else if (g.type==="home")       tabContent = renderHomeTab(g);
      else if (g.type==="retirement") tabContent = renderRetirementTab(g);
      else if (g.type==="debt")       tabContent = renderDebtTab(g);
      else if (g.type==="investment") tabContent = renderInvestmentTab(g);
      else                            tabContent = renderGenericTab(g);
    }
  }

  const addGoalSection = `
    <div id="newGoalFormWrap"></div>
    <div class="goal-add-card" id="addGoalBtn">
      <div style="font-size:24px;">＋</div>
      <div class="goal-add-label">Add a custom long-term goal</div>
    </div>`;

  container.innerHTML = tabNav + tabContent + (futureActiveTab==="overview" ? addGoalSection : "");

  container.querySelectorAll("[data-future-tab]").forEach(el => {
    el.addEventListener("click", () => {
      futureActiveTab = el.dataset.futureTab;
      editingGoalId = null;
      renderAnnualView();
    });
  });

  const formWrap = document.getElementById("newGoalFormWrap");
  if (formWrap) {
    document.getElementById("addGoalBtn")?.addEventListener("click", () => {
      let selectedType = null;
      let selectedIcon = "🎯";

      const TYPE_DEFS = [
        { type:"generic",    icon:"🎯", label:"Savings Goal",    sub:"Save toward a target amount",    defaultIcons:["🎯","✈️","🚗","💍","🎓","🏖️","📦","🌴"] },
        { type:"debt",       icon:"💳", label:"Debt Payoff",      sub:"Pay down a balance over time",   defaultIcons:["💳","🏦","📋","💊","🎓","🏠","🚗","📉"] },
        { type:"investment", icon:"📈", label:"Investment Goal",  sub:"Grow money with compound returns",defaultIcons:["📈","💼","🌱","🔭","🏦","💡","🌟","🚀"] },
      ];

      function typeFields(type) {
        const def = TYPE_DEFS.find(t=>t.type===type);
        selectedIcon = def?.defaultIcons?.[0] || "🎯";
        const icons  = (def?.defaultIcons || ICONS);
        const iconPickerHtml = `
          <label class="goal-field-label" style="margin-top:10px;">Icon</label>
          <div class="goal-icon-picker" id="iconPicker">${icons.map(ic=>`<span class="goal-icon-opt${ic===selectedIcon?" selected":""}" data-icon="${ic}">${ic}</span>`).join("")}
            ${ICONS.filter(i=>!icons.includes(i)).map(ic=>`<span class="goal-icon-opt" data-icon="${ic}">${ic}</span>`).join("")}
          </div>
          <div class="goal-edit-grid" style="margin-top:6px;">
            <div class="full"><label class="goal-field-label">Goal Name</label><input class="goal-input" id="newGoalName" type="text" placeholder="${type==="debt"?"e.g. Chase Card, Student Loan":type==="investment"?"e.g. Brokerage, 529 Plan":"e.g. Italy Trip, New Car"}"></div>`;

        if (type === "generic") return iconPickerHtml + `
            <div><label class="goal-field-label">Current Saved ($)</label><input class="goal-input" id="newGoalCurrent" type="number" step="0.01" placeholder="0"></div>
            <div><label class="goal-field-label">Target Amount ($)</label><input class="goal-input" id="newGoalTarget" type="number" step="0.01" placeholder="10000"></div>
            <div><label class="goal-field-label">Monthly Contribution ($)</label><input class="goal-input" id="newGoalMonthly" type="number" step="0.01" placeholder="100"></div>
            <div><label class="goal-field-label">Target Date (optional)</label><input class="goal-input" id="newGoalDate" type="month"><div style="font-size:10px;color:var(--color-text-secondary);margin-top:3px;">Set a date to see required monthly savings</div></div>
            <div class="full"><label class="goal-field-label">Note (optional)</label><input class="goal-input" id="newGoalNote" type="text" placeholder="Any helpful context"></div>
          </div>`;

        if (type === "debt") return iconPickerHtml + `
            <div><label class="goal-field-label">Original Balance ($)</label><input class="goal-input" id="newGoalOrigBal" type="number" step="100" placeholder="e.g. 8000"></div>
            <div><label class="goal-field-label">Current Balance ($)</label><input class="goal-input" id="newGoalCurrent" type="number" step="100" placeholder="e.g. 6500"></div>
            <div><label class="goal-field-label">Interest Rate (APR %)</label><input class="goal-input" id="newGoalApr" type="number" step="0.01" placeholder="e.g. 19.99"></div>
            <div><label class="goal-field-label">Min Monthly Payment ($)</label><input class="goal-input" id="newGoalMinPmt" type="number" step="10" placeholder="e.g. 150"></div>
            <div class="full"><label class="goal-field-label">Your Planned Payment ($)</label><input class="goal-input" id="newGoalYourPmt" type="number" step="10" placeholder="Leave blank to use minimum"></div>
          </div>`;

        if (type === "investment") return iconPickerHtml + `
            <div><label class="goal-field-label">Current Amount ($)</label><input class="goal-input" id="newGoalCurrent" type="number" step="500" placeholder="0"></div>
            <div><label class="goal-field-label">Monthly Contribution ($)</label><input class="goal-input" id="newGoalMonthly" type="number" step="50" placeholder="100"></div>
            <div><label class="goal-field-label">Target Amount (optional $)</label><input class="goal-input" id="newGoalTarget" type="number" step="1000" placeholder="Leave blank if open-ended"></div>
            <div><label class="goal-field-label">Time Horizon (years)</label><input class="goal-input" id="newGoalYears" type="number" step="1" min="1" max="50" value="10"></div>
            <div class="full"><label class="goal-field-label">Note (optional)</label><input class="goal-input" id="newGoalNote" type="text" placeholder="Any helpful context"></div>
          </div>`;
        return "";
      }

      function renderForm() {
        formWrap.innerHTML = `
          <div class="goal-new-form">
            <div class="goal-new-form-title">New Goal</div>
            <label class="goal-field-label">What kind of goal?</label>
            <div class="goal-type-grid">
              ${TYPE_DEFS.map(t=>`
                <div class="goal-type-tile${selectedType===t.type?" selected":""}" data-pick-type="${t.type}">
                  <div class="goal-type-icon">${t.icon}</div>
                  <div class="goal-type-label">${t.label}</div>
                  <div class="goal-type-sub">${t.sub}</div>
                </div>`).join("")}
            </div>
            <div id="goalTypeFields">${selectedType ? typeFields(selectedType) : ""}</div>
            <div class="goal-actions" style="margin-top:12px;">
              <button class="admin-btn" id="cancelNewGoal">Cancel</button>
              ${selectedType ? `<button class="admin-btn admin-btn-success" id="saveNewGoal">＋ Add Goal</button>` : ""}
            </div>
          </div>`;

        formWrap.querySelectorAll("[data-pick-type]").forEach(tile => {
          tile.addEventListener("click", () => {
            selectedType = tile.dataset.pickType;
            renderForm();
          });
        });
        document.getElementById("iconPicker")?.addEventListener("click", e => {
          const opt = e.target.closest("[data-icon]"); if (!opt) return;
          selectedIcon = opt.dataset.icon;
          document.querySelectorAll(".goal-icon-opt").forEach(el => el.classList.toggle("selected", el.dataset.icon===selectedIcon));
        });
        document.getElementById("cancelNewGoal")?.addEventListener("click", () => { formWrap.innerHTML = ""; });
        document.getElementById("saveNewGoal")?.addEventListener("click", () => {
          const name = document.getElementById("newGoalName")?.value.trim();
          if (!name) { alert("Please enter a goal name."); return; }
          let newGoal = { id: uid(), type: selectedType, name, icon: selectedIcon };

          if (selectedType === "generic") {
            newGoal = { ...newGoal,
              currentAmount:       Number(document.getElementById("newGoalCurrent")?.value||0),
              targetAmount:        Number(document.getElementById("newGoalTarget")?.value||0),
              monthlyContribution: Number(document.getElementById("newGoalMonthly")?.value||0),
              targetDate:          document.getElementById("newGoalDate")?.value||"",
              note:                document.getElementById("newGoalNote")?.value.trim()||"" };
          } else if (selectedType === "debt") {
            const orig   = Number(document.getElementById("newGoalOrigBal")?.value||0);
            const bal    = Number(document.getElementById("newGoalCurrent")?.value||0);
            const minPmt = Number(document.getElementById("newGoalMinPmt")?.value||0);
            const yourPmt= Number(document.getElementById("newGoalYourPmt")?.value||0);
            newGoal = { ...newGoal,
              debtOriginal: orig || bal,
              debtBalance:  bal,
              currentAmount: bal,
              debtApr:      Number(document.getElementById("newGoalApr")?.value||0),
              debtMinPmt:   minPmt,
              debtYourPmt:  yourPmt || minPmt };
          } else if (selectedType === "investment") {
            newGoal = { ...newGoal,
              currentAmount:        Number(document.getElementById("newGoalCurrent")?.value||0),
              monthlyContribution:  Number(document.getElementById("newGoalMonthly")?.value||0),
              targetAmount:         Number(document.getElementById("newGoalTarget")?.value||0),
              investYears:          Number(document.getElementById("newGoalYears")?.value||10),
              note:                 document.getElementById("newGoalNote")?.value.trim()||"" };
          }

          plannerState.goals.push(newGoal);
          futureActiveTab = newGoal.id;
          saveState(); renderAnnualView();
        });
      }

      renderForm();
    });
  }

  document.getElementById("hp-saveNumbers")?.addEventListener("click", () => {
    const g = plannerState.goals.find(g=>g.id===futureActiveTab && g.type==="home") || plannerState.goals.find(g=>g.type==="home");
    if (!g) return;
    const v = id => Number(document.getElementById(id)?.value || 0);
    g.currentSavings=v("hp-currentSavings"); g.monthlyNetIncome=v("hp-netIncome");
    // Sync net income back to the active month so Monthly tab stays in sync
    const syncKey = activeMonthKey || formatMonthKey(new Date());
    ensureMonthExists(syncKey);
    if (v("hp-netIncome") > 0) months[syncKey].meta.income = v("hp-netIncome");
    g.interestRate=v("hp-rate")||6.25; g.loanTermYears=v("hp-years")||30; g.hoaFee=v("hp-hoa");
    g.propTaxRate=v("hp-propTax")||1.7; g.hoiRate=v("hp-hoi")||0.5; g.pmiRate=v("hp-pmi")||0.75;
    g.lenderTitleRate=v("hp-lenderTitle")||2.0; g.appraisal=v("hp-appraisal"); g.inspection=v("hp-inspection");
    g.countyTaxRate=v("hp-countyTax"); g.stateTaxRate=v("hp-stateTax"); g.mortgageTaxRate=v("hp-mortgageTax");
    g.prepaidEscrowRate=v("hp-prepaid"); g.attorneyFees=v("hp-attorney"); g.movingCost=v("hp-moving");
    g.utilityDeposits=v("hp-utilDeposits"); g.furnishingsRate=v("hp-furnishings"); g.repairsRate=v("hp-repairs");
    g.reserveMonths=v("hp-reserveMonths")||3;
    if (g.scenarios) { g.scenarios.forEach((s,i)=>{ const p=document.getElementById("hp-sc-price-"+i), d=document.getElementById("hp-sc-dpct-"+i); if(p)s.homePrice=Number(p.value||0); if(d)s.downPct=Number(d.value||20); }); }
    saveState(); renderAnnualView();
  });

  document.getElementById("efBaselineOpts")?.addEventListener("click",e=>{
    const opt=e.target.closest("[data-ef-baseline]"); if(!opt)return;
    const v=opt.dataset.efBaseline;
    document.getElementById("efBaselineVal").value=v;
    document.querySelectorAll("[data-ef-baseline]").forEach(el=>el.classList.toggle("active-baseline",el.dataset.efBaseline===v));
  });
  document.getElementById("efGoalOpts")?.addEventListener("click",e=>{
    const opt=e.target.closest("[data-ef-goal]"); if(!opt)return;
    const v=opt.dataset.efGoal;
    document.getElementById("efGoalVal").value=v;
    document.querySelectorAll("[data-ef-goal]").forEach(el=>el.classList.toggle("active-goal",el.dataset.efGoal===v));
  });
}

function handleFutureClick(e) {
  const btn=e.target.closest("[data-goal-action]"); if(!btn)return;
  const action=btn.dataset.goalAction, id=btn.dataset.id;
  if (action==="home-scenario")    { activeHomeScenario=Number(btn.dataset.sc||0); renderAnnualView(); return; }
  if (action==="hp-toggle-inputs") { hpInputsOpen=!hpInputsOpen; renderAnnualView(); return; }
  if (action==="edit")        { editingGoalId=id;   renderAnnualView(); return; }
  if (action==="cancel-edit") { editingGoalId=null;  renderAnnualView(); return; }
  if (action==="save-ef") {
    const g=plannerState.goals.find(g=>g.id===id); if(!g)return;
    const av=document.getElementById("annualView");
    g.currentAmount  = Number(av.querySelector("[data-edit-field='currentAmount']")?.value||0);
    g.baselineMonths = Number(document.getElementById("efBaselineVal")?.value||3);
    g.goalMonths     = Number(document.getElementById("efGoalVal")?.value||6);
    editingGoalId=null; saveState(); renderAnnualView(); return;
  }
  if (action==="save-debt") {
    const g=plannerState.goals.find(g=>g.id===id); if(!g)return;
    const av=document.getElementById("annualView");
    g.debtOriginal = Number(av.querySelector("[data-debt='debtOriginal']")?.value||0);
    g.debtBalance  = Number(av.querySelector("[data-debt='debtBalance']")?.value||0);
    g.debtApr      = Number(av.querySelector("[data-debt='debtApr']")?.value||0);
    g.debtMinPmt   = Number(av.querySelector("[data-debt='debtMinPmt']")?.value||0);
    g.debtYourPmt  = Number(av.querySelector("[data-debt='debtYourPmt']")?.value||0);
    g.currentAmount = g.debtBalance;
    saveState(); renderAnnualView(); return;
  }
  if (action==="save-investment") {
    const g=plannerState.goals.find(g=>g.id===id); if(!g)return;
    const av=document.getElementById("annualView");
    g.currentAmount        = Number(av.querySelector("[data-inv='currentAmount']")?.value||0);
    g.monthlyContribution  = Number(av.querySelector("[data-inv='monthlyContribution']")?.value||0);
    g.targetAmount         = Number(av.querySelector("[data-inv='targetAmount']")?.value||0);
    g.investYears          = Number(av.querySelector("[data-inv='investYears']")?.value||10);
    saveState(); renderAnnualView(); return;
  }
  if (action==="save-retirement") {
    const g=plannerState.goals.find(g=>g.id===id); if(!g)return;
    const av=document.getElementById("annualView");
    g.retCurrentSavings = Number(av.querySelector("[data-ret='currentSavings']")?.value||0);
    g.retMonthlyContrib = Number(av.querySelector("[data-ret='monthlyContrib']")?.value||0);
    g.retCurrentAge     = Number(av.querySelector("[data-ret='currentAge']")?.value||35);
    g.retRetirementAge  = Number(av.querySelector("[data-ret='retirementAge']")?.value||65);
    g.currentAmount       = g.retCurrentSavings;
    g.monthlyContribution = g.retMonthlyContrib;
    saveState(); renderAnnualView(); return;
  }
  if (action==="save-edit") {
    const av=document.getElementById("annualView");
    const g=plannerState.goals.find(g=>g.id===id); if(!g)return;
    g.currentAmount=Number(av.querySelector("[data-edit-field='currentAmount']")?.value||0);
    g.targetAmount=Number(av.querySelector("[data-edit-field='targetAmount']")?.value||0);
    g.monthlyContribution=Number(av.querySelector("[data-edit-field='monthlyContribution']")?.value||0);
    g.targetDate=av.querySelector("[data-edit-field='targetDate']")?.value||"";
    g.name=av.querySelector("[data-edit-field='name']")?.value.trim()||g.name;
    g.note=av.querySelector("[data-edit-field='note']")?.value.trim()||"";
    editingGoalId=null; saveState(); renderAnnualView(); return;
  }
  if (action==="delete") {
    if(!confirm("Delete this goal?"))return;
    plannerState.goals=plannerState.goals.filter(g=>g.id!==id);
    futureActiveTab="overview"; saveState(); renderAnnualView(); return;
  }
}

            <span class="smt-icon">${opfsAvailable ? "🔒" : "🌐"}</span>
            <div class="smt-body">
              <div class="smt-title">${opfsAvailable ? "OPFS Active (Good Protection)" : "Safari Storage (At Risk)"}</div>
              <div class="smt-sub">${opfsAvailable
                ? "Your data is in the Origin Private File System — more durable than standard Safari storage, but still subject to iOS eviction if your device runs critically low on storage. Install to Home Screen + regular exports for maximum safety."
                : "Your data is in Safari's temporary memory. iOS can delete it if you haven't opened the app in 7+ days, clear browsing history, or run low on device storage."}</div>
            </div>
          </div>
          ${!opfsAvailable ? `<div class="install-steps"><strong>Protect your data →</strong> tap <strong>Share ⬆</strong> in Safari, then <strong>"Add to Home Screen"</strong>. Free, takes 10 seconds, and removes the 7-day data timer.</div>` : ""}
        `}

        <div style="margin-bottom:12px;">
          <div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--color-text-secondary);margin-bottom:6px;">Active Storage Layers</div>
          ${layerBadges}
          <div style="font-size:10px;color:var(--color-text-secondary);margin-top:5px;line-height:1.4;">
            ${opfsAvailable
              ? "Data is written to all three layers on every save. If one layer fails or is evicted, the others remain."
              : "OPFS requires iOS 16.4+. Install the app to Home Screen to maximize storage durability."}
          </div>
        </div>

        <div class="backup-status-row">
          <span class="backup-status-label">Last backed up</span>
          <span class="backup-status-value ${lastExportedAt ? "backed" : "not-backed"}">
            ${lastExportedAt
              ? "✓ " + timeAgo(lastExportedAt) + " · " + lastExportedAt.toLocaleDateString(undefined, { month: "short", day: "numeric" })
              : "⚠ None this session"}
          </span>
        </div>

        <div style="margin-bottom:10px;">
          <label style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--color-text-secondary);display:block;margin-bottom:6px;">Backup File Name</label>
          <div style="display:flex;align-items:center;gap:6px;">
            <input id="backupFileNameInput" type="text" class="admin-input" placeholder="finance-backup" value="${customBackupName}" style="flex:1;min-width:0;">
            <span style="font-size:12px;color:var(--color-text-secondary);flex-shrink:0;font-weight:600;">.json</span>
          </div>
        </div>

        <button class="btn" id="adminSnapshotBtn" type="button" style="width:100%;margin-bottom:10px;">📤 Export Backup</button>
        <p style="font-size:11px;color:var(--color-text-secondary);margin:-4px 0 12px;line-height:1.5;text-align:center;">
          Saves directly to the Files app (Downloads folder).<br>
          You can safely delete old backups from there.
        </p>
        <button class="btn btn-ghost" id="adminImportBtn" type="button" style="width:100%;font-size:13px;">📥 Restore from Backup File</button>

      </div>
    </div>

    <div class="card">
      <div class="card-header"><h2 class="card-title">✏️ Edit Budget</h2></div>
      <div class="card-body">
        ${renderAdminBudgetSection("bills",  "🏠 Must Pay Bills",            bills,  false)}
        ${renderAdminBudgetSection("subs",   "📱 Subs &amp; Other",          subs,   false)}
        ${renderAdminBudgetSection("invsts", "💰 Savings", invsts, false)}
        ${renderAdminBudgetSection("disc",   "🛍️ Discretionary Categories", disc,   true)}
      </div>
    </div>
  `;
}

function renderAdminBudgetSection(section, title, items, isDisc) {
  const collapsed = collapsedAdminSections.has(section);
  const total = items.reduce((s, i) => s + Number(i.budgetAmount || 0), 0);
  const meta  = isDisc
    ? `${items.length} categor${items.length !== 1 ? "ies" : "y"}`
    : `${items.length} item${items.length !== 1 ? "s" : ""} · ${fmt(total)}/mo`;

  return `
    <div class="admin-section" style="margin-bottom:4px;">
      <div class="admin-section-header" data-toggle="${section}">
        <div class="admin-section-left">
          <span class="admin-section-title">${title}</span>
          <span class="admin-section-meta">${meta}</span>
        </div>
        <span class="admin-section-toggle">${collapsed ? "▶" : "▼"}</span>
      </div>
      ${collapsed ? "" : `
        <div class="admin-section-body">
          ${isDisc ? `<p style="font-size:11px;color:var(--color-text-secondary);margin:0 0 8px;line-height:1.5;">These categories appear in the Log tab dropdown. Setting a budget enables progress tracking.</p>` : ""}
          ${items.length === 0
            ? `<p class="empty-bucket" style="padding:8px 0 4px;">No items yet — add one below.</p>`
            : items.map(item => renderAdminBudgetItemRow(section, item, isDisc)).join("")}
          <div class="admin-add-row" data-section="${section}">
            <input class="admin-input admin-add-name" type="text" placeholder="${isDisc ? "Category name" : "Item name"}" style="flex:1;min-width:120px;">
            <input class="admin-input admin-add-budget" type="number" placeholder="${isDisc ? "$ budget (opt)" : "$ budget"}" style="width:110px;">
            <button class="admin-btn admin-btn-success" data-action="add" data-section="${section}">+ Add</button>
          </div>
        </div>`}
    </div>`;
}

function renderAdminBudgetItemRow(section, item, isDisc) {
  const editing = editingBudgetItem?.section === section && editingBudgetItem?.id === item.id;
  if (editing) {
    const splitEnabled  = !!item.splitEnabled;
    const annualEnabled = !!item.annualEnabled;
    const splitFull     = Number(item.splitFullAmount || 0);
    const annualTotal   = Number(item.annualTotal || 0) || (Number(item.budgetAmount || 0) * 12);
    const partnerAuto   = splitFull > 0 ? Math.max(0, splitFull - Number(item.budgetAmount || 0)) : 0;

    return `
      <div class="admin-edit-block" data-id="${item.id}">
        <div class="admin-edit-grid">
          <div class="full">
            <label class="admin-edit-label">Name</label>
            <input class="admin-input admin-edit-name" type="text" value="${item.name}" placeholder="Name" style="width:100%;">
          </div>
          <div>
            <label class="admin-edit-label">${isDisc ? "Budget (opt)" : splitEnabled ? "Your Share / mo" : "Budget / mo"}</label>
            <input class="admin-input admin-edit-budget" type="number" value="${item.budgetAmount || ""}" placeholder="$" style="width:100%;">
          </div>
          ${!isDisc ? `
          <div style="display:flex;flex-direction:column;justify-content:flex-end;">
            <label class="admin-edit-label" style="opacity:0;">–</label>
            <div style="font-size:11px;color:var(--color-text-secondary);padding:8px 0 4px;font-style:italic;">
              ${splitEnabled && splitFull > 0 ? `Partner covers ${fmt(partnerAuto)}` : annualEnabled ? `Annual: ${fmt(annualTotal)}` : ""}
            </div>
          </div>` : ""}
        </div>

        ${!isDisc ? `
        <label class="admin-toggle-row${splitEnabled ? " active" : ""}" id="splitToggleLabel_${item.id}">
          <input type="checkbox" id="splitCheck_${item.id}" ${splitEnabled ? "checked" : ""} onchange="
            this.closest('.admin-edit-block').querySelector('#splitFields_${item.id}').style.display = this.checked ? 'grid' : 'none';
            this.closest('label').classList.toggle('active', this.checked);
          ">
          <span class="admin-toggle-label">🔀 Split with partner</span>
          <span style="font-size:10px;color:var(--color-text-secondary);">You log full amount · your share counts against budget</span>
        </label>
        <div class="admin-sub-fields" id="splitFields_${item.id}" style="display:${splitEnabled ? "grid" : "none"};">
          <div>
            <label class="admin-edit-label">Full bill amount</label>
            <input class="admin-input admin-edit-split-full" type="number" value="${splitFull || ""}" placeholder="e.g. 2000" style="width:100%;"
              oninput="
                const full = Number(this.value||0);
                const your = Number(this.closest('.admin-edit-block').querySelector('.admin-edit-budget').value||0);
                const el = this.closest('.admin-edit-block').querySelector('.admin-split-partner-display');
                if(el) el.textContent = full > 0 ? 'Partner: ' + (full > your ? ('$'+(full-your).toFixed(2)) : '$0.00') : '';
              ">
          </div>
          <div>
            <label class="admin-edit-label">Partner's share</label>
            <div class="admin-split-partner-display" style="font-size:13px;font-weight:700;color:var(--color-text-secondary);padding:8px 0 4px;">
              ${splitFull > 0 ? `Partner: ${fmt(partnerAuto)}` : "Auto-calculated"}
            </div>
          </div>
        </div>

        <label class="admin-toggle-row${annualEnabled ? " active" : ""}">
          <input type="checkbox" id="annualCheck_${item.id}" ${annualEnabled ? "checked" : ""} onchange="
            this.closest('.admin-edit-block').querySelector('#annualFields_${item.id}').style.display = this.checked ? 'grid' : 'none';
            this.closest('label').classList.toggle('active', this.checked);
          ">
          <span class="admin-toggle-label">📅 Annual fee</span>
          <span style="font-size:10px;color:var(--color-text-secondary);">Set aside monthly · marks paid when charge is logged</span>
        </label>
        <div class="admin-sub-fields" id="annualFields_${item.id}" style="display:${annualEnabled ? "grid" : "none"};">
          <div>
            <label class="admin-edit-label">Annual total</label>
            <input class="admin-input admin-edit-annual-total" type="number" value="${annualTotal || ""}" placeholder="e.g. 1800" style="width:100%;">
          </div>
          <div>
            <label class="admin-edit-label">Monthly set-aside</label>
            <div style="font-size:13px;font-weight:700;color:var(--color-primary);padding:8px 0 4px;">${fmt(Number(item.budgetAmount || 0))}/mo</div>
          </div>
        </div>` : ""}

        <div style="display:flex;gap:6px;justify-content:flex-end;padding-top:8px;">
          <button class="admin-btn" data-action="cancel">✕ Cancel</button>
          <button class="admin-btn admin-btn-success" data-action="save" data-section="${section}" data-id="${item.id}">✓ Save</button>
        </div>
      </div>`;
  }

  // Display row — show badges for split/annual
  const budgetDisplay = item.budgetAmount ? fmt(item.budgetAmount) : (isDisc ? "No budget" : "—");
  const badges = [];
  if (item.splitEnabled && Number(item.splitFullAmount) > 0) {
    const partner = Math.max(0, Number(item.splitFullAmount) - Number(item.budgetAmount || 0));
    badges.push(`<span class="bill-badge badge-partner" style="font-size:9px;">🔀 Split · partner ${fmt(partner)}</span>`);
  }
  if (item.annualEnabled) {
    badges.push(`<span class="bill-badge badge-annual-pending" style="font-size:9px;">📅 Annual</span>`);
  }
  return `
    <div class="admin-item-row" style="flex-wrap:wrap;gap:4px;">
      <div class="admin-item-name" style="flex:1;min-width:0;">
        ${item.name}
        ${badges.length ? `<div style="margin-top:3px;display:flex;gap:4px;flex-wrap:wrap;">${badges.join("")}</div>` : ""}
      </div>
      <div class="admin-item-budget" style="${!item.budgetAmount && isDisc ? "color:var(--color-text-secondary);font-weight:400;" : ""}">${budgetDisplay}</div>
      <div style="display:flex;gap:6px;flex-shrink:0;">
        <button class="admin-btn"                  data-action="edit"   data-section="${section}" data-id="${item.id}">✏️</button>
        <button class="admin-btn admin-btn-danger"  data-action="delete" data-section="${section}" data-id="${item.id}">🗑️</button>
      </div>
    </div>`;
}

function handleAdminClick(e) {
  const t = e.target;
  const toggle = t.closest("[data-toggle]");
  if (toggle) { const s=toggle.dataset.toggle; collapsedAdminSections.has(s)?collapsedAdminSections.delete(s):collapsedAdminSections.add(s); renderAdminView(); return; }
  const editBtn = t.closest("[data-action='edit']");
  if (editBtn) { editingBudgetItem={section:editBtn.dataset.section,id:editBtn.dataset.id}; renderAdminView(); return; }
  const cancelBtn = t.closest("[data-action='cancel']");
  if (cancelBtn) { editingBudgetItem=null; renderAdminView(); return; }
  const saveBtn = t.closest("[data-action='save']");
  if (saveBtn) {
    const {section,id}=saveBtn.dataset;
    const block=document.querySelector(`.admin-edit-block[data-id="${id}"]`); if(!block)return;
    const name=block.querySelector(".admin-edit-name").value.trim();
    const budget=Number(block.querySelector(".admin-edit-budget").value||0);
    if(!name){alert("Please enter a name.");return;}
    const item=getSectionArray(section).find(i=>i.id===id);
    if(item){
      item.name=name; item.budgetAmount=budget;
      // Split
      const splitCheck = block.querySelector(`#splitCheck_${id}`);
      if (splitCheck) {
        item.splitEnabled   = splitCheck.checked;
        item.splitFullAmount = Number(block.querySelector(".admin-edit-split-full")?.value || 0);
      } else {
        item.splitEnabled = false; item.splitFullAmount = 0;
      }
      // Annual
      const annualCheck = block.querySelector(`#annualCheck_${id}`);
      if (annualCheck) {
        item.annualEnabled = annualCheck.checked;
        item.annualTotal   = Number(block.querySelector(".admin-edit-annual-total")?.value || 0) || budget * 12;
      } else {
        item.annualEnabled = false; item.annualTotal = 0;
      }
    }
    editingBudgetItem=null; saveState(); renderAdminView(); return;
  }
  const deleteBtn = t.closest("[data-action='delete']");
  if (deleteBtn) {
    const {section,id}=deleteBtn.dataset;
    if(!confirm("Delete this item?"))return;
    const arr=getSectionArray(section), idx=arr.findIndex(i=>i.id===id);
    if(idx!==-1)arr.splice(idx,1);
    saveState(); renderAdminView(); return;
  }
  const addBtn = t.closest("[data-action='add']");
  if (addBtn) {
    const section=addBtn.dataset.section;
    const row=document.querySelector(`.admin-add-row[data-section="${section}"]`); if(!row)return;
    const name=row.querySelector(".admin-add-name").value.trim();
    const budget=Number(row.querySelector(".admin-add-budget").value||0);
    if(!name){alert("Please enter a name.");return;}
    getSectionArray(section).push({id:uid(),name,budgetAmount:budget});
    saveState(); renderAdminView(); return;
  }
}

// ─────────────────────────────────────────
//  BACK TO TOP BUTTON
// ─────────────────────────────────────────

(function () {
  const btn = document.getElementById("backToTopBtn");
  const SHOW_THRESHOLD = 320;

  window.addEventListener("scroll", () => {
    btn.classList.toggle("visible", window.scrollY > SHOW_THRESHOLD);
  }, { passive: true });

  btn.addEventListener("click", () => {
    window.scrollTo({ top: 0, behavior: "smooth" });
  });
})();

// ─────────────────────────────────────────
//  INIT
// ─────────────────────────────────────────

document.addEventListener("DOMContentLoaded", async () => {
  document.querySelectorAll(".nav-btn").forEach(btn =>
    btn.addEventListener("click", () => switchView(btn.dataset.view))
  );

  const imp = document.getElementById("importFileInput");
  imp.addEventListener("change", e => {
    const f = e.target.files?.[0];
    if (f) importStateFromFile(f);
    imp.value = "";
  });

  document.getElementById("adminView").addEventListener("click", e => {
    const t = e.target;
    if (t.id === "adminSnapshotBtn") {
      const nameInput = document.getElementById("backupFileNameInput");
      if (nameInput) { const v = nameInput.value.trim(); if (v) customBackupName = v; }
      handleBackupButtonClick();
      return;
    }
    if (t.id === "adminImportBtn")   { document.getElementById("importFileInput").click(); return; }
    handleAdminClick(e);
  });
  document.getElementById("annualView").addEventListener("click", handleFutureClick);

  await loadState();
});
</script>
</body>
</html>
