<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />
  <title>Finance Tracker</title>
  <meta name="theme-color" content="#0b1220" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Finance" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="description" content="Local-first personal finance tracker" />

  <link rel="manifest" href='data:application/manifest+json,{
    "name":"Finance Tracker","short_name":"Finance","description":"Local-first personal finance tracker",
    "start_url":"./","display":"standalone","background_color":"#0b1220","theme_color":"#0b1220","orientation":"portrait",
    "icons":[{"src":"data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 180 180%22%3E%3Crect width=%22180%22 height=%22180%22 rx=%2240%22 fill=%22%230b1220%22/%3E%3Ctext x=%2290%22 y=%22125%22 font-size=%22100%22 text-anchor=%22middle%22 fill=%22%23ffffff%22%3E$%3C/text%3E%3C/svg%3E","sizes":"180x180","type":"image/svg+xml"}]
  }' />

  <style>
    :root {
      --color-bg-primary:    #0b1220;
      --color-bg-secondary:  #111b2e;
      --color-text-primary:  #eaf1ff;
      --color-text-secondary:#9fb0d0;
      --color-border:        rgba(255,255,255,0.08);
      --color-primary:       #6aa6ff;
      --color-success:       #4ade80;
      --color-warning:       #fbbf24;
      --color-danger:        #f87171;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(180deg, #070c16 0%, #0b1220 60%, #0b1220 100%);
      color: var(--color-text-primary);
      min-height: 100vh;
      padding-bottom: 70px;
    }

    /* ── Header ── */
    .app-header {
      background: var(--color-bg-secondary);
      border-bottom: 1px solid var(--color-border);
      padding: calc(env(safe-area-inset-top,0) + 12px) 16px 12px;
      position: sticky; top: 0; z-index: 10;
      display: flex; align-items: center; justify-content: space-between; gap: 8px;
    }
    .header-text  { flex: 1; min-width: 0; }
    .app-title    { margin: 0; font-size: 20px; font-weight: 700; letter-spacing: .3px; }
    .app-subtitle { margin: 4px 0 0; font-size: 13px; color: var(--color-text-secondary); }

    /* ── Save Status Chip ── */
    .save-status-chip {
      display: flex; align-items: center; gap: 5px;
      border-radius: 10px; padding: 7px 12px; font-size: 12px; font-weight: 700;
      font-family: inherit; white-space: nowrap; transition: all .2s;
      border: 1px solid transparent; user-select: none; background: none; cursor: default;
    }
    .chip-icon { font-size: 13px; line-height: 1; }
    .chip-warn    { background: rgba(251,191,36,0.1);   border-color: rgba(251,191,36,0.3);   color: var(--color-warning); cursor: pointer; }
    .chip-warn:hover   { background: rgba(251,191,36,0.18); }
    .chip-saving  { background: rgba(106,166,255,0.07); border-color: rgba(106,166,255,0.18); color: var(--color-text-secondary); }
    .chip-idbonly   { background: rgba(74,222,128,0.06);  border-color: rgba(74,222,128,0.18);  color: var(--color-success); }
    .chip-opfs      { background: rgba(74,222,128,0.10);  border-color: rgba(74,222,128,0.30);  color: var(--color-success); font-weight: 800; }
    .chip-ios-browser{ background: rgba(251,191,36,0.1);   border-color: rgba(251,191,36,0.3);   color: var(--color-warning); cursor: pointer; }
    .chip-ios-browser:hover { background: rgba(251,191,36,0.18); }
    .chip-ios-pwa    { background: rgba(74,222,128,0.07);  border-color: rgba(74,222,128,0.22);  color: var(--color-success); }
    .chip-ios-backed { background: rgba(74,222,128,0.14);  border-color: rgba(74,222,128,0.4);   color: var(--color-success); font-weight: 800; }

    /* ── Protection Level Component ── */
    .protect-meter {
      display: flex; gap: 0; margin: 12px 0 14px; border-radius: 10px;
      overflow: hidden; border: 1px solid var(--color-border);
    }
    .protect-tier {
      flex: 1; padding: 9px 8px 8px; text-align: center;
      background: rgba(10,19,38,0.7); border-right: 1px solid var(--color-border);
      transition: background .2s;
    }
    .protect-tier:last-child { border-right: none; }
    .protect-tier.active-tier { background: rgba(74,222,128,0.08); }
    .protect-tier.active-tier-warn { background: rgba(251,191,36,0.07); }
    .protect-dot { font-size: 9px; letter-spacing: 2px; margin-bottom: 4px; }
    .protect-label { font-size: 10px; font-weight: 700; color: var(--color-text-secondary); line-height: 1.3; }
    .protect-tier.active-tier .protect-label { color: var(--color-success); }
    .protect-tier.active-tier-warn .protect-label { color: var(--color-warning); }
    .protect-sub { font-size: 9px; color: var(--color-text-secondary); margin-top: 2px; line-height: 1.3; opacity: 0.8; }

    /* ── Banners ── */
    .app-banner {
      display: flex; align-items: flex-start; gap: 10px;
      padding: 11px 16px; font-size: 13px; line-height: 1.4;
      border-bottom: 1px solid var(--color-border);
      animation: bannerSlide .25s ease;
    }
    @keyframes bannerSlide { from { opacity:0; transform:translateY(-8px); } to { opacity:1; transform:translateY(0); } }
    .banner-install   { background: rgba(106,166,255,0.06); }
    .banner-ios-save  { background: rgba(251,191,36,0.06); }
    .banner-icon  { font-size: 20px; flex-shrink: 0; padding-top: 1px; }
    .banner-body  { flex: 1; min-width: 0; }
    .banner-title { font-weight: 700; color: var(--color-text-primary); }
    .banner-sub   { font-size: 11px; color: var(--color-text-secondary); margin-top: 3px; line-height: 1.5; }
    .banner-actions { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 8px; }
    .banner-btn {
      border-radius: 8px; padding: 5px 12px; font-size: 12px; font-weight: 700;
      cursor: pointer; font-family: inherit; white-space: nowrap; border: 1px solid;
      transition: background .15s;
    }
    .bbn-blue  { background: rgba(106,166,255,0.12); border-color: rgba(106,166,255,0.3); color: var(--color-primary); }
    .bbn-blue:hover  { background: rgba(106,166,255,0.22); }
    .bbn-green { background: rgba(74,222,128,0.1);   border-color: rgba(74,222,128,0.3);  color: var(--color-success); }
    .bbn-green:hover { background: rgba(74,222,128,0.2); }
    .bbn-warn  { background: rgba(251,191,36,0.1);   border-color: rgba(251,191,36,0.3);  color: var(--color-warning); }
    .bbn-warn:hover  { background: rgba(251,191,36,0.2); }
    .banner-dismiss {
      background: none; border: none; color: var(--color-text-secondary); cursor: pointer;
      font-size: 18px; padding: 0 2px; line-height: 1; flex-shrink: 0; margin-top: -1px;
    }
    .banner-dismiss:hover { color: var(--color-text-primary); }

    /* ── iOS Warning Info Box (first-run card) ── */
    .ios-warn-box {
      background: rgba(30,22,8,0.85); border: 1px solid rgba(251,191,36,0.25);
      border-radius: 12px; padding: 12px 14px; margin: 14px 0 4px; text-align: left;
    }
    .ios-warn-item {
      display: flex; align-items: flex-start; gap: 10px; padding: 6px 0;
      border-bottom: 1px solid rgba(251,191,36,0.1);
    }
    .ios-warn-item:last-child { border-bottom: none; padding-bottom: 0; }
    .ios-warn-item:first-child { padding-top: 0; }
    .ios-warn-item-icon { font-size: 16px; flex-shrink: 0; margin-top: 1px; line-height: 1.2; }
    .ios-warn-item-text { font-size: 12px; color: var(--color-text-secondary); line-height: 1.5; }
    .ios-warn-item-text strong { color: var(--color-text-primary); font-weight: 700; }

    /* ── Persistent iOS warning bar ── */
    .ios-persistent-bar {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 16px; font-size: 12px; font-weight: 600;
      border-bottom: 1px solid rgba(251,191,36,0.2);
      background: rgba(20,14,4,0.9);
      transition: background .4s, border-color .4s;
    }
    .ios-persistent-bar.backed-up {
      background: rgba(4,20,10,0.9); border-color: rgba(74,222,128,0.2);
    }
    .ios-bar-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--color-warning); flex-shrink: 0; transition: background .4s;
    }
    .ios-persistent-bar.backed-up .ios-bar-dot { background: var(--color-success); }
    .ios-bar-text { flex: 1; color: var(--color-text-secondary); line-height: 1.4; }
    .ios-persistent-bar.backed-up .ios-bar-text { color: var(--color-success); }

    /* ── Compact inline banner ── */
    .banner-compact {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 14px; font-size: 12px; font-weight: 600;
      border-bottom: 1px solid rgba(251,191,36,0.2);
      background: rgba(251,191,36,0.07);
      animation: bannerSlide .25s ease;
    }
    .banner-compact-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--color-warning); flex-shrink: 0; }
    .banner-compact-text { flex: 1; color: var(--color-text-secondary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .banner-compact-btn {
      background: rgba(251,191,36,0.14); border: 1px solid rgba(251,191,36,0.35);
      border-radius: 7px; padding: 4px 10px; font-size: 11px; font-weight: 700;
      color: var(--color-warning); cursor: pointer; font-family: inherit; white-space: nowrap; flex-shrink: 0;
    }
    .banner-compact-btn:hover { background: rgba(251,191,36,0.24); }
    .banner-compact-dismiss { background: none; border: none; color: rgba(159,176,208,0.5); cursor: pointer; font-size: 15px; padding: 0 0 0 4px; flex-shrink: 0; }

    /* ── First-Run Overlay ── */
    .fr-overlay {
      position: fixed; inset: 0; background: rgba(7,12,22,0.93); backdrop-filter: blur(4px);
      z-index: 200; display: flex; align-items: center; justify-content: center; padding: 24px;
      animation: frFade .3s ease;
    }
    @keyframes frFade { from { opacity:0; } to { opacity:1; } }
    .fr-card {
      background: var(--color-bg-secondary); border: 1px solid var(--color-border);
      border-radius: 20px; padding: 28px 22px; max-width: 360px; width: 100%; text-align: center;
    }
    .fr-emoji { font-size: 52px; margin-bottom: 14px; line-height: 1; }
    .fr-title { font-size: 20px; font-weight: 800; margin: 0 0 8px; color: var(--color-text-primary); }
    .fr-sub   { font-size: 13px; color: var(--color-text-secondary); margin: 0 0 22px; line-height: 1.55; }
    .fr-btns  { display: flex; flex-direction: column; gap: 10px; }
    .fr-divider { border: none; border-top: 1px solid var(--color-border); margin: 6px 0; }
    .fr-hint  { font-size: 11px; color: var(--color-text-secondary); margin: 2px 0 0; line-height: 1.4; }

    /* ── Layout ── */
    .content { max-width: 800px; margin: 0 auto; padding: 16px; }
    .view        { display: none; }
    .view.active { display: block; }

    /* ── Card ── */
    .card {
      background: linear-gradient(180deg, rgba(15,26,46,0.92), rgba(11,18,32,0.92));
      border: 1px solid var(--color-border); border-radius: 16px;
      padding: 16px; margin-bottom: 16px;
    }
    .card-header {
      margin-bottom: 12px;
      display: flex; align-items: center; justify-content: space-between; gap: 8px;
    }
    .card-title { margin: 0; font-size: 16px; font-weight: 700; }
    .card-body  { font-size: 14px; color: var(--color-text-secondary); }

    /* ── Stat tiles ── */
    .stat-grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .stat-grid-4 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .stat-tile {
      background: rgba(10,19,38,0.7); border: 1px solid var(--color-border);
      border-radius: 12px; padding: 12px; text-align: center;
    }
    .stat-tile-label {
      font-size: 9px; font-weight: 700; text-transform: uppercase;
      letter-spacing: .6px; color: var(--color-text-secondary); margin-bottom: 4px;
    }
    .stat-tile-value { font-size: 22px; font-weight: 800; line-height: 1; }
    .stat-tile-sub   { font-size: 10px; color: var(--color-text-secondary); margin-top: 3px; }

    .health-tile {
      background: rgba(10,19,38,0.7); border: 1px solid var(--color-border);
      border-radius: 10px; padding: 10px;
      display: flex; align-items: center; gap: 8px;
    }
    .health-tile-icon  { font-size: 18px; flex-shrink: 0; }
    .health-tile-count { font-size: 18px; font-weight: 800; line-height: 1; }
    .health-tile-label { font-size: 10px; color: var(--color-text-secondary); margin-top: 1px; }

    /* ── Progress bars ── */
    .progress-bar-track { width: 100%; height: 6px; background: rgba(255,255,255,0.07); border-radius: 99px; overflow: hidden; }
    .progress-bar-track.thick { height: 10px; }
    .progress-bar-fill  { height: 100%; border-radius: 99px; transition: width .3s ease; }
    .progress-bar-fill.under { background: var(--color-success); }
    .progress-bar-fill.warn  { background: var(--color-warning); }
    .progress-bar-fill.over  { background: var(--color-danger);  }
    .progress-bar-fill.unset { background: rgba(106,166,255,0.45); }

    /* ── Transaction rows ── */
    .tx-list { list-style: none; padding: 0; margin: 0; }
    .tx-row  { padding: 9px 0; border-bottom: 1px solid rgba(148,163,184,0.1); }
    .tx-row:last-child { border-bottom: none; }
    .tx-row-display { display: flex; justify-content: space-between; align-items: center; gap: 8px; }
    .tx-row-left  { flex: 1; min-width: 0; }
    .tx-row-cat   { font-size: 13px; color: var(--color-text-primary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .tx-row-meta  { font-size: 11px; color: var(--color-text-secondary); margin-top: 2px; }
    .tx-row-right { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
    .tx-row-amount { font-size: 14px; font-weight: 700; color: var(--color-primary); white-space: nowrap; }
    .tx-action-btn {
      background: none; border: none; padding: 4px 5px; cursor: pointer;
      font-size: 14px; border-radius: 6px; line-height: 1; transition: background .15s;
    }
    .tx-action-btn:hover { background: rgba(255,255,255,0.07); }
    .tx-edit-form { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; padding: 8px 0 4px; }
    .tx-edit-form .full { grid-column: 1 / -1; }
    .tx-edit-form .tx-edit-actions { grid-column: 1 / -1; display: flex; gap: 6px; justify-content: flex-end; }
    .tx-edit-input {
      width: 100%; background: rgba(255,255,255,0.06);
      border: 1px solid rgba(148,163,184,0.35); border-radius: 8px;
      padding: 7px 10px; font-size: 13px; color: var(--color-text-primary);
      font-family: inherit; -webkit-appearance: none; appearance: none;
    }
    .tx-edit-input:focus { outline: none; border-color: var(--color-primary); }
    .tx-edit-input::placeholder { color: rgba(159,176,208,0.4); }

    /* ── Filter bar ── */
    .filter-bar { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; }
    .filter-bar select {
      flex: 1; min-width: 130px;
      background: rgba(255,255,255,0.06); border: 1px solid rgba(148,163,184,0.3);
      border-radius: 8px; padding: 7px 10px; font-size: 12px;
      color: var(--color-text-primary); font-family: inherit;
      -webkit-appearance: none; appearance: none;
    }
    .filter-bar select:focus { outline: none; border-color: var(--color-primary); }

    .tx-count-badge {
      font-size: 11px; font-weight: 700;
      background: rgba(106,166,255,0.12); border: 1px solid rgba(106,166,255,0.2);
      border-radius: 99px; padding: 2px 9px; color: var(--color-primary);
      white-space: nowrap; align-self: center;
    }

    /* ── Budget buckets ── */
    .bucket-summary-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 16px; }
    .bucket-summary-card { background: rgba(10,19,38,0.7); border: 1px solid var(--color-border); border-radius: 12px; padding: 10px 10px 8px; text-align: center; }
    .bucket-summary-label { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: .6px; color: var(--color-text-secondary); margin-bottom: 5px; }
    .bucket-summary-value { font-size: 18px; font-weight: 800; color: var(--color-primary); line-height: 1; margin-bottom: 2px; }
    .bucket-summary-sub   { font-size: 10px; color: var(--color-text-secondary); }
    .bucket-section { margin-bottom: 20px; }
    .bucket-section:last-child { margin-bottom: 0; }
    .bucket-section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; padding-bottom: 6px; border-bottom: 1px solid var(--color-border); }
    .bucket-section-title  { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .7px; color: var(--color-text-secondary); }
    .bucket-section-totals { font-size: 11px; color: var(--color-text-secondary); }
    .bucket-section-totals span { font-weight: 700; color: var(--color-text-primary); }
    .bucket-item { margin-bottom: 10px; }
    .bucket-item:last-child { margin-bottom: 0; }
    .bucket-item-row { display: flex; justify-content: space-between; align-items: baseline; gap: 8px; margin-bottom: 5px; }
    .bucket-item-name { font-size: 13px; color: var(--color-text-primary); flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .bucket-item-amounts { font-size: 12px; white-space: nowrap; flex-shrink: 0; }
    .bucket-item-actual  { font-weight: 700; }
    .bucket-item-budget  { color: var(--color-text-secondary); }
    .empty-bucket { font-size: 12px; color: var(--color-text-secondary); font-style: italic; padding: 6px 0 2px; }

    /* ── Admin ── */
    .admin-section { margin-bottom: 0; }
    .admin-section-header { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; cursor: pointer; border-bottom: 1px solid var(--color-border); user-select: none; }
    .admin-section-header:hover { opacity: .8; }
    .admin-section-left   { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .admin-section-title  { font-size: 13px; font-weight: 700; color: var(--color-text-secondary); }
    .admin-section-meta   { font-size: 11px; color: var(--color-text-secondary); background: rgba(106,166,255,0.1); border: 1px solid rgba(106,166,255,0.15); border-radius: 99px; padding: 2px 8px; }
    .admin-section-toggle { font-size: 10px; color: var(--color-text-secondary); flex-shrink: 0; }
    .admin-section-body   { padding: 10px 0 4px; }
    .admin-item-row { display: flex; align-items: center; gap: 8px; padding: 8px 0; border-bottom: 1px solid rgba(148,163,184,0.07); }
    .admin-item-row:last-of-type { border-bottom: none; }
    .admin-item-name   { flex: 1; font-size: 13px; color: var(--color-text-primary); }
    .admin-item-budget { font-size: 13px; font-weight: 700; color: var(--color-primary); min-width: 60px; text-align: right; }
    .admin-item-edit-row { display: flex; align-items: center; gap: 6px; padding: 6px 0; flex-wrap: wrap; border-bottom: 1px solid rgba(148,163,184,0.07); }
    .admin-add-row { display: flex; align-items: center; gap: 6px; padding: 10px 0 4px; flex-wrap: wrap; border-top: 1px solid rgba(148,163,184,0.07); margin-top: 4px; }
    .admin-btn { background: rgba(106,166,255,0.1); border: 1px solid rgba(106,166,255,0.2); border-radius: 8px; padding: 5px 10px; font-size: 12px; color: var(--color-primary); cursor: pointer; font-family: inherit; white-space: nowrap; }
    .admin-btn:hover { background: rgba(106,166,255,0.2); }
    .admin-btn-danger  { background: rgba(248,113,113,0.1);  border-color: rgba(248,113,113,0.2);  color: var(--color-danger);  }
    .admin-btn-danger:hover  { background: rgba(248,113,113,0.2); }
    .admin-btn-success { background: rgba(74,222,128,0.1);   border-color: rgba(74,222,128,0.2);   color: var(--color-success); }
    .admin-btn-success:hover { background: rgba(74,222,128,0.2); }
    .admin-input { background: rgba(255,255,255,0.06); border: 1px solid rgba(148,163,184,0.35); border-radius: 8px; padding: 7px 10px; font-size: 13px; color: var(--color-text-primary); font-family: inherit; }
    .admin-input:focus { outline: none; border-color: var(--color-primary); }
    .admin-input::placeholder { color: rgba(159,176,208,0.4); }

    /* ── Admin: Storage mode tile ── */
    .storage-mode-tile {
      display: flex; align-items: flex-start; gap: 12px;
      padding: 12px 14px; border-radius: 12px; margin-bottom: 12px;
      border: 1px solid var(--color-border);
    }
    .smt-pwa     { background: rgba(74,222,128,0.06);  border-color: rgba(74,222,128,0.2); }
    .smt-opfs    { background: rgba(74,222,128,0.10);  border-color: rgba(74,222,128,0.35); }
    .smt-browser { background: rgba(251,191,36,0.06);  border-color: rgba(251,191,36,0.25); }
    .smt-icon    { font-size: 22px; flex-shrink: 0; line-height: 1; padding-top: 2px; }
    .smt-body    { flex: 1; min-width: 0; }
    .smt-title   { font-size: 13px; font-weight: 700; color: var(--color-text-primary); margin-bottom: 4px; }
    .smt-sub     { font-size: 11px; color: var(--color-text-secondary); line-height: 1.5; }

    /* ── Storage layer indicator ── */
    .storage-layer-row {
      display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 12px;
    }
    .storage-layer-badge {
      display: flex; align-items: center; gap: 5px;
      padding: 5px 10px; border-radius: 8px; font-size: 11px; font-weight: 700;
      border: 1px solid;
    }
    .slb-active  { background: rgba(74,222,128,0.1); border-color: rgba(74,222,128,0.3); color: var(--color-success); }
    .slb-inactive{ background: rgba(148,163,184,0.06); border-color: rgba(148,163,184,0.15); color: rgba(159,176,208,0.4); }
    .slb-dot     { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }

    /* ── Admin: Install steps nudge ── */
    .install-steps {
      font-size: 12px; color: var(--color-text-secondary); line-height: 1.6;
      background: rgba(106,166,255,0.05); border: 1px solid rgba(106,166,255,0.15);
      border-radius: 10px; padding: 10px 12px; margin-bottom: 14px;
    }
    .install-steps strong { color: var(--color-primary); }

    /* ── Admin: Backup status row ── */
    .backup-status-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 10px 12px; border-radius: 10px; margin-bottom: 12px;
      background: rgba(10,19,38,0.7); border: 1px solid var(--color-border);
    }
    .backup-status-label { font-size: 12px; color: var(--color-text-secondary); font-weight: 600; }
    .backup-status-value { font-size: 12px; font-weight: 700; }
    .backup-status-value.backed     { color: var(--color-success); }
    .backup-status-value.not-backed { color: var(--color-warning); }

    /* ── Shared form ── */
    .form-group { margin-bottom: 12px; }
    .form-label { display: block; font-size: 13px; font-weight: 600; color: var(--color-text-secondary); margin-bottom: 6px; }
    .form-input, .form-select, .form-textarea {
      width: 100%; max-width: 100%; -webkit-appearance: none; appearance: none;
      background: rgba(255,255,255,0.06); border: 1px solid rgba(148,163,184,0.35);
      border-radius: 10px; padding: 10px 12px; font-size: 14px;
      color: var(--color-text-primary); font-family: inherit;
    }
    .form-input::placeholder, .form-textarea::placeholder { color: rgba(159,176,208,0.45); }
    .form-input:focus, .form-select:focus, .form-textarea:focus {
      outline: none; border-color: var(--color-primary);
      box-shadow: 0 0 0 1px rgba(106,166,255,0.4);
    }
    .form-textarea { min-height: 80px; resize: vertical; }
    .form-select optgroup { color: var(--color-text-secondary); font-size: 11px; font-weight: 700; }
    .form-select option    { color: var(--color-text-primary); background: #111b2e; }

    /* ── Buttons ── */
    .btn { display: inline-block; border: none; border-radius: 12px; padding: 10px 16px; font-size: 14px; font-weight: 700; cursor: pointer; color: #081226; background: linear-gradient(180deg,#6aa6ff,#4c86ff); box-shadow: 0 6px 16px rgba(76,134,255,0.3); }
    .btn:hover        { background: linear-gradient(180deg,#5a96ef,#4c86ff); }
    .btn-block        { width: 100%; text-align: center; }
    .btn-sm           { padding: 6px 12px; font-size: 12px; border-radius: 8px; box-shadow: none; }
    .btn-ghost        { background: rgba(106,166,255,0.1); border: 1px solid rgba(106,166,255,0.2); color: var(--color-primary); box-shadow: none; }
    .btn-ghost:hover      { background: rgba(106,166,255,0.2); }
    .btn-danger-sm        { background: rgba(248,113,113,0.12); border: 1px solid rgba(248,113,113,0.2); color: var(--color-danger); box-shadow: none; }
    .btn-danger-sm:hover  { background: rgba(248,113,113,0.22); }

    .text-muted { color: var(--color-text-secondary); font-size: 13px; }

    .log-form-panel {
      background: rgba(6,11,22,0.85); border: 1px solid rgba(148,163,184,0.2);
      border-radius: 12px; padding: 12px 12px 6px; overflow: hidden;
    }

    /* ── Monthly insight rows ── */
    .insight-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 7px 0; border-bottom: 1px solid rgba(148,163,184,0.07); font-size: 13px;
    }
    .insight-row:last-child { border-bottom: none; }
    .insight-row-label { color: var(--color-text-primary); flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .insight-row-value { font-weight: 700; white-space: nowrap; margin-left: 8px; flex-shrink: 0; }
    .section-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .6px; margin-bottom: 8px; }

    /* ── Monthly view-mode toggle ── */
    .view-mode-toggle {
      display: flex; align-items: center;
      background: rgba(10,19,38,0.7); border: 1px solid var(--color-border);
      border-radius: 10px; padding: 4px; gap: 4px; margin-bottom: 16px;
    }
    .view-mode-btn {
      flex: 1; text-align: center; padding: 7px 12px;
      font-size: 13px; font-weight: 700; border-radius: 7px;
      border: none; cursor: pointer; font-family: inherit;
      background: none; color: var(--color-text-secondary);
      transition: background .15s, color .15s;
    }
    .view-mode-btn.active {
      background: rgba(106,166,255,0.18);
      color: var(--color-primary);
      border: 1px solid rgba(106,166,255,0.25);
    }

    /* ── Month navigator ── */
    .month-nav {
      display: flex; align-items: center; justify-content: space-between;
      background: rgba(10,19,38,0.7); border: 1px solid var(--color-border);
      border-radius: 14px; padding: 10px 14px; margin-bottom: 16px;
    }
    .month-nav-btn {
      background: rgba(106,166,255,0.1); border: 1px solid rgba(106,166,255,0.2);
      border-radius: 9px; padding: 6px 14px; font-size: 18px; line-height: 1;
      color: var(--color-primary); cursor: pointer; font-family: inherit;
      transition: background .15s; user-select: none;
    }
    .month-nav-btn:hover  { background: rgba(106,166,255,0.22); }
    .month-nav-btn:active { background: rgba(106,166,255,0.32); }
    .month-nav-btn:disabled { opacity: .3; cursor: default; pointer-events: none; }
    .month-nav-center { flex: 1; text-align: center; padding: 0 10px; }
    .month-nav-label { font-size: 15px; font-weight: 700; color: var(--color-text-primary); display: block; }
    .month-nav-sub { font-size: 10px; font-weight: 500; color: var(--color-text-secondary); margin-top: 2px; display: block; letter-spacing: .3px; }

    /* ── Future / Long-term Goals ── */
    .goal-card {
      background: linear-gradient(180deg, rgba(15,26,46,0.92), rgba(11,18,32,0.92));
      border: 1px solid var(--color-border); border-radius: 16px;
      margin-bottom: 12px; overflow: hidden;
    }
    .goal-header { display: flex; align-items: center; gap: 10px; padding: 14px 16px; cursor: pointer; user-select: none; }
    .goal-header:hover { background: rgba(255,255,255,0.02); }
    .goal-icon  { font-size: 20px; flex-shrink: 0; line-height: 1; }
    .goal-title-group { flex: 1; min-width: 0; }
    .goal-title { font-size: 14px; font-weight: 700; color: var(--color-text-primary); }
    .goal-subtitle { font-size: 11px; color: var(--color-text-secondary); margin-top: 2px; }
    .goal-header-right { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
    .goal-pct-badge { font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 99px; background: rgba(106,166,255,0.12); border: 1px solid rgba(106,166,255,0.2); color: var(--color-primary); white-space: nowrap; }
    .goal-chevron { font-size: 10px; color: var(--color-text-secondary); }
    .goal-body { padding: 0 16px 16px; border-top: 1px solid var(--color-border); }
    .goal-progress-wrap { padding: 12px 0 14px; }
    .goal-progress-labels { display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 6px; }
    .goal-progress-current { font-weight: 700; }
    .goal-progress-target  { color: var(--color-text-secondary); }
    .goal-stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 14px; }
    .goal-stat-tile { background: rgba(10,19,38,0.7); border: 1px solid var(--color-border); border-radius: 10px; padding: 10px 12px; }
    .goal-stat-label { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: .6px; color: var(--color-text-secondary); margin-bottom: 4px; }
    .goal-stat-value { font-size: 17px; font-weight: 800; line-height: 1; color: var(--color-primary); }
    .goal-stat-sub   { font-size: 10px; color: var(--color-text-secondary); margin-top: 3px; }
    .goal-note { font-size: 12px; color: var(--color-text-secondary); font-style: italic; padding: 8px 0 12px; border-bottom: 1px solid var(--color-border); margin-bottom: 12px; line-height: 1.5; }
    .goal-edit-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 10px; }
    .goal-edit-grid .full { grid-column: 1 / -1; }
    .goal-field-label { font-size: 11px; font-weight: 600; color: var(--color-text-secondary); margin-bottom: 4px; display: block; }
    .goal-input { width: 100%; background: rgba(255,255,255,0.06); border: 1px solid rgba(148,163,184,0.35); border-radius: 8px; padding: 7px 10px; font-size: 13px; color: var(--color-text-primary); font-family: inherit; -webkit-appearance: none; appearance: none; }
    .goal-input:focus { outline: none; border-color: var(--color-primary); }
    .goal-input::placeholder { color: rgba(159,176,208,0.4); }
    .goal-actions { display: flex; gap: 8px; justify-content: flex-end; flex-wrap: wrap; }
    .goal-add-card { border: 2px dashed rgba(106,166,255,0.2); border-radius: 16px; padding: 16px; text-align: center; cursor: pointer; transition: border-color .15s, background .15s; margin-bottom: 12px; }
    .goal-add-card:hover { border-color: rgba(106,166,255,0.4); background: rgba(106,166,255,0.04); }
    .goal-add-label { font-size: 13px; color: var(--color-text-secondary); margin-top: 4px; }
    .goal-new-form { background: rgba(10,19,38,0.7); border: 1px solid var(--color-border); border-radius: 14px; padding: 14px; margin-bottom: 12px; }
    .goal-new-form-title { font-size: 13px; font-weight: 700; color: var(--color-text-primary); margin-bottom: 12px; }
    .goal-icon-picker { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 10px; }
    .goal-icon-opt { font-size: 20px; padding: 6px 8px; border-radius: 8px; cursor: pointer; border: 2px solid transparent; transition: border-color .1s, background .1s; background: rgba(255,255,255,0.04); }
    .goal-icon-opt.selected { border-color: var(--color-primary); background: rgba(106,166,255,0.12); }

    /* Goal type picker */
    .goal-type-grid { display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; margin-bottom:16px; }
    .goal-type-tile { padding:12px 8px; border-radius:12px; cursor:pointer; border:2px solid var(--color-border); background:rgba(255,255,255,0.03); text-align:center; transition:border-color .15s, background .15s; }
    .goal-type-tile:hover { border-color:rgba(106,166,255,0.3); background:rgba(106,166,255,0.05); }
    .goal-type-tile.selected { border-color:var(--color-primary); background:rgba(106,166,255,0.11); }
    .goal-type-icon { font-size:22px; line-height:1; margin-bottom:5px; }
    .goal-type-label { font-size:11px; font-weight:800; color:var(--color-text-primary); letter-spacing:.1px; }
    .goal-type-sub { font-size:9px; color:var(--color-text-secondary); margin-top:2px; line-height:1.3; }

    /* Debt payoff display */
    .debt-amort-row { display:flex; align-items:center; justify-content:space-between; padding:7px 0; border-bottom:1px solid var(--color-border); }
    .debt-amort-row:last-child { border-bottom:none; }
    .debt-vs-row { display:flex; align-items:flex-start; gap:10px; padding:10px 12px; border-radius:10px; margin-bottom:6px; background:rgba(10,19,38,0.5); border:1px solid var(--color-border); }

    /* ── Retirement Calculator ── */
    .ret-snapshot-hero { text-align:center; padding:16px 0 20px; }
    .ret-snapshot-label { font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:.7px; color:var(--color-text-secondary); margin-bottom:6px; }
    .ret-snapshot-value { font-size:38px; font-weight:800; color:var(--color-primary); line-height:1; }
    .ret-snapshot-sub   { font-size:12px; color:var(--color-text-secondary); margin-top:6px; line-height:1.4; }
    .ret-stacked-bar    { height:18px; border-radius:9px; overflow:hidden; display:flex; gap:2px; margin:8px 0 5px; }
    .ret-bar-contrib    { background:rgba(106,166,255,0.55); border-radius:9px 0 0 9px; transition:width .4s ease; min-width:4px; }
    .ret-bar-growth     { background:var(--color-success); border-radius:0 9px 9px 0; transition:width .4s ease; min-width:4px; }
    .ret-bar-labels     { display:flex; justify-content:space-between; font-size:11px; }
    .ret-table          { width:100%; border-collapse:collapse; min-width:340px; }
    .ret-table th       { font-size:10px; font-weight:800; text-transform:uppercase; letter-spacing:.4px; padding:0 5px 9px; }
    .ret-table td       { padding:7px 5px; font-size:12px; border-bottom:1px solid rgba(255,255,255,0.04); }
    .ret-table tr:last-child td { border-bottom:none; }
    .ret-row-retire td  { background:rgba(106,166,255,0.07); }
    .ret-row-retire td:first-child { border-radius:8px 0 0 8px; }
    .ret-row-retire td:last-child  { border-radius:0 8px 8px 0; }
    .ret-milestone-row  { display:flex; align-items:center; gap:12px; padding:9px 0; border-bottom:1px solid var(--color-border); }
    .ret-milestone-row:last-child { border-bottom:none; }
    .ret-milestone-icon { font-size:20px; flex-shrink:0; }
    .ret-milestone-info { flex:1; min-width:0; }
    .ret-milestone-main { font-size:13px; font-weight:700; color:var(--color-text-primary); }
    .ret-milestone-sub  { font-size:11px; color:var(--color-text-secondary); margin-top:2px; }
    .ret-income-row     { display:flex; align-items:center; justify-content:space-between; padding:9px 0; border-bottom:1px solid var(--color-border); }
    .ret-income-row:last-child { border-bottom:none; }

    /* ── Emergency Fund card ── */
    .ef-month-bar-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
    .ef-month-label { font-size: 11px; font-weight: 700; color: var(--color-text-secondary); width: 52px; flex-shrink: 0; }
    .ef-month-amount { font-size: 11px; color: var(--color-text-secondary); width: 64px; text-align: right; flex-shrink: 0; }
    .ef-milestone-row { display: flex; align-items: center; gap: 8px; padding: 10px 12px; border-radius: 10px; margin-bottom: 6px; background: rgba(10,19,38,0.6); border: 1px solid var(--color-border); }
    .ef-milestone-icon { font-size: 16px; flex-shrink: 0; }
    .ef-milestone-label { font: 700 12px/1.3 inherit; color: var(--color-text-primary); flex: 1; }
    .ef-milestone-sub   { font-size: 10px; color: var(--color-text-secondary); }
    .ef-milestone-value { font: 700 13px/1 inherit; white-space: nowrap; }
    .ef-month-selector  { display: flex; gap: 5px; flex-wrap: wrap; margin-top: 4px; }
    .ef-month-opt { padding: 5px 10px; border-radius: 8px; font-size: 12px; font-weight: 700; border: 1px solid var(--color-border); cursor: pointer; background: rgba(255,255,255,0.04); color: var(--color-text-secondary); transition: background .12s, color .12s, border-color .12s; }
    .ef-month-opt.active-baseline { background: rgba(100,200,120,0.15); border-color: var(--color-success); color: var(--color-success); }
    .ef-month-opt.active-goal     { background: rgba(106,166,255,0.15); border-color: var(--color-primary); color: var(--color-primary); }

    /* ── Home Purchase Planner card ── */
    .hp-scenario-tabs { display: flex; gap: 5px; margin-bottom: 14px; }
    .hp-scenario-tab  { flex: 1; text-align: center; padding: 7px 4px; border-radius: 9px; font-size: 12px; font-weight: 700; border: 1px solid var(--color-border); cursor: pointer; background: rgba(255,255,255,0.03); color: var(--color-text-secondary); transition: background .12s, color .12s; }
    .hp-scenario-tab.active { background: rgba(106,166,255,0.14); border-color: rgba(106,166,255,0.3); color: var(--color-primary); }
    .hp-section { margin-bottom: 16px; }
    .hp-section-title { font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: .8px; color: var(--color-text-secondary); margin-bottom: 8px; padding-bottom: 5px; border-bottom: 1px solid var(--color-border); }
    .hp-row { display: flex; justify-content: space-between; align-items: baseline; padding: 3px 0; }
    .hp-row-label { font-size: 12px; color: var(--color-text-secondary); }
    .hp-row-value { font-size: 13px; font-weight: 700; color: var(--color-text-primary); }
    .hp-row-value.highlight { color: var(--color-primary); font-size: 15px; }
    .hp-row-value.danger    { color: var(--color-danger);  }
    .hp-row-value.success   { color: var(--color-success); }
    .hp-total-row { display: flex; justify-content: space-between; align-items: baseline; padding: 8px 0; border-top: 1px solid var(--color-border); margin-top: 4px; }
    .hp-total-label { font-size: 13px; font-weight: 700; color: var(--color-text-primary); }
    .hp-total-value { font-size: 15px; font-weight: 800; color: var(--color-primary); }
    .hp-down-tabs   { display: flex; gap: 4px; flex-wrap: wrap; margin-bottom: 10px; }
    .hp-down-tab    { flex: 1; text-align: center; padding: 5px 4px; border-radius: 7px; font-size: 11px; font-weight: 700; border: 1px solid var(--color-border); cursor: pointer; min-width: 44px; background: rgba(255,255,255,0.03); color: var(--color-text-secondary); transition: background .12s, color .12s; }
    .hp-down-tab.active { background: rgba(106,166,255,0.14); border-color: rgba(106,166,255,0.3); color: var(--color-primary); }
    .hp-afford-row { display: flex; justify-content: space-between; align-items: flex-start; padding: 8px 10px; border-radius: 8px; margin-bottom: 5px; gap: 8px; background: rgba(10,19,38,0.5); border: 1px solid var(--color-border); }
    .hp-afford-label { font-size: 11px; color: var(--color-text-secondary); line-height: 1.4; flex: 1; }
    .hp-afford-value { font-size: 12px; font-weight: 700; white-space: nowrap; }
    .hp-inputs-group-label { font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: .8px; color: var(--color-text-secondary); margin-bottom: 8px; padding-bottom: 5px; border-bottom: 1px solid var(--color-border); }
    .hp-inputs-grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .hp-inputs-grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
    .hp-input-label   { display: block; font-size: 11px; font-weight: 600; color: var(--color-text-secondary); margin-bottom: 4px; }
    .hp-inputs-note   { font-size: 10px; color: var(--color-text-secondary); margin-top: 5px; line-height: 1.4; }
    .hp-scenario-row  { display: flex; gap: 6px; align-items: flex-end; margin-bottom: 8px; }
    .hp-scenario-label { width: 20px; flex-shrink: 0; padding-bottom: 8px; font-size: 11px; font-weight: 800; color: var(--color-text-secondary); }
    .hp-inputs-grid  { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 12px; }
    .hp-inputs-grid .full { grid-column: 1/-1; }
    .hp-input-group  { display: flex; flex-direction: column; gap: 4px; }

    /* ── Future tab inner nav ── */
    .future-tab-nav { display: flex; gap: 0; margin-bottom: 16px; background: rgba(10,19,38,0.7); border: 1px solid var(--color-border); border-radius: 12px; padding: 4px; overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
    .future-tab-nav::-webkit-scrollbar { display: none; }
    .future-tab-btn { flex: 0 0 auto; display: flex; flex-direction: column; align-items: center; gap: 3px; padding: 8px 14px; border-radius: 8px; cursor: pointer; border: none; background: none; font-family: inherit; transition: background .15s; min-width: 64px; }
    .future-tab-btn.active { background: rgba(106,166,255,0.16); border: 1px solid rgba(106,166,255,0.25); }
    .future-tab-icon  { font-size: 18px; line-height: 1; }
    .future-tab-label { font-size: 10px; font-weight: 700; color: var(--color-text-secondary); white-space: nowrap; letter-spacing: .2px; }
    .future-tab-btn.active .future-tab-label { color: var(--color-primary); }

    /* ── Overview summary rows ── */
    .overview-goal-row { display: flex; align-items: center; gap: 12px; padding: 12px 14px; cursor: pointer; transition: background .12s; }
    .overview-goal-row:hover { background: rgba(255,255,255,0.02); }
    .overview-goal-row + .overview-goal-row { border-top: 1px solid var(--color-border); }
    .overview-row-icon  { font-size: 22px; flex-shrink: 0; }
    .overview-row-info  { flex: 1; min-width: 0; }
    .overview-row-name  { font-size: 13px; font-weight: 700; color: var(--color-text-primary); }
    .overview-row-sub   { font-size: 11px; color: var(--color-text-secondary); margin-top: 2px; }
    .overview-row-right { flex-shrink: 0; text-align: right; }
    .overview-row-pct   { font-size: 14px; font-weight: 800; }
    .overview-row-arrow { font-size: 10px; color: var(--color-text-secondary); margin-top: 2px; }
    .overview-mini-bar  { margin-top: 6px; }

    /* ── Back to Top button ── */
    .back-to-top {
      position: fixed;
      bottom: calc(80px + env(safe-area-inset-bottom, 0px));
      right: 16px;
      z-index: 15;
      background: rgba(106,166,255,0.18);
      border: 1px solid rgba(106,166,255,0.35);
      color: var(--color-primary);
      border-radius: 50%;
      width: 42px; height: 42px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; line-height: 1;
      cursor: pointer;
      box-shadow: 0 4px 16px rgba(0,0,0,0.4);
      opacity: 0;
      pointer-events: none;
      transform: translateY(10px);
      transition: opacity .22s ease, transform .22s ease, background .15s;
    }
    .back-to-top.visible {
      opacity: 1;
      pointer-events: auto;
      transform: translateY(0);
    }
    .back-to-top:hover  { background: rgba(106,166,255,0.3); }

<script>
// ─────────────────────────────────────────
//  DEFAULT SEED DATA
// ─────────────────────────────────────────

const DEFAULT_BILLS = [

const DEFAULT_DISC = [
  "Restaurants / Takeout", "Groceries", "Gas / Fuel", "Shopping / Clothing",
  "Entertainment / Going Out", "Personal Care / Haircut", "Gifts / Holidays",
  "Pet Care", "Travel", "Home Supplies / Household", "Medical / Out-of-Pocket", "Misc"
].map(name => ({ id: name, name, budgetAmount: 0 }));

// ─────────────────────────────────────────
//  GLOBAL STATE
// ─────────────────────────────────────────

let appSettings = {
  recurringBills:          [],
  recurringSubscriptions:  [],
  recurringInvestments:    [],
  discretionaryCategories: []
};

let months       = {};
let plannerState = { currentHouseSavings: 0, scenarios: [], goals: [] };

let txSortOrder    = "newest";

let monthlyViewMode = "monthly";
let budgetViewKey   = null;
let budgetViewMode  = "monthly";

// ── Platform detection ──
const IS_IOS        = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
const IS_STANDALONE = window.matchMedia("(display-mode: standalone)").matches || !!navigator.standalone;
const HAS_SHARE     = typeof navigator.share === "function" && typeof navigator.canShare === "function";

// ── Save-system state ──
let fileStatus     = "loading";

// ── IndexedDB constants ──
const IDB_NAME      = "financeTrackerDB";
const IDB_VERSION   = 1;
const IDB_STATE     = "state";
const IDB_PREFS     = "prefs";
const IDB_STATE_KEY = "main";

// ── Backup nudge threshold (days) ──
const BACKUP_NUDGE_DAYS = 5;

// ─────────────────────────────────────────
//  HELPERS
// ─────────────────────────────────────────

function uid() {
  return crypto.randomUUID ? crypto.randomUUID() : String(Date.now() + Math.random());
}
function formatMonthKey(date) {
  return date.getFullYear() + "-" + String(date.getMonth() + 1).padStart(2, "0");
}
function formatMonthLabelFromKey(key) {
  const [y, m] = key.split("-");
  return new Date(+y, +m - 1, 1).toLocaleString(undefined, { month: "long", year: "numeric" });
}
function fmt(n) { return "$" + Number(n || 0).toFixed(2); }

function timeAgo(date) {
  if (!date) return null;
  const mins = Math.floor((Date.now() - date.getTime()) / 60000);
  if (mins < 1)  return "just now";
  if (mins < 60) return `${mins} min${mins > 1 ? "s" : ""} ago`;
  const hrs = Math.floor(mins / 60);
  if (hrs < 24)  return `${hrs} hour${hrs > 1 ? "s" : ""} ago`;
  const days = Math.floor(hrs / 24);
  return `${days} day${days > 1 ? "s" : ""} ago`;
}

function daysSince(date) {
  if (!date) return Infinity;
  return (Date.now() - date.getTime()) / 86400000;
}

function progressClass(actual, budget) {
  if (!budget) return "unset";

  const diff = actual - budget;       // dollars over/under
  const p    = actual / budget;       // percent of budget

  // 1) Red: clearly over budget (at least $2 above)
  if (diff >= 2) return "over";

  // 2) Blue: within a couple dollars of budget, up or down
  if (Math.abs(diff) <= 2) return "unset";

  // 3) Yellow: between ~80% and just below the blue band
  if (p >= 0.8) return "warn";

  // 4) Green: safely under ~80% of budget
  return "under";
}
function progressColor(cls) {
  return cls === "over"
    ? "var(--color-danger)"   // red
    : cls === "warn"
    ? "var(--color-warning)"  // yellow
    : cls === "under"
    ? "var(--color-success)"  // green
    : "var(--color-primary)"; // blue (for "unset" / on-target band)
}

function ensureMonthExists(key) {
  if (!months[key]) months[key] = { meta: { label: key }, transactions: [] };
}

function computeActuals(transactions) {
  const t = {};
  (transactions || []).forEach(tx => {
    if (!tx.category) return;
    t[tx.category] = (t[tx.category] || 0) + Number(tx.amount || 0);
  });
  return t;
}

// Returns the portion of rawActual that counts against YOUR budget (applies split ratio)
function getEffectiveActual(item, rawActual) {
  if (!item || typeof item === "string") return rawActual;
  if (!item.splitEnabled || !Number(item.splitFullAmount)) return rawActual;
  const yourShare  = Number(item.budgetAmount || 0);
  const fullAmount = Number(item.splitFullAmount);
  if (!fullAmount || !yourShare) return rawActual;
  return rawActual * (yourShare / fullAmount);
}

// Returns true if the annual charge has been posted (≥75% of annualTotal spent this year)
function isAnnualPaid(item, yearTxs) {
  if (!item || !item.annualEnabled) return false;
  const annualTotal = Number(item.annualTotal) || Number(item.budgetAmount || 0) * 12;
  if (!annualTotal) return false;
  const yearTotal = (yearTxs || [])
    .filter(t => t.category === item.name)
    .reduce((s, t) => s + Number(t.amount || 0), 0);
  return yearTotal >= annualTotal * 0.75;
}

// Applies split adjustments to a rawActuals map for all items in allItems
function computeEffectiveActuals(rawActuals, allItems) {
  const result = Object.assign({}, rawActuals);
  (allItems || []).forEach(item => {
    if (item.splitEnabled && Number(item.splitFullAmount) > 0) {
      result[item.name] = getEffectiveActual(item, rawActuals[item.name] || 0);
    }
  });
  return result;
}

function getSectionArray(section) {
  switch (section) {
    case "bills":  return appSettings.recurringBills;
    case "subs":   return appSettings.recurringSubscriptions;
    case "invsts": return appSettings.recurringInvestments;
    default:       return appSettings.discretionaryCategories;
  }
}

function buildCategoryOptions(selectedValue) {
  const groups = [
    { label: "Must Pay Bills",          items: appSettings.recurringBills },
    { label: "Subscriptions and Other", items: appSettings.recurringSubscriptions },
    { label: "Savings & Investments",   items: appSettings.recurringInvestments },
    { label: "Discretionary",           items: appSettings.discretionaryCategories }
  ];
  if (groups.every(g => g.items.length === 0))
    return `<option value="">— No categories configured. Add them in Admin —</option>`;
  return groups.filter(g => g.items.length > 0).map(g => `
    <optgroup label="${g.label}">
      ${g.items.map(i =>
        `<option value="${i.name}"${i.name === selectedValue ? " selected" : ""}>${i.name}</option>`
      ).join("")}
    </optgroup>`).join("");
}

// item = full item object (bills/subs/invsts) OR a plain string name (disc)
// rawActual = what was logged, budget = already-multiplied ceiling, yearTxs = for annual detection
function renderBucketItem(item, rawActual, budget, yearTxs) {
  // Backward-compat: if item is a string (discretionary), simple render
  if (typeof item === "string") {
    const pct   = budget ? Math.min((rawActual / budget) * 100, 100) : 0;
    const cls   = progressClass(rawActual, budget);
    const color = progressColor(cls);
    return `
      <div class="bucket-item">
        <div class="bucket-item-row">
          <div class="bucket-item-name">${item}</div>
          <div class="bucket-item-amounts">
            <span class="bucket-item-actual" style="color:${color};">${fmt(rawActual)}</span>
            <span class="bucket-item-budget"> / ${budget ? fmt(budget) : "—"}</span>
          </div>
        </div>
        <div class="progress-bar-track">
          <div class="progress-bar-fill ${cls}" style="width:${pct}%;"></div>
        </div>
      </div>`;
  }

  const name        = item.name;
const isSplit     = !!(item.splitEnabled && Number(item.splitFullAmount) > 0);
const isAnnual    = !!item.annualEnabled;
const annualTotal = isAnnual ? (Number(item.annualTotal) || Number(item.budgetAmount || 0) * 12) : 0;
const annualPaid  = isAnnual && isAnnualPaid(item, yearTxs);

let effectiveActual;
if (isAnnual) {
  effectiveActual = Number(budget || 0);
} else {
  effectiveActual = getEffectiveActual(item, rawActual);
}



  // Progress math: use effective actual vs budget; if annual paid → full green
  let pct, cls, color;
  if (annualPaid) {
    pct = 100; cls = "under"; color = "var(--color-success)";
  } else {
    pct   = budget ? Math.min((effectiveActual / budget) * 100, 100) : 0;
    cls   = progressClass(effectiveActual, budget);
    color = progressColor(cls);
  }

  // Split bar geometry
  let barHTML;
  if (isSplit) {
    const fullAmount   = Number(item.splitFullAmount);
    const yourShare    = Number(item.budgetAmount || 0);
    const partnerShare = Math.max(0, fullAmount - yourShare);
    const yourPct      = (yourShare / fullAmount) * 100;
    const partnerPct   = (partnerShare / fullAmount) * 100;
    // Within your portion, how much have you actually filled?
    const filledYourPct = annualPaid ? yourPct : Math.min((effectiveActual / yourShare) * yourPct, yourPct);
    const fillCls = annualPaid ? "under" : cls;
    barHTML = `
      <div class="split-bar-wrap${partnerShare === 0 ? " no-partner" : ""}">
        <div class="split-bar-your progress-bar-fill ${fillCls}" style="width:${filledYourPct}%;"></div>
        <div class="split-bar-partner" style="left:${yourPct}%;width:${partnerPct}%;"></div>
      </div>`;
  } else {
    barHTML = `
      <div class="progress-bar-track">
        <div class="progress-bar-fill ${cls}" style="width:${pct}%;"></div>
      </div>`;
  }

  // Amount display
  let amountRight;
if (isSplit) {
  const fullAmount = Number(item.splitFullAmount || 0);
  const yourShare  = Number(item.budgetAmount || 0);
  const basePartner = Math.max(0, fullAmount - yourShare);

  // Derive the per-view multiplier from budget vs yourShare (1 for monthly, YTD months for YTD)
  const mult = yourShare ? (budget / yourShare) : 1;
  const partnerShare = basePartner * mult;

  amountRight = `
    <div class="bucket-item-amounts" style="text-align:right">
      <span class="bucket-item-actual" style="color:${color}">${fmt(effectiveActual)}</span>
      <span class="bucket-item-budget">${budget ? fmt(budget) : ""}</span>
      <div style="font-size:10px;color:var(--color-text-secondary);margin-top:1px">
        ${fmt(partnerShare)} partner
      </div>
    </div>`;
} else {
  amountRight = `
    <div class="bucket-item-amounts">
      <span class="bucket-item-actual" style="color:${color}">${fmt(effectiveActual)}</span>
      <span class="bucket-item-budget">${budget ? fmt(budget) : ""}</span>
    </div>`;
}

  // Badges
  const badges = [];
  if (annualPaid) {
    badges.push(`<span class="bill-badge badge-annual-ok">✓ Paid for the year</span>`);
  } else if (isAnnual) {
    const annualBudgetMult = budget / (Number(item.budgetAmount || 1));
    badges.push(`<span class="bill-badge badge-annual-pending">📅 Annual · saving ${fmt(Number(item.budgetAmount || 0))}/mo</span>`);
  }
  if (isSplit && !annualPaid) {
  const fullAmount  = Number(item.splitFullAmount || 0);
  const yourShare   = Number(item.budgetAmount || 0);
  const basePartner = Math.max(0, fullAmount - yourShare);

  // Derive the view multiplier: 1 in monthly, number of months in YTD
  const mult = yourShare ? (budget / yourShare) : 1;
  const partnerShare = basePartner * mult;

  badges.push(
    `<span class="bill-badge badge-partner">Partner covers ${fmt(partnerShare)}</span>`
  );
}

  return `
    <div class="bucket-item">
      <div class="bucket-item-row">
        <div class="bucket-item-name">${name}</div>
        ${amountRight}
      </div>
      ${barHTML}
      ${badges.length ? `<div class="bill-meta-row">${badges.join("")}</div>` : ""}
    </div>`;
}

// ─────────────────────────────────────────
//  ORIGIN PRIVATE FILE SYSTEM (OPFS)
//  — most durable local storage on iOS 16.4+
// ─────────────────────────────────────────

const OPFS_FILENAME = "finance-tracker-state.json";

async function opfsWrite(data) {
  if (!HAS_OPFS) return false;
  try {
    const root    = await navigator.storage.getDirectory();
    const fh      = await root.getFileHandle(OPFS_FILENAME, { create: true });
    const writable = await fh.createWritable();
    await writable.write(data);
    await writable.close();
    return true;
  } catch(e) {
    console.warn("OPFS write failed:", e);
    return false;
  }
}

async function opfsRead() {
  if (!HAS_OPFS) return null;
  try {
    const root = await navigator.storage.getDirectory();
    const fh   = await root.getFileHandle(OPFS_FILENAME);
    const file = await fh.getFile();
    return await file.text();
  } catch(e) {
    // File doesn't exist yet — not an error
    return null;
  }
}

// ─────────────────────────────────────────
//  INDEXEDDB LAYER  (session cache / fallback)
// ─────────────────────────────────────────

function openIDB() {
  if (_idb) return Promise.resolve(_idb);
  return new Promise((res, rej) => {
    const req = indexedDB.open(IDB_NAME, IDB_VERSION);
    req.onupgradeneeded = e => {
      const db = e.target.result;
      [IDB_STATE, IDB_PREFS].forEach(s => {
        if (!db.objectStoreNames.contains(s)) db.createObjectStore(s);
      });
    };
    req.onsuccess = e => { _idb = e.target.result; res(_idb); };
    req.onerror   = e => rej(e.target.error);
  });
}
async function idbGet(store, key) {
  const db = await openIDB();
  return new Promise((res, rej) => {
    const r = db.transaction(store, "readonly").objectStore(store).get(key);
    r.onsuccess = e => res(e.target.result); r.onerror = e => rej(e.target.error);
  });
}
async function idbSet(store, key, val) {
  const db = await openIDB();
  return new Promise((res, rej) => {
    const r = db.transaction(store, "readwrite").objectStore(store).put(val, key);
    r.onsuccess = () => res(); r.onerror = e => rej(e.target.error);
  });
}

// ─────────────────────────────────────────
//  STORAGE PERSISTENCE REQUEST
//  — formally asks iOS not to evict data
// ─────────────────────────────────────────

async function requestPersistence() {
  if (!navigator.storage?.persist) return false;
  try {
    const granted = await navigator.storage.persist();
    console.log("Storage persistence granted:", granted);
    return granted;
  } catch(e) {
    console.warn("Storage persist request failed:", e);
    return false;
  }
}

async function checkPersistence() {
  if (!navigator.storage?.persisted) return false;
  try { return await navigator.storage.persisted(); } catch(e) { return false; }
}

// ─────────────────────────────────────────
//  BACKUP NUDGE
// ─────────────────────────────────────────

async function maybeShowBackupNudge() {
  // Don't nudge if backed up recently
  if (daysSince(lastExportedAt) < BACKUP_NUDGE_DAYS) return;
  // Don't nudge if we already showed it this session
  if (document.getElementById("backup-nudge-banner")) return;
  // Don't nudge if there's no data worth backing up
  const totalTxCount = Object.values(months).reduce((s, m) => s + (m.transactions?.length || 0), 0);
  if (totalTxCount === 0) return;
  // Check if user dismissed it today
  try {
    const dismissed = await idbGet(IDB_PREFS, "nudgeDismissedDate");
    if (dismissed) {
      const dismissedDate = new Date(dismissed).toDateString();
      if (dismissedDate === new Date().toDateString()) return;
    }
  } catch(e) {}

  const dayCount = lastExportedAt ? Math.floor(daysSince(lastExportedAt)) : null;
  const msg = dayCount !== null
    ? `It's been ${dayCount} days since your last backup.`
    : "You haven't exported a backup yet this session.";

  const el = document.createElement("div");
  el.id = "backup-nudge-banner";
  el.className = "banner-compact";
  el.innerHTML = `
    <span class="banner-compact-dot"></span>

function updateStatusChip() {
  const chip = document.getElementById("saveStatusChip");
  if (!chip) return;

  // Determine the best label based on storage layers available
  let icon, label, cls, clickable = false, title = "";

  if (fileStatus === "loading") {
    icon = "…"; label = "Loading…"; cls = "chip-saving";
  } else if (fileStatus === "ios-backed") {
    icon = "✓"; label = "Backup Saved ✓"; cls = "chip-ios-backed";
    title = lastExportedAt ? "Last backed up: " + lastExportedAt.toLocaleTimeString() : "";
  } else if (opfsAvailable && IS_STANDALONE) {
    icon = "✓"; label = "Protected (OPFS)"; cls = "chip-opfs";
    title = "Stored in the Origin Private File System — the most durable local storage available on iOS.";
  } else if (opfsAvailable) {
    icon = "✓"; label = "OPFS + Export"; cls = "chip-opfs";
    clickable = true;
    title = "OPFS active — most durable local storage. Tap to also export a dated backup.";
  } else if (IS_STANDALONE) {
    icon = "✓"; label = "Auto-Protected"; cls = "chip-ios-pwa";
    title = "Stored in the installed app — protected from the 7-day Safari timer.";
  } else {
    icon = "💾"; label = "Export Backup"; cls = "chip-ios-browser";
    clickable = true;
    title = "Your data is in Safari's memory — tap to export a dated backup to Files or iCloud.";
  }

  chip.className = "save-status-chip " + cls;
  chip.innerHTML = `<span class="chip-icon">${icon}</span><span id="chipLabel">${label}</span>`;
  chip.title     = title;
  chip.onclick   = clickable ? handleChipClick : null;
  chip.style.cursor = clickable ? "pointer" : "default";

// ─────────────────────────────────────────
//  PERSISTENCE  —  layered: OPFS → IDB → localStorage
// ─────────────────────────────────────────

function buildStateObject() { return { appSettings, months, plannerState, activeFileName }; }

function migrateMisplacedTransactions() {
  let changed = false;
  Object.keys(months).forEach(monthKey => {
    if (!Array.isArray(months[monthKey].transactions)) { months[monthKey].transactions = []; return; }
    const misplaced = [];
    months[monthKey].transactions = months[monthKey].transactions.filter(tx => {
      if (!tx.dateISO) return true;
      const [y, m] = tx.dateISO.split("-");
      const correctKey = y + "-" + m;
      if (correctKey !== monthKey) { misplaced.push({ tx, correctKey }); changed = true; return false; }
      return true;
    });
    misplaced.forEach(({ tx, correctKey }) => { ensureMonthExists(correctKey); months[correctKey].transactions.push(tx); });
  });
  if (changed) saveState();
}

function applyStateObject(state) {
  if (!state) state = {};
  appSettings  = { ...appSettings, ...(state.appSettings  || {}) };
  months       = state.months       || {};
  plannerState = { ...plannerState, ...(state.plannerState || {}) };
  if (state.activeFileName) activeFileName = state.activeFileName;

  if (!appSettings.recurringBills?.length)          appSettings.recurringBills          = DEFAULT_BILLS.map(i => ({ ...i }));
  if (!appSettings.recurringSubscriptions?.length)  appSettings.recurringSubscriptions  = DEFAULT_SUBS.map(i => ({ ...i }));
  if (!appSettings.recurringInvestments?.length)    appSettings.recurringInvestments    = DEFAULT_INVESTMENTS.map(i => ({ ...i }));
  if (!appSettings.discretionaryCategories?.length) appSettings.discretionaryCategories = DEFAULT_DISC.map(i => ({ ...i }));

  // Migrate: upgrade any generic "Retirement" goal to type="retirement"
  if (plannerState.goals) {
    plannerState.goals = plannerState.goals.map(g => {
      if (g.type === "generic" && g.name === "Retirement") {
        return {
          ...g,
          type: "retirement",
          retCurrentSavings: Number(g.currentAmount || 0),
          retMonthlyContrib: Number(g.monthlyContribution || 500),
          retCurrentAge:     g.retCurrentAge    || 35,
          retRetirementAge:  g.retRetirementAge || 65,
        };
      }
      return g;
    });
  }

  if (!plannerState.goals || plannerState.goals.length === 0) {
    plannerState.goals = [
      { id: uid(), type: "emergency", name: "Emergency Fund",  icon: "🛡️", currentAmount: 0, baselineMonths: 3, goalMonths: 6 },
      { id: uid(), type: "retirement", name: "Retirement",      icon: "🏖️", currentAmount: 0, monthlyContribution: 500, retCurrentSavings: 0, retMonthlyContrib: 500, retCurrentAge: 35, retRetirementAge: 65 },
      { id: uid(), type: "home", name: "Home Purchase", icon: "🏠",
        currentSavings: 0, monthlyNetIncome: 0,
        interestRate: 6.25, loanTermYears: 30, hoaFee: 300,
        propTaxRate: 1.7, hoiRate: 0.5, pmiRate: 0.75,
        lenderTitleRate: 2.0, appraisal: 600, inspection: 500,
        countyTaxRate: 0.5, stateTaxRate: 0.75, mortgageTaxRate: 0.375,
        prepaidEscrowRate: 2.0, attorneyFees: 750,
        movingCost: 1500, utilityDeposits: 350, furnishingsRate: 2.0,
        repairsRate: 1.0, reserveMonths: 3,
        scenarios: [{homePrice:225000,downPct:20},{homePrice:245000,downPct:20},{homePrice:265000,downPct:20}] }
    ];
  }

  (plannerState.goals || []).forEach(g => {
    if (!g.type) g.type = "generic";
    if (g.name === "Emergency Fund" && g.type === "generic") {
      g.type = "emergency"; g.baselineMonths = g.baselineMonths || 3; g.goalMonths = g.goalMonths || 6;
    }
    if ((g.name === "Home Down Payment" || g.name === "Home Purchase") && g.type === "generic") {
      g.type = "home"; g.currentSavings = g.currentAmount || 0; g.monthlyNetIncome = g.monthlyNetIncome || 0;
      g.interestRate = g.interestRate || 6.25; g.loanTermYears = g.loanTermYears || 30; g.hoaFee = g.hoaFee || 300;
      g.scenarios = g.scenarios || [{homePrice:225000,downPct:20},{homePrice:245000,downPct:20},{homePrice:265000,downPct:20}];
    }
    if (g.type === "home") {
      if (g.propTaxRate      == null) g.propTaxRate      = 1.7;
      if (g.hoiRate          == null) g.hoiRate          = 0.5;
      if (g.pmiRate          == null) g.pmiRate          = 0.75;
      if (g.lenderTitleRate  == null) g.lenderTitleRate  = 2.0;
      if (g.appraisal        == null) g.appraisal        = 600;
      if (g.inspection       == null) g.inspection       = 500;
      if (g.countyTaxRate    == null) g.countyTaxRate    = 0.5;
      if (g.stateTaxRate     == null) g.stateTaxRate     = 0.75;
      if (g.mortgageTaxRate  == null) g.mortgageTaxRate  = 0.375;
      if (g.prepaidEscrowRate== null) g.prepaidEscrowRate= 2.0;
      if (g.attorneyFees     == null) g.attorneyFees     = 750;
      if (g.movingCost       == null) g.movingCost       = 1500;
      if (g.utilityDeposits  == null) g.utilityDeposits  = 350;
      if (g.furnishingsRate  == null) g.furnishingsRate  = 2.0;
      if (g.repairsRate      == null) g.repairsRate      = 1.0;
      if (g.reserveMonths    == null) g.reserveMonths    = 3;
    }
  });

  migrateMisplacedTransactions();
  if (!activeMonthKey) activeMonthKey = formatMonthKey(new Date());
  if (!monthlyViewKey) monthlyViewKey = activeMonthKey;
  ensureMonthExists(activeMonthKey);
  renderAll();
}

async function loadState() {
  try {
    // ── 1. Request storage persistence from the browser ──
    //    This formally asks iOS not to evict our data.
    //    More likely to be granted when installed as a PWA.
    const persistGranted = await requestPersistence();
    console.log("Persistence granted:", persistGranted);

    // ── 2. Try OPFS first (most durable on iOS 16.4+) ──
    let raw = null;
    let source = "none";

    if (HAS_OPFS) {
      try {
        raw = await opfsRead();
        if (raw) { source = "opfs"; opfsAvailable = true; }
      } catch(e) { console.warn("OPFS read failed:", e); }
    }

    // ── 3. Fall back to IndexedDB ──
    if (!raw) {
      try {
        raw = await idbGet(IDB_STATE, IDB_STATE_KEY);
        if (raw) source = "idb";
      } catch(e) { console.warn("IDB read failed:", e); }
    }

    // ── 4. Fall back to localStorage + migrate up to OPFS/IDB ──
    if (!raw) {
      const ls = localStorage.getItem(STORAGE_KEY);
      if (ls) {
        raw = ls; source = "localStorage";
        // Migrate up to better storage
        try { await idbSet(IDB_STATE, IDB_STATE_KEY, raw); } catch(e) {}
        if (HAS_OPFS) {
          const wrote = await opfsWrite(raw);
          if (wrote) { opfsAvailable = true; }
        }
      }
    }

    const isFirstRun = !raw;
    applyStateObject(raw ? JSON.parse(raw) : {});

    console.log(`State loaded from: ${source}`);

    // ── 5. Restore lastExportedAt ──
    try {
      const ts = await idbGet(IDB_PREFS, "lastExportedAt");
      if (ts) lastExportedAt = new Date(ts);
    } catch(e) {}

    // ── 6. Set status chip ──
    if (IS_STANDALONE) {
      setFileStatus(opfsAvailable ? "ios-pwa" : "ios-pwa");
    } else {
      setFileStatus("ios-browser");
      showPersistentIOSBar();
    }

    // ── 7. Show first-run or backup nudge ──
    if (isFirstRun) {
      setTimeout(() => showFirstRunCard(), 300);
    } else {
      setTimeout(() => maybeShowBackupNudge(), 2000);
    }

  } catch(e) {
    console.error("loadState error:", e);
    applyStateObject({});
    setFileStatus("ios-browser");
  }
}

async function saveState() {
  clearTimeout(saveTimeout);
  saveTimeout = setTimeout(async () => {
    const data = JSON.stringify(buildStateObject());

    // Write to all available layers simultaneously
    const writes = [];

    // Layer 1: OPFS (most durable)
    if (HAS_OPFS) {
      writes.push(
        opfsWrite(data).then(ok => { if (ok) opfsAvailable = true; })
      );
    }

    // Layer 2: IndexedDB
    writes.push(
      idbSet(IDB_STATE, IDB_STATE_KEY, data).catch(e => console.warn("IDB save failed:", e))
    );

    // Layer 3: localStorage (last resort)
    try { localStorage.setItem(STORAGE_KEY, data); } catch(e) {}

    await Promise.allSettled(writes);
    updateStatusChip();
  }, 400);
}

async function openExistingBackup() {
  document.getElementById("importFileInput").click();
}

async function exportSnapshot() {
  // Read custom name from input if available, fall back to state variable
  const nameInput = document.getElementById("backupFileNameInput");
  if (nameInput) {
    const trimmed = nameInput.value.trim();
    if (trimmed) customBackupName = trimmed;
  }
  const baseName      = (customBackupName || "finance-backup").replace(/\.json$/i, "");
  const suggestedName = `${baseName}.json`;
  const data          = JSON.stringify(buildStateObject(), null, 2);

  async function onExportSuccess() {
    lastExportedAt = new Date();
    try { await idbSet(IDB_PREFS, "lastExportedAt", lastExportedAt.toISOString()); } catch(e) {}
    setFileStatus("ios-backed");
    updatePersistentIOSBar(true);
    dismissBanner("backup-nudge-banner");
    setTimeout(() => {
      setFileStatus(IS_STANDALONE ? "ios-pwa" : "ios-browser");
      updatePersistentIOSBar(false);
    }, 5000);
    if (activeView === "admin") renderAdminView();
  }

  // ── 1. Try File System Access API (opens native save dialog on desktop Chrome/Edge/Safari) ──
  if (typeof window.showSaveFilePicker === "function" && !IS_IOS) {
    try {
      const handle = await window.showSaveFilePicker({
        suggestedName,
        types: [{ description: "JSON Backup", accept: { "application/json": [".json"] } }]
      });
      const writable = await handle.createWritable();
      await writable.write(data);
      await writable.close();
      await onExportSuccess();
      return;
    } catch(e) {
      if (e.name === "AbortError") return;
      // Fall through to anchor download
    }
  }

  // ── 2. Anchor download — on iOS Safari this saves directly to Files app (Downloads folder) ──
  //       On desktop it triggers a normal browser download. No share sheet involved.
  const url = URL.createObjectURL(new Blob([data], { type: "application/json" }));
  const a = Object.assign(document.createElement("a"), { href: url, download: suggestedName });
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 10000);
  await onExportSuccess();
}

function importStateFromFile(file) {
  const r = new FileReader();
  r.onload = e => {
    try {
      applyStateObject(JSON.parse(e.target.result));
      activeFileName = file.name;
      saveState();
      renderAll();
    } catch(_) { alert("Could not import file. Please ensure it is a valid Finance Tracker .json backup."); }
  };
  r.readAsText(file);
}

function renderLogView() {
  const container = document.getElementById("logView");
  ensureMonthExists(activeMonthKey);
  const todayISO = new Date().toISOString().slice(0, 10);

  const allTxs = Object.entries(months).flatMap(([mk, mo]) =>
    (mo?.transactions || []).map(t => ({ ...t, _monthKey: mk }))
  );
  const usedCats = [...new Set(allTxs.map(t => t.category).filter(Boolean))].sort();

  let filtered = allTxs.filter(t => !txFilterCat || t.category === txFilterCat);
  filtered = [...filtered].sort((a, b) => {
    if (txSortOrder === "newest")      return b.dateISO.localeCompare(a.dateISO) || b.id.localeCompare(a.id);
    if (txSortOrder === "oldest")      return a.dateISO.localeCompare(b.dateISO);
    if (txSortOrder === "amount-desc") return Number(b.amount) - Number(a.amount);
    if (txSortOrder === "amount-asc")  return Number(a.amount) - Number(b.amount);
    return 0;
  });

  const recent = [...allTxs]
    .sort((a, b) => b.dateISO.localeCompare(a.dateISO) || b.id.localeCompare(a.id))
    .slice(0, 5);

  container.innerHTML = `
    <div class="card">
      <div class="card-header"><h2 class="card-title">Add Transaction</h2></div>
      <div class="card-body">
        <div class="log-form-panel">
          <div class="form-group">
            <label class="form-label">Date</label>
            <input id="logDateInput" type="date" class="form-input" value="${todayISO}">
          </div>
          <div class="form-group">
            <label class="form-label">Category</label>
            <select id="logCategoryInput" class="form-select">${buildCategoryOptions("")}</select>
          </div>
          <div class="form-group">
            <label class="form-label">Amount</label>
            <input id="logAmountInput" type="number" step="0.01" class="form-input" placeholder="0.00">
          </div>
          <div class="form-group">
            <label class="form-label">Note</label>
            <textarea id="logNoteInput" class="form-textarea" placeholder="Optional description"></textarea>
          </div>
          <button id="logAddBtn" class="btn btn-block" type="button">Add</button>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-header">
        <h2 class="card-title">Recent Transactions</h2>
        <span class="tx-count-badge">${allTxs.length} total</span>
      </div>
      <div class="card-body">
        ${recent.length === 0
          ? '<p class="text-muted">No transactions logged yet.</p>'
          : `<ul class="tx-list">${recent.map(t => renderTxRow(t, t._monthKey)).join("")}</ul>`}
      </div>
    </div>

    <div class="card">
      <div class="card-header">
        <h2 class="card-title">All Transactions</h2>
        <span class="tx-count-badge">${filtered.length} shown</span>
      </div>
      <div class="card-body">
        <div class="filter-bar">
          <select id="txFilterCatSelect">
            <option value="">All Categories</option>
            ${usedCats.map(c =>
              `<option value="${c}"${c === txFilterCat ? " selected" : ""}>${c}</option>`
            ).join("")}
          </select>
          <select id="txSortSelect">
            <option value="newest"      ${txSortOrder === "newest"      ? "selected" : ""}>Newest First</option>
            <option value="oldest"      ${txSortOrder === "oldest"      ? "selected" : ""}>Oldest First</option>
            <option value="amount-desc" ${txSortOrder === "amount-desc" ? "selected" : ""}>Amount: High → Low</option>
            <option value="amount-asc"  ${txSortOrder === "amount-asc"  ? "selected" : ""}>Amount: Low → High</option>
          </select>
        </div>
        ${filtered.length === 0
          ? '<p class="text-muted">No transactions match this filter.</p>'
          : `<ul class="tx-list">${filtered.map(t => renderTxRow(t, t._monthKey)).join("")}</ul>`}
      </div>
    </div>`;

  document.getElementById("logAddBtn").addEventListener("click", () => {
    const dateVal  = document.getElementById("logDateInput").value;
    const category = document.getElementById("logCategoryInput").value;
    const amount   = Number(document.getElementById("logAmountInput").value || 0);
    const note     = document.getElementById("logNoteInput").value.trim();
    if (!dateVal || !category || !amount) { alert("Please fill in date, category, and amount."); return; }
    const [dy, dm] = dateVal.split("-");
    const txMonthKey = dy + "-" + dm;
    ensureMonthExists(txMonthKey);
    months[txMonthKey].transactions.push({ id: uid(), dateISO: dateVal, category, amount, note });
    editingTxId = null; saveState(); renderLogView();
  });

  document.getElementById("txFilterCatSelect").addEventListener("change", e => { txFilterCat = e.target.value; renderLogView(); });
  document.getElementById("txSortSelect").addEventListener("change",      e => { txSortOrder = e.target.value; renderLogView(); });
  container.addEventListener("click",  handleTxClick);
  container.addEventListener("change", e => e.stopPropagation());

function handleTxClick(e) {
  const btn    = e.target.closest("[data-tx-action]");
  if (!btn) return;
  const action = btn.dataset.txAction;
  const id     = btn.dataset.id;

  if (action === "edit")        { editingTxId = id; renderLogView(); return; }
  if (action === "cancel-edit") { editingTxId = null; renderLogView(); return; }

  if (action === "save-edit") {
    const row = document.querySelector(`.tx-row[data-id="${id}"]`);
    if (!row) return;
    const srcMonthKey = row.dataset.month || activeMonthKey;
    const srcMonth    = months[srcMonthKey];
    const tx          = srcMonth?.transactions.find(t => t.id === id);
    if (!tx) return;
    const dateVal = row.querySelector("[data-field='dateISO']").value;
    const amount  = Number(row.querySelector("[data-field='amount']").value || 0);
    const cat     = row.querySelector("[data-field='category']").value;
    const note    = row.querySelector("[data-field='note']").value.trim();
    if (!dateVal || !cat || !amount) { alert("Date, category and amount are required."); return; }
    const [dy, dm]    = dateVal.split("-");
    const newMonthKey = dy + "-" + dm;
    if (newMonthKey !== srcMonthKey) {
      const idx = srcMonth.transactions.findIndex(t => t.id === id);
      if (idx !== -1) srcMonth.transactions.splice(idx, 1);
      ensureMonthExists(newMonthKey);
      months[newMonthKey].transactions.push({ ...tx, dateISO: dateVal, amount, category: cat, note });
    } else {
      tx.dateISO = dateVal; tx.amount = amount; tx.category = cat; tx.note = note;
    }
    editingTxId = null; saveState(); renderLogView(); return;
  }

  if (action === "delete") {
    if (!confirm("Delete this transaction?")) return;
    const row         = document.querySelector(`.tx-row[data-id="${id}"]`);
    const srcMonthKey = row?.dataset.month || activeMonthKey;
    const srcMonth    = months[srcMonthKey];
    if (srcMonth) {
      const idx = srcMonth.transactions.findIndex(t => t.id === id);
      if (idx !== -1) srcMonth.transactions.splice(idx, 1);
    }
    if (editingTxId === id) editingTxId = null;
    saveState(); renderLogView(); return;
  }
}
