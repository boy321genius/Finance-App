<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />
  <title>Finance Tracker</title>
  <meta name="theme-color" content="#0b1220" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Finance" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="description" content="Local-first personal finance tracker" />

  <link rel="manifest" href='data:application/manifest+json,{
    "name":"Finance Tracker","short_name":"Finance","description":"Local-first personal finance tracker",
    "start_url":"./","display":"standalone","background_color":"#0b1220","theme_color":"#0b1220","orientation":"portrait",
    "icons":[{"src":"data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 180 180%22%3E%3Crect width=%22180%22 height=%22180%22 rx=%2240%22 fill=%22%230b1220%22/%3E%3Ctext x=%2290%22 y=%22125%22 font-size=%22100%22 text-anchor=%22middle%22 fill=%22%23ffffff%22%3E$%3C/text%3E%3C/svg%3E","sizes":"180x180","type":"image/svg+xml"}]
  }' />

  <style>
    :root {
      --color-bg-primary:    #0b1220;
      --color-bg-secondary:  #111b2e;
      --color-text-primary:  #eaf1ff;
      --color-text-secondary:#9fb0d0;
      --color-border:        rgba(255,255,255,0.08);
      --color-primary:       #6aa6ff;
      --color-success:       #4ade80;
      --color-warning:       #fbbf24;
      --color-danger:        #f87171;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(180deg, #070c16 0%, #0b1220 60%, #0b1220 100%);
      color: var(--color-text-primary);
      min-height: 100vh;
      padding-bottom: 70px;
    }

    /* ── Header ── */
    .app-header {
      background: var(--color-bg-secondary);
      border-bottom: 1px solid var(--color-border);
      padding: calc(env(safe-area-inset-top,0) + 12px) 16px 12px;
      position: sticky; top: 0; z-index: 10;
      display: flex; align-items: center; justify-content: space-between; gap: 8px;
    }
    .header-text  { flex: 1; min-width: 0; }
    .app-title    { margin: 0; font-size: 20px; font-weight: 700; letter-spacing: .3px; }
    .app-subtitle { margin: 4px 0 0; font-size: 13px; color: var(--color-text-secondary); }

    /* ── Save Status Chip ── */
    .save-status-chip {
      display: flex; align-items: center; gap: 5px;
      border-radius: 10px; padding: 7px 12px; font-size: 12px; font-weight: 700;
      font-family: inherit; white-space: nowrap; transition: all .2s;
      border: 1px solid transparent; user-select: none; background: none; cursor: default;
    }
    .chip-icon { font-size: 13px; line-height: 1; }
    .chip-warn    { background: rgba(251,191,36,0.1);   border-color: rgba(251,191,36,0.3);   color: var(--color-warning); cursor: pointer; }
    .chip-warn:hover   { background: rgba(251,191,36,0.18); }
    .chip-saving  { background: rgba(106,166,255,0.07); border-color: rgba(106,166,255,0.18); color: var(--color-text-secondary); }
    .chip-idbonly   { background: rgba(74,222,128,0.06);  border-color: rgba(74,222,128,0.18);  color: var(--color-success); }
    .chip-opfs      { background: rgba(74,222,128,0.10);  border-color: rgba(74,222,128,0.30);  color: var(--color-success); font-weight: 800; }
    .chip-ios-browser{ background: rgba(251,191,36,0.1);   border-color: rgba(251,191,36,0.3);   color: var(--color-warning); cursor: pointer; }
    .chip-ios-browser:hover { background: rgba(251,191,36,0.18); }
    .chip-ios-pwa    { background: rgba(74,222,128,0.07);  border-color: rgba(74,222,128,0.22);  color: var(--color-success); }
    .chip-ios-backed { background: rgba(74,222,128,0.14);  border-color: rgba(74,222,128,0.4);   color: var(--color-success); font-weight: 800; }

    /* ── Protection Level Component ── */
    .protect-meter {
      display: flex; gap: 0; margin: 12px 0 14px; border-radius: 10px;
      overflow: hidden; border: 1px solid var(--color-border);
    }
    .protect-tier {
      flex: 1; padding: 9px 8px 8px; text-align: center;
      background: rgba(10,19,38,0.7); border-right: 1px solid var(--color-border);
      transition: background .2s;
    }
    .protect-tier:last-child { border-right: none; }
    .protect-tier.active-tier { background: rgba(74,222,128,0.08); }
    .protect-tier.active-tier-warn { background: rgba(251,191,36,0.07); }
    .protect-dot { font-size: 9px; letter-spacing: 2px; margin-bottom: 4px; }
    .protect-label { font-size: 10px; font-weight: 700; color: var(--color-text-secondary); line-height: 1.3; }
    .protect-tier.active-tier .protect-label { color: var(--color-success); }
    .protect-tier.active-tier-warn .protect-label { color: var(--color-warning); }
    .protect-sub { font-size: 9px; color: var(--color-text-secondary); margin-top: 2px; line-height: 1.3; opacity: 0.8; }

    /* ── Banners ── */
    .app-banner {
      display: flex; align-items: flex-start; gap: 10px;
      padding: 11px 16px; font-size: 13px; line-height: 1.4;
      border-bottom: 1px solid var(--color-border);
      animation: bannerSlide .25s ease;
    }
    @keyframes bannerSlide { from { opacity:0; transform:translateY(-8px); } to { opacity:1; transform:translateY(0); } }
    .banner-install   { background: rgba(106,166,255,0.06); }
    .banner-ios-save  { background: rgba(251,191,36,0.06); }
    .banner-icon  { font-size: 20px; flex-shrink: 0; padding-top: 1px; }
    .banner-body  { flex: 1; min-width: 0; }
    .banner-title { font-weight: 700; color: var(--color-text-primary); }
    .banner-sub   { font-size: 11px; color: var(--color-text-secondary); margin-top: 3px; line-height: 1.5; }
    .banner-actions { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 8px; }
    .banner-btn {
      border-radius: 8px; padding: 5px 12px; font-size: 12px; font-weight: 700;
      cursor: pointer; font-family: inherit; white-space: nowrap; border: 1px solid;
      transition: background .15s;
    }
    .bbn-blue  { background: rgba(106,166,255,0.12); border-color: rgba(106,166,255,0.3); color: var(--color-primary); }
    .bbn-blue:hover  { background: rgba(106,166,255,0.22); }
    .bbn-green { background: rgba(74,222,128,0.1);   border-color: rgba(74,222,128,0.3);  color: var(--color-success); }
    .bbn-green:hover { background: rgba(74,222,128,0.2); }
    .bbn-warn  { background: rgba(251,191,36,0.1);   border-color: rgba(251,191,36,0.3);  color: var(--color-warning); }
    .bbn-warn:hover  { background: rgba(251,191,36,0.2); }
    .banner-dismiss {
      background: none; border: none; color: var(--color-text-secondary); cursor: pointer;
      font-size: 18px; padding: 0 2px; line-height: 1; flex-shrink: 0; margin-top: -1px;
    }
    .banner-dismiss:hover { color: var(--color-text-primary); }

    /* ── iOS Warning Info Box (first-run card) ── */
    .ios-warn-box {
      background: rgba(30,22,8,0.85); border: 1px solid rgba(251,191,36,0.25);
      border-radius: 12px; padding: 12px 14px; margin: 14px 0 4px; text-align: left;
    }
    .ios-warn-item {
      display: flex; align-items: flex-start; gap: 10px; padding: 6px 0;
      border-bottom: 1px solid rgba(251,191,36,0.1);
    }
    .ios-warn-item:last-child { border-bottom: none; padding-bottom: 0; }
    .ios-warn-item:first-child { padding-top: 0; }
    .ios-warn-item-icon { font-size: 16px; flex-shrink: 0; margin-top: 1px; line-height: 1.2; }
    .ios-warn-item-text { font-size: 12px; color: var(--color-text-secondary); line-height: 1.5; }
    .ios-warn-item-text strong { color: var(--color-text-primary); font-weight: 700; }

    /* ── Persistent iOS warning bar ── */
    .ios-persistent-bar {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 16px; font-size: 12px; font-weight: 600;
      border-bottom: 1px solid rgba(251,191,36,0.2);
      background: rgba(20,14,4,0.9);
      transition: background .4s, border-color .4s;
    }
    .ios-persistent-bar.backed-up {
      background: rgba(4,20,10,0.9); border-color: rgba(74,222,128,0.2);
    }
    .ios-bar-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--color-warning); flex-shrink: 0; transition: background .4s;
    }
    .ios-persistent-bar.backed-up .ios-bar-dot { background: var(--color-success); }
    .ios-bar-text { flex: 1; color: var(--color-text-secondary); line-height: 1.4; }
    .ios-persistent-bar.backed-up .ios-bar-text { color: var(--color-success); }

    /* ── Compact inline banner ── */
    .banner-compact {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 14px; font-size: 12px; font-weight: 600;
      border-bottom: 1px solid rgba(251,191,36,0.2);
      background: rgba(251,191,36,0.07);
      animation: bannerSlide .25s ease;
    }
    .banner-compact-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--color-warning); flex-shrink: 0; }
    .banner-compact-text { flex: 1; color: var(--color-text-secondary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .banner-compact-btn {
      background: rgba(251,191,36,0.14); border: 1px solid rgba(251,191,36,0.35);
      border-radius: 7px; padding: 4px 10px; font-size: 11px; font-weight: 700;
      color: var(--color-warning); cursor: pointer; font-family: inherit; white-space: nowrap; flex-shrink: 0;
    }
    .banner-compact-btn:hover { background: rgba(251,191,36,0.24); }
    .banner-compact-dismiss { background: none; border: none; color: rgba(159,176,208,0.5); cursor: pointer; font-size: 15px; padding: 0 0 0 4px; flex-shrink: 0; }

    /* ── First-Run Overlay ── */
    .fr-overlay {
      position: fixed; inset: 0; background: rgba(7,12,22,0.93); backdrop-filter: blur(4px);
      z-index: 200; display: flex; align-items: center; justify-content: center; padding: 24px;
      animation: frFade .3s ease;
    }
    @keyframes frFade { from { opacity:0; } to { opacity:1; } }
    .fr-card {
      background: var(--color-bg-secondary); border: 1px solid var(--color-border);
      border-radius: 20px; padding: 28px 22px; max-width: 360px; width: 100%; text-align: center;
    }
    .fr-emoji { font-size: 52px; margin-bottom: 14px; line-height: 1; }
    .fr-title { font-size: 20px; font-weight: 800; margin: 0 0 8px; color: var(--color-text-primary); }
    .fr-sub   { font-size: 13px; color: var(--color-text-secondary); margin: 0 0 22px; line-height: 1.55; }
    .fr-btns  { display: flex; flex-direction: column; gap: 10px; }
    .fr-divider { border: none; border-top: 1px solid var(--color-border); margin: 6px 0; }
    .fr-hint  { font-size: 11px; color: var(--color-text-secondary); margin: 2px 0 0; line-height: 1.4; }

    /* ── Layout ── */
    .content { max-width: 800px; margin: 0 auto; padding: 16px; }
    .view        { display: none; }
    .view.active { display: block; }

    /* ── Card ── */
    .card {
      background: linear-gradient(180deg, rgba(15,26,46,0.92), rgba(11,18,32,0.92));
      border: 1px solid var(--color-border); border-radius: 16px;
      padding: 16px; margin-bottom: 16px;
    }
    .card-header {
      margin-bottom: 12px;
      display: flex; align-items: center; justify-content: space-between; gap: 8px;
    }
    .card-title { margin: 0; font-size: 16px; font-weight: 700; }
    .card-body  { font-size: 14px; color: var(--color-text-secondary); }

    /* ── Stat tiles ── */
    .stat-grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .stat-grid-4 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .stat-tile {
      background: rgba(10,19,38,0.7); border: 1px solid var(--color-border);
      border-radius: 12px; padding: 12px; text-align: center;
    }
    .stat-tile-label {
      font-size: 9px; font-weight: 700; text-transform: uppercase;
      letter-spacing: .6px; color: var(--color-text-secondary); margin-bottom: 4px;
    }
    .stat-tile-value { font-size: 22px; font-weight: 800; line-height: 1; }
    .stat-tile-sub   { font-size: 10px; color: var(--color-text-secondary); margin-top: 3px; }

    .health-tile {
      background: rgba(10,19,38,0.7); border: 1px solid var(--color-border);
      border-radius: 10px; padding: 10px;
      display: flex; align-items: center; gap: 8px;
    }
    .health-tile-icon  { font-size: 18px; flex-shrink: 0; }
    .health-tile-count { font-size: 18px; font-weight: 800; line-height: 1; }
    .health-tile-label { font-size: 10px; color: var(--color-text-secondary); margin-top: 1px; }

    /* ── Progress bars ── */
    .progress-bar-track { width: 100%; height: 6px; background: rgba(255,255,255,0.07); border-radius: 99px; overflow: hidden; }
    .progress-bar-track.thick { height: 10px; }
    .progress-bar-fill  { height: 100%; border-radius: 99px; transition: width .3s ease; }
    .progress-bar-fill.under { background: var(--color-success); }
    .progress-bar-fill.warn  { background: var(--color-warning); }
    .progress-bar-fill.over  { background: var(--color-danger);  }
    .progress-bar-fill.unset { background: rgba(106,166,255,0.45); }

    /* ── Transaction rows ── */
    .tx-list { list-style: none; padding: 0; margin: 0; }
    .tx-row  { padding: 9px 0; border-bottom: 1px solid rgba(148,163,184,0.1); }
    .tx-row:last-child { border-bottom: none; }
    .tx-row-display { display: flex; justify-content: space-between; align-items: center; gap: 8px; }
    .tx-row-left  { flex: 1; min-width: 0; }
    .tx-row-cat   { font-size: 13px; color: var(--color-text-primary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .tx-row-meta  { font-size: 11px; color: var(--color-text-secondary); margin-top: 2px; }
    .tx-row-right { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
    .tx-row-amount { font-size: 14px; font-weight: 700; color: var(--color-primary); white-space: nowrap; }
    .tx-action-btn {
      background: none; border: none; padding: 4px 5px; cursor: pointer;
      font-size: 14px; border-radius: 6px; line-height: 1; transition: background .15s;
    }
    .tx-action-btn:hover { background: rgba(255,255,255,0.07); }
    .tx-edit-form { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; padding: 8px 0 4px; }
    .tx-edit-form .full { grid-column: 1 / -1; }
    .tx-edit-form .tx-edit-actions { grid-column: 1 / -1; display: flex; gap: 6px; justify-content: flex-end; }
    .tx-edit-input {
      width: 100%; background: rgba(255,255,255,0.06);
      border: 1px solid rgba(148,163,184,0.35); border-radius: 8px;
      padding: 7px 10px; font-size: 13px; color: var(--color-text-primary);
      font-family: inherit; -webkit-appearance: none; appearance: none;
    }
    .tx-edit-input:focus { outline: none; border-color: var(--color-primary); }
    .tx-edit-input::placeholder { color: rgba(159,176,208,0.4); }

    /* ── Filter bar ── */
    .filter-bar { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; }
    .filter-bar select {
      flex: 1; min-width: 130px;
      background: rgba(255,255,255,0.06); border: 1px solid rgba(148,163,184,0.3);
      border-radius: 8px; padding: 7px 10px; font-size: 12px;
      color: var(--color-text-primary); font-family: inherit;
      -webkit-appearance: none; appearance: none;
    }
    .filter-bar select:focus { outline: none; border-color: var(--color-primary); }

    .tx-count-badge {
      font-size: 11px; font-weight: 700;
      background: rgba(106,166,255,0.12); border: 1px solid rgba(106,166,255,0.2);
      border-radius: 99px; padding: 2px 9px; color: var(--color-primary);
      white-space: nowrap; align-self: center;
    }

    /* ── Budget buckets ── */
    .bucket-summary-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 16px; }
    .bucket-summary-card { background: rgba(10,19,38,0.7); border: 1px solid var(--color-border); border-radius: 12px; padding: 10px 10px 8px; text-align: center; }
    .bucket-summary-label { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: .6px; color: var(--color-text-secondary); margin-bottom: 5px; }
    .bucket-summary-value { font-size: 18px; font-weight: 800; color: var(--color-primary); line-height: 1; margin-bottom: 2px; }
    .bucket-summary-sub   { font-size: 10px; color: var(--color-text-secondary); }
    .bucket-section { margin-bottom: 20px; }
    .bucket-section:last-child { margin-bottom: 0; }
    .bucket-section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; padding-bottom: 6px; border-bottom: 1px solid var(--color-border); }
    .bucket-section-title  { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .7px; color: var(--color-text-secondary); }
    .bucket-section-totals { font-size: 11px; color: var(--color-text-secondary); }
    .bucket-section-totals span { font-weight: 700; color: var(--color-text-primary); }
    .bucket-item { margin-bottom: 10px; }
    .bucket-item:last-child { margin-bottom: 0; }
    .bucket-item-row { display: flex; justify-content: space-between; align-items: baseline; gap: 8px; margin-bottom: 5px; }
    .bucket-item-name { font-size: 13px; color: var(--color-text-primary); flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .bucket-item-amounts { font-size: 12px; white-space: nowrap; flex-shrink: 0; }
    .bucket-item-actual  { font-weight: 700; }
    .bucket-item-budget  { color: var(--color-text-secondary); }
    .empty-bucket { font-size: 12px; color: var(--color-text-secondary); font-style: italic; padding: 6px 0 2px; }

    /* ── Admin ── */
    .admin-section { margin-bottom: 0; }
    .admin-section-header { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; cursor: pointer; border-bottom: 1px solid var(--color-border); user-select: none; }
    .admin-section-header:hover { opacity: .8; }
    .admin-section-left   { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .admin-section-title  { font-size: 13px; font-weight: 700; color: var(--color-text-secondary); }
    .admin-section-meta   { font-size: 11px; color: var(--color-text-secondary); background: rgba(106,166,255,0.1); border: 1px solid rgba(106,166,255,0.15); border-radius: 99px; padding: 2px 8px; }
    .admin-section-toggle { font-size: 10px; color: var(--color-text-secondary); flex-shrink: 0; }
    .admin-section-body   { padding: 10px 0 4px; }
    .admin-item-row { display: flex; align-items: center; gap: 8px; padding: 8px 0; border-bottom: 1px solid rgba(148,163,184,0.07); }
    .admin-item-row:last-of-type { border-bottom: none; }
    .admin-item-name   { flex: 1; font-size: 13px; color: var(--color-text-primary); }
    .admin-item-budget { font-size: 13px; font-weight: 700; color: var(--color-primary); min-width: 60px; text-align: right; }
    .admin-item-edit-row { display: flex; align-items: center; gap: 6px; padding: 6px 0; flex-wrap: wrap; border-bottom: 1px solid rgba(148,163,184,0.07); }
    .admin-add-row { display: flex; align-items: center; gap: 6px; padding: 10px 0 4px; flex-wrap: wrap; border-top: 1px solid rgba(148,163,184,0.07); margin-top: 4px; }
    .admin-btn { background: rgba(106,166,255,0.1); border: 1px solid rgba(106,166,255,0.2); border-radius: 8px; padding: 5px 10px; font-size: 12px; color: var(--color-primary); cursor: pointer; font-family: inherit; white-space: nowrap; }
    .admin-btn:hover { background: rgba(106,166,255,0.2); }
    .admin-btn-danger  { background: rgba(248,113,113,0.1);  border-color: rgba(248,113,113,0.2);  color: var(--color-danger);  }
    .admin-btn-danger:hover  { background: rgba(248,113,113,0.2); }
    .admin-btn-success { background: rgba(74,222,128,0.1);   border-color: rgba(74,222,128,0.2);   color: var(--color-success); }
    .admin-btn-success:hover { background: rgba(74,222,128,0.2); }
    .admin-input { background: rgba(255,255,255,0.06); border: 1px solid rgba(148,163,184,0.35); border-radius: 8px; padding: 7px 10px; font-size: 13px; color: var(--color-text-primary); font-family: inherit; }
    .admin-input:focus { outline: none; border-color: var(--color-primary); }
    .admin-input::placeholder { color: rgba(159,176,208,0.4); }

    /* ── Admin: Storage mode tile ── */
    .storage-mode-tile {
      display: flex; align-items: flex-start; gap: 12px;
      padding: 12px 14px; border-radius: 12px; margin-bottom: 12px;
      border: 1px solid var(--color-border);
    }
    .smt-pwa     { background: rgba(74,222,128,0.06);  border-color: rgba(74,222,128,0.2); }
    .smt-opfs    { background: rgba(74,222,128,0.10);  border-color: rgba(74,222,128,0.35); }
    .smt-browser { background: rgba(251,191,36,0.06);  border-color: rgba(251,191,36,0.25); }
    .smt-icon    { font-size: 22px; flex-shrink: 0; line-height: 1; padding-top: 2px; }
    .smt-body    { flex: 1; min-width: 0; }
    .smt-title   { font-size: 13px; font-weight: 700; color: var(--color-text-primary); margin-bottom: 4px; }
    .smt-sub     { font-size: 11px; color: var(--color-text-secondary); line-height: 1.5; }

    /* ── Storage layer indicator ── */
    .storage-layer-row {
      display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 12px;
    }
    .storage-layer-badge {

function uid() {
  return crypto.randomUUID ? crypto.randomUUID() : String(Date.now() + Math.random());
}
function formatMonthKey(date) {
  return date.getFullYear() + "-" + String(date.getMonth() + 1).padStart(2, "0");
}
function formatMonthLabelFromKey(key) {
  const [y, m] = key.split("-");
  return new Date(+y, +m - 1, 1).toLocaleString(undefined, { month: "long", year: "numeric" });
}
function fmt(n) { return "$" + Number(n || 0).toFixed(2); }

function timeAgo(date) {
  if (!date) return null;
  const mins = Math.floor((Date.now() - date.getTime()) / 60000);
  if (mins < 1)  return "just now";
  if (mins < 60) return `${mins} min${mins > 1 ? "s" : ""} ago`;
  const hrs = Math.floor(mins / 60);
  if (hrs < 24)  return `${hrs} hour${hrs > 1 ? "s" : ""} ago`;
  const days = Math.floor(hrs / 24);
  return `${days} day${days > 1 ? "s" : ""} ago`;
}

function daysSince(date) {
  if (!date) return Infinity;
  return (Date.now() - date.getTime()) / 86400000;
}

function progressClass(actual, budget) {
  if (!budget) return "unset";
  const p = actual / budget;
  return p >= 1 ? "over" : p >= 0.8 ? "warn" : "under";
}
function progressColor(cls) {
  return cls === "over"  ? "var(--color-danger)"
       : cls === "warn"  ? "var(--color-warning)"
       : cls === "under" ? "var(--color-success)"
       :                   "var(--color-primary)";
}

function ensureMonthExists(key) {
  if (!months[key]) months[key] = { meta: { label: key }, transactions: [] };
}

function computeActuals(transactions) {
  const t = {};
  (transactions || []).forEach(tx => {
    if (!tx.category) return;
    t[tx.category] = (t[tx.category] || 0) + Number(tx.amount || 0);
  });
  return t;
}

function getSectionArray(section) {
  switch (section) {
    case "bills":  return appSettings.recurringBills;
    case "subs":   return appSettings.recurringSubscriptions;
    case "invsts": return appSettings.recurringInvestments;
    default:       return appSettings.discretionaryCategories;
  }
}

function buildCategoryOptions(selectedValue) {
  const groups = [
    { label: "Must Pay Bills",          items: appSettings.recurringBills },
    { label: "Subscriptions and Other", items: appSettings.recurringSubscriptions },
    { label: "Savings & Investments",   items: appSettings.recurringInvestments },
    { label: "Discretionary",           items: appSettings.discretionaryCategories }
  ];
  if (groups.every(g => g.items.length === 0))
    return `<option value="">— No categories configured. Add them in Admin —</option>`;
  return groups.filter(g => g.items.length > 0).map(g => `
    <optgroup label="${g.label}">
      ${g.items.map(i =>
        `<option value="${i.name}"${i.name === selectedValue ? " selected" : ""}>${i.name}</option>`
      ).join("")}
    </optgroup>`).join("");
}

function renderBucketItem(name, actual, budget) {
  const pct   = budget ? Math.min((actual / budget) * 100, 100) : 0;
  const cls   = progressClass(actual, budget);

  return `
    <div class="bucket-item">

// ─────────────────────────────────────────
//  ORIGIN PRIVATE FILE SYSTEM (OPFS)
//  — most durable local storage on iOS 16.4+
// ─────────────────────────────────────────

const OPFS_FILENAME = "finance-tracker-state.json";

async function opfsWrite(data) {
  if (!HAS_OPFS) return false;
  try {
    const root    = await navigator.storage.getDirectory();
    const fh      = await root.getFileHandle(OPFS_FILENAME, { create: true });
    const writable = await fh.createWritable();
    await writable.write(data);
    await writable.close();
    return true;
  } catch(e) {
    console.warn("OPFS write failed:", e);
    return false;
  }
}

async function opfsRead() {
  if (!HAS_OPFS) return null;
  try {
    const root = await navigator.storage.getDirectory();
    const fh   = await root.getFileHandle(OPFS_FILENAME);
    const file = await fh.getFile();
    return await file.text();
  } catch(e) {
    // File doesn't exist yet — not an error
    return null;
  }
}

// ─────────────────────────────────────────
//  INDEXEDDB LAYER  (session cache / fallback)
// ─────────────────────────────────────────

function openIDB() {
  if (_idb) return Promise.resolve(_idb);
  return new Promise((res, rej) => {
    const req = indexedDB.open(IDB_NAME, IDB_VERSION);
    req.onupgradeneeded = e => {
      const db = e.target.result;
      [IDB_STATE, IDB_PREFS].forEach(s => {
        if (!db.objectStoreNames.contains(s)) db.createObjectStore(s);
      });
    };
    req.onsuccess = e => { _idb = e.target.result; res(_idb); };
    req.onerror   = e => rej(e.target.error);
  });
}
async function idbGet(store, key) {
  const db = await openIDB();
  return new Promise((res, rej) => {
    const r = db.transaction(store, "readonly").objectStore(store).get(key);
    r.onsuccess = e => res(e.target.result); r.onerror = e => rej(e.target.error);
  });
}
async function idbSet(store, key, val) {
  const db = await openIDB();
  return new Promise((res, rej) => {
    const r = db.transaction(store, "readwrite").objectStore(store).put(val, key);
    r.onsuccess = () => res(); r.onerror = e => rej(e.target.error);
  });
}

// ─────────────────────────────────────────
//  STORAGE PERSISTENCE REQUEST
//  — formally asks iOS not to evict data
// ─────────────────────────────────────────

async function requestPersistence() {
  if (!navigator.storage?.persist) return false;
  try {
    const granted = await navigator.storage.persist();
    console.log("Storage persistence granted:", granted);
    return granted;
  } catch(e) {
    console.warn("Storage persist request failed:", e);
    return false;
  }
}

async function checkPersistence() {
  if (!navigator.storage?.persisted) return false;
  try { return await navigator.storage.persisted(); } catch(e) { return false; }
}

async function maybeShowBackupNudge() {
  // Don't nudge if backed up recently
  if (daysSince(lastExportedAt) < BACKUP_NUDGE_DAYS) return;
  // Don't nudge if we already showed it this session
  if (document.getElementById("backup-nudge-banner")) return;
  // Don't nudge if there's no data worth backing up
  const totalTxCount = Object.values(months).reduce((s, m) => s + (m.transactions?.length || 0), 0);
  if (totalTxCount === 0) return;
  // Check if user dismissed it today
  try {
    const dismissed = await idbGet(IDB_PREFS, "nudgeDismissedDate");
    if (dismissed) {
      const dismissedDate = new Date(dismissed).toDateString();
      if (dismissedDate === new Date().toDateString()) return;
    }
  } catch(e) {}

  const dayCount = lastExportedAt ? Math.floor(daysSince(lastExportedAt)) : null;
  const msg = dayCount !== null
    ? `It's been ${dayCount} days since your last backup.`
    : "You haven't exported a backup yet this session.";

  const el = document.createElement("div");
  el.id = "backup-nudge-banner";
  el.className = "banner-compact";
  el.innerHTML = `
    <span class="banner-compact-dot"></span>
    <span class="banner-compact-text">${msg} Back up now?</span>
    <button class="banner-compact-btn" id="nudgeBackupBtn">Back Up</button>
    <button class="banner-compact-dismiss" id="nudgeDismissBtn" title="Dismiss">×</button>`;
  const container = document.getElementById("bannerContainer");
  if (container) container.appendChild(el);

  document.getElementById("nudgeBackupBtn")?.addEventListener("click", () => {
    dismissBanner("backup-nudge-banner");
    handleBackupButtonClick();
  });
  document.getElementById("nudgeDismissBtn")?.addEventListener("click", async () => {
    dismissBanner("backup-nudge-banner");
    try { await idbSet(IDB_PREFS, "nudgeDismissedDate", new Date().toISOString()); } catch(e) {}
  });
}

//  PERSISTENCE  —  layered: OPFS → IDB → localStorage
// ─────────────────────────────────────────

function buildStateObject() { return { appSettings, months, plannerState, activeFileName }; }

function migrateMisplacedTransactions() {
  let changed = false;
  Object.keys(months).forEach(monthKey => {
    if (!Array.isArray(months[monthKey].transactions)) { months[monthKey].transactions = []; return; }
    const misplaced = [];
    months[monthKey].transactions = months[monthKey].transactions.filter(tx => {
      if (!tx.dateISO) return true;
      const [y, m] = tx.dateISO.split("-");
      const correctKey = y + "-" + m;
      if (correctKey !== monthKey) { misplaced.push({ tx, correctKey }); changed = true; return false; }
      return true;
    });
    misplaced.forEach(({ tx, correctKey }) => { ensureMonthExists(correctKey); months[correctKey].transactions.push(tx); });
  });
  if (changed) saveState();
}

function applyStateObject(state) {
  if (!state) state = {};
  appSettings  = { ...appSettings, ...(state.appSettings  || {}) };
  months       = state.months       || {};
  plannerState = { ...plannerState, ...(state.plannerState || {}) };
  if (state.activeFileName) activeFileName = state.activeFileName;

  if (!appSettings.recurringBills?.length)          appSettings.recurringBills          = DEFAULT_BILLS.map(i => ({ ...i }));
  if (!appSettings.recurringSubscriptions?.length)  appSettings.recurringSubscriptions  = DEFAULT_SUBS.map(i => ({ ...i }));
  if (!appSettings.recurringInvestments?.length)    appSettings.recurringInvestments    = DEFAULT_INVESTMENTS.map(i => ({ ...i }));
  if (!appSettings.discretionaryCategories?.length) appSettings.discretionaryCategories = DEFAULT_DISC.map(i => ({ ...i }));

  if (!plannerState.goals || plannerState.goals.length === 0) {
    plannerState.goals = [

      { id: uid(), type: "generic",   name: "Retirement",      icon: "🏖️", targetAmount: 500000, currentAmount: 0, monthlyContribution: 500, targetDate: "", note: "Contributions via 401(k), IRA, or brokerage." },
      { id: uid(), type: "home", name: "Home Purchase", icon: "🏠",
        currentSavings: 0, monthlyNetIncome: 0,
        interestRate: 6.25, loanTermYears: 30, hoaFee: 300,
        propTaxRate: 1.7, hoiRate: 0.5, pmiRate: 0.75,
        lenderTitleRate: 2.0, appraisal: 600, inspection: 500,
        countyTaxRate: 0.5, stateTaxRate: 0.75, mortgageTaxRate: 0.375,
        prepaidEscrowRate: 2.0, attorneyFees: 750,
        movingCost: 1500, utilityDeposits: 350, furnishingsRate: 2.0,
        repairsRate: 1.0, reserveMonths: 3,
        scenarios: [{homePrice:225000,downPct:20},{homePrice:245000,downPct:20},{homePrice:265000,downPct:20}] }
    ];
  }

  (plannerState.goals || []).forEach(g => {
    if (!g.type) g.type = "generic";
    if (g.name === "Emergency Fund" && g.type === "generic") {
      g.type = "emergency"; g.baselineMonths = g.baselineMonths || 3; g.goalMonths = g.goalMonths || 6;
    }
    if ((g.name === "Home Down Payment" || g.name === "Home Purchase") && g.type === "generic") {
      g.type = "home"; g.currentSavings = g.currentAmount || 0; g.monthlyNetIncome = g.monthlyNetIncome || 0;
      g.interestRate = g.interestRate || 6.25; g.loanTermYears = g.loanTermYears || 30; g.hoaFee = g.hoaFee || 300;
      g.scenarios = g.scenarios || [{homePrice:225000,downPct:20},{homePrice:245000,downPct:20},{homePrice:265000,downPct:20}];
    }
    if (g.type === "home") {
      if (g.propTaxRate      == null) g.propTaxRate      = 1.7;
      if (g.hoiRate          == null) g.hoiRate          = 0.5;
      if (g.pmiRate          == null) g.pmiRate          = 0.75;
      if (g.lenderTitleRate  == null) g.lenderTitleRate  = 2.0;
      if (g.appraisal        == null) g.appraisal        = 600;
      if (g.inspection       == null) g.inspection       = 500;
      if (g.countyTaxRate    == null) g.countyTaxRate    = 0.5;
      if (g.stateTaxRate     == null) g.stateTaxRate     = 0.75;
      if (g.mortgageTaxRate  == null) g.mortgageTaxRate  = 0.375;
      if (g.prepaidEscrowRate== null) g.prepaidEscrowRate= 2.0;
      if (g.attorneyFees     == null) g.attorneyFees     = 750;
      if (g.movingCost       == null) g.movingCost       = 1500;
      if (g.utilityDeposits  == null) g.utilityDeposits  = 350;
      if (g.furnishingsRate  == null) g.furnishingsRate  = 2.0;
      if (g.repairsRate      == null) g.repairsRate      = 1.0;
      if (g.reserveMonths    == null) g.reserveMonths    = 3;
    }
  });

  migrateMisplacedTransactions();
  if (!activeMonthKey) activeMonthKey = formatMonthKey(new Date());
  if (!monthlyViewKey) monthlyViewKey = activeMonthKey;
  ensureMonthExists(activeMonthKey);
  renderAll();
}

async function loadState() {
  try {
    // ── 1. Request storage persistence from the browser ──
    //    This formally asks iOS not to evict our data.
    //    More likely to be granted when installed as a PWA.
    const persistGranted = await requestPersistence();
    console.log("Persistence granted:", persistGranted);

    // ── 2. Try OPFS first (most durable on iOS 16.4+) ──
    let raw = null;
    let source = "none";

    if (HAS_OPFS) {
      try {
        raw = await opfsRead();
        if (raw) { source = "opfs"; opfsAvailable = true; }
      } catch(e) { console.warn("OPFS read failed:", e); }
    }

    // ── 3. Fall back to IndexedDB ──
    if (!raw) {
      try {
        raw = await idbGet(IDB_STATE, IDB_STATE_KEY);
        if (raw) source = "idb";
      } catch(e) { console.warn("IDB read failed:", e); }
    }

    // ── 4. Fall back to localStorage + migrate up to OPFS/IDB ──
    if (!raw) {
      const ls = localStorage.getItem(STORAGE_KEY);
      if (ls) {
        raw = ls; source = "localStorage";
        // Migrate up to better storage
        try { await idbSet(IDB_STATE, IDB_STATE_KEY, raw); } catch(e) {}
        if (HAS_OPFS) {
          const wrote = await opfsWrite(raw);
          if (wrote) { opfsAvailable = true; }
        }
      }
    }

    const isFirstRun = !raw;
    applyStateObject(raw ? JSON.parse(raw) : {});

    console.log(`State loaded from: ${source}`);

    // ── 5. Restore lastExportedAt ──
    try {
      const ts = await idbGet(IDB_PREFS, "lastExportedAt");
      if (ts) lastExportedAt = new Date(ts);
    } catch(e) {}

    // ── 6. Set status chip ──
    if (IS_STANDALONE) {
      setFileStatus(opfsAvailable ? "ios-pwa" : "ios-pwa");
    } else {
      setFileStatus("ios-browser");
      showPersistentIOSBar();
    }

    // ── 7. Show first-run or backup nudge ──
    if (isFirstRun) {
      setTimeout(() => showFirstRunCard(), 300);
    } else {
      setTimeout(() => maybeShowBackupNudge(), 2000);
    }

  } catch(e) {
    console.error("loadState error:", e);
    applyStateObject({});
    setFileStatus("ios-browser");
  }
}

async function saveState() {
  clearTimeout(saveTimeout);
  saveTimeout = setTimeout(async () => {
    const data = JSON.stringify(buildStateObject());

    // Write to all available layers simultaneously
    const writes = [];

    // Layer 1: OPFS (most durable)
    if (HAS_OPFS) {
      writes.push(
        opfsWrite(data).then(ok => { if (ok) opfsAvailable = true; })
      );
    }

    // Layer 2: IndexedDB
    writes.push(
      idbSet(IDB_STATE, IDB_STATE_KEY, data).catch(e => console.warn("IDB save failed:", e))
    );

    // Layer 3: localStorage (last resort)
    try { localStorage.setItem(STORAGE_KEY, data); } catch(e) {}

    await Promise.allSettled(writes);
    updateStatusChip();
  }, 400);
}

async function openExistingBackup() {
  document.getElementById("importFileInput").click();
}

async function exportSnapshot() {
  const dateStr       = new Date().toISOString().slice(0, 10);
  const suggestedName = `finance-backup.json`;
  const data          = JSON.stringify(buildStateObject(), null, 2);

  if (IS_IOS && HAS_SHARE) {
    try {
      const blob = new File([data], suggestedName, { type: "application/json" });
      if (navigator.canShare({ files: [blob] })) {
        await navigator.share({ files: [blob], title: "Finance Tracker Backup" });
        lastExportedAt = new Date();
        try { await idbSet(IDB_PREFS, "lastExportedAt", lastExportedAt.toISOString()); } catch(e) {}
        setFileStatus("ios-backed");
        updatePersistentIOSBar(true);
        // Remove nudge if it was showing
        dismissBanner("backup-nudge-banner");
        setTimeout(() => {
          setFileStatus(IS_STANDALONE ? "ios-pwa" : "ios-browser");
          updatePersistentIOSBar(false);
        }, 5000);
        if (activeView === "admin") renderAdminView();
        return;
      }
    } catch(e) {
      if (e.name === "AbortError") return;
      console.error(e);
      return;
    }
  }

  // Fallback: download
  const a = Object.assign(document.createElement("a"), {
    href: URL.createObjectURL(new Blob([data], { type: "application/json" })),
    download: suggestedName
  });
  a.click(); URL.revokeObjectURL(a.href);
}

function importStateFromFile(file) {
  const r = new FileReader();
  r.onload = e => {
    try {
      applyStateObject(JSON.parse(e.target.result));
      activeFileName = file.name;
      saveState();
      renderAll();
    } catch(_) { alert("Could not import file. Please ensure it is a valid Finance Tracker .json backup."); }
  };
  r.readAsText(file);
}

function handleTxClick(e) {
  const btn    = e.target.closest("[data-tx-action]");
  if (!btn) return;
  const action = btn.dataset.txAction;
  const id     = btn.dataset.id;

  if (action === "edit")        { editingTxId = id; renderLogView(); return; }
  if (action === "cancel-edit") { editingTxId = null; renderLogView(); return; }

  if (action === "save-edit") {
    const row = document.querySelector(`.tx-row[data-id="${id}"]`);
    if (!row) return;
    const srcMonthKey = row.dataset.month || activeMonthKey;
    const srcMonth    = months[srcMonthKey];
    const tx          = srcMonth?.transactions.find(t => t.id === id);
    if (!tx) return;
    const dateVal = row.querySelector("[data-field='dateISO']").value;
    const amount  = Number(row.querySelector("[data-field='amount']").value || 0);
    const cat     = row.querySelector("[data-field='category']").value;
    const note    = row.querySelector("[data-field='note']").value.trim();
    if (!dateVal || !cat || !amount) { alert("Date, category and amount are required."); return; }
    const [dy, dm]    = dateVal.split("-");
    const newMonthKey = dy + "-" + dm;
    if (newMonthKey !== srcMonthKey) {
      const idx = srcMonth.transactions.findIndex(t => t.id === id);
      if (idx !== -1) srcMonth.transactions.splice(idx, 1);
      ensureMonthExists(newMonthKey);
      months[newMonthKey].transactions.push({ ...tx, dateISO: dateVal, amount, category: cat, note });
    } else {
      tx.dateISO = dateVal; tx.amount = amount; tx.category = cat; tx.note = note;
    }
    editingTxId = null; saveState(); renderLogView(); return;
  }

  if (action === "delete") {
    if (!confirm("Delete this transaction?")) return;
    const row         = document.querySelector(`.tx-row[data-id="${id}"]`);
    const srcMonthKey = row?.dataset.month || activeMonthKey;
    const srcMonth    = months[srcMonthKey];
    if (srcMonth) {
      const idx = srcMonth.transactions.findIndex(t => t.id === id);
      if (idx !== -1) srcMonth.transactions.splice(idx, 1);
    }
    if (editingTxId === id) editingTxId = null;
    saveState(); renderLogView(); return;
  }
}

function renderMonthlyView() {
  const container = document.getElementById("monthlyView");
  const todayKey  = formatMonthKey(new Date());
  if (!monthlyViewKey) monthlyViewKey = activeMonthKey || todayKey;
  if (monthlyViewKey > todayKey) monthlyViewKey = todayKey;

  const bills    = appSettings.recurringBills          || [];
  const subs     = appSettings.recurringSubscriptions  || [];
  const invsts   = appSettings.recurringInvestments    || [];
  const disc     = appSettings.discretionaryCategories || [];
  const allItems = [...bills, ...subs, ...invsts, ...disc];

  const [vy, vm] = monthlyViewKey.split("-").map(Number);
  const [ty, tm] = todayKey.split("-").map(Number);
  const isYTD    = monthlyViewMode === "ytd";

  const ytdEndMonth   = (vy === ty) ? tm : (vy < ty ? 12 : vm);
  const ytdMonthCount = ytdEndMonth;
  const ytdYear       = vy;

  let viewTxs;
  if (isYTD) {
    viewTxs = [];
    for (let mo = 1; mo <= ytdEndMonth; mo++) {
      const key = ytdYear + "-" + String(mo).padStart(2, "0");
      viewTxs.push(...((months[key]?.transactions) || []));
    }
  } else {
    ensureMonthExists(monthlyViewKey);
    viewTxs = months[monthlyViewKey].transactions || [];
  }

  const actuals = computeActuals(viewTxs);

  const monthDiff = (vy - ty) * 12 + (vm - tm);
  const navSub = isYTD
    ? (vy === ty ? "Current Year" : vy < ty ? `${ty - vy} year${ty - vy > 1 ? "s" : ""} ago` : "")
    : (monthDiff === 0 ? "Current Month" : monthDiff === -1 ? "Last Month" : monthDiff < -1 ? `${Math.abs(monthDiff)} months ago` : "");
  const navLabel   = isYTD ? `${ytdYear} Year to Date` : formatMonthLabelFromKey(monthlyViewKey);
  const canGoNext  = isYTD ? vy < ty : monthlyViewKey < todayKey;

  const monthlyBudget = allItems.reduce((s, i) => s + Number(i.budgetAmount || 0), 0);
  const totalBudget   = isYTD ? monthlyBudget * ytdMonthCount : monthlyBudget;
  const totalSpent    = Object.values(actuals).reduce((s, v) => s + v, 0);
  const remaining     = totalBudget - totalSpent;
  const overallPct    = totalBudget ? Math.min((totalSpent / totalBudget) * 100, 100) : 0;
  const overallCls    = overallPct >= 100 ? "over" : overallPct >= 80 ? "warn" : "under";

  let countOnTrack = 0, countAtRisk = 0, countOver = 0, countNotStarted = 0;
  allItems.forEach(item => {
    const actual = actuals[item.name] || 0;
    const budget = Number(item.budgetAmount || 0) * (isYTD ? ytdMonthCount : 1);
    if (!budget) return;
    if (!actual) { countNotStarted++; return; }
    const pct = actual / budget;
    if (pct >= 1) countOver++;
    else if (pct >= 0.8) countAtRisk++;
    else countOnTrack++;
  });

  const overItems = allItems
    .filter(i => { const a=actuals[i.name]||0, b=Number(i.budgetAmount||0)*(isYTD?ytdMonthCount:1); return b&&a>b; })
    .map(i => ({ name:i.name, actual:actuals[i.name]||0, budget:Number(i.budgetAmount)*(isYTD?ytdMonthCount:1), over:(actuals[i.name]||0)-Number(i.budgetAmount)*(isYTD?ytdMonthCount:1) }));

  const atRiskItems = allItems
    .filter(i => { const a=actuals[i.name]||0, b=Number(i.budgetAmount||0)*(isYTD?ytdMonthCount:1); if(!b)return false; const p=a/b; return p>=0.8&&p<1; })
    .map(i => ({ name:i.name, actual:actuals[i.name]||0, budget:Number(i.budgetAmount)*(isYTD?ytdMonthCount:1), pct:((actuals[i.name]||0)/(Number(i.budgetAmount)*(isYTD?ytdMonthCount:1)))*100 }));

  const buckets = [
    { label:"🏠 Must Pay",       items:bills  },
    { label:"📱 Subs & Other",   items:subs   },
    { label:"💰 Savings",        items:invsts },
    { label:"🛍️ Discretionary", items:disc   }
  ];

  const ranked = allItems
    .filter(i => (actuals[i.name]||0) > 0)
    .map(i => ({ name:i.name, actual:actuals[i.name]||0, budget:Number(i.budgetAmount||0)*(isYTD?ytdMonthCount:1) }))
    .sort((a,b) => b.actual - a.actual).slice(0,5);

  const unbudgeted = allItems
    .filter(i => !Number(i.budgetAmount) && (actuals[i.name]||0) > 0)
    .map(i => ({ name:i.name, actual:actuals[i.name] }));

  const now = new Date();
  const daysInMonth    = new Date(vy, vm, 0).getDate();
  const isCurrentMonth = !isYTD && now.getFullYear()===vy && (now.getMonth()+1)===vm;
  const dayOfMonth     = isCurrentMonth ? now.getDate() : daysInMonth;
  const pacePct        = (dayOfMonth / daysInMonth) * 100;
  const projectedSpend = dayOfMonth > 0 ? totalSpent*(daysInMonth/dayOfMonth) : 0;

  const biggestTx = [...viewTxs].sort((a,b) => Number(b.amount)-Number(a.amount))[0];
  const avgTx     = viewTxs.length > 0 ? totalSpent/viewTxs.length : 0;

  const ytdMonthRows = isYTD ? (() => {
    const rows = [];
    for (let mo = 1; mo <= ytdEndMonth; mo++) {
      const key   = ytdYear + "-" + String(mo).padStart(2,"0");
      const txs   = months[key]?.transactions || [];
      const spent = txs.reduce((s,t) => s+Number(t.amount||0), 0);
      rows.push({ label: new Date(ytdYear, mo-1, 1).toLocaleString(undefined,{month:"short"}), spent });
    }
    return rows;
  })() : [];

  container.innerHTML = `
    <div class="view-mode-toggle">
      <button class="view-mode-btn ${!isYTD?"active":""}" id="modeMonthly">📅 Monthly</button>
      <button class="view-mode-btn ${isYTD ?"active":""}" id="modeYTD">📈 Year to Date</button>
    </div>

    <div class="month-nav">
      <button class="month-nav-btn" id="monthNavPrev">&#8249;</button>
      <div class="month-nav-center">
        <span class="month-nav-label">${navLabel}</span>
        ${navSub ? `<span class="month-nav-sub">${navSub}</span>` : ""}
      </div>
      <button class="month-nav-btn" id="monthNavNext" ${canGoNext?"":"disabled"}>&#8250;</button>
    </div>

    <div class="card">
      <div class="card-header"><h2 class="card-title">${isYTD?"📋 YTD Snapshot":"📋 Monthly Snapshot"}</h2></div>
      <div class="card-body">
        <div class="stat-grid-2" style="margin-bottom:14px;">
          <div class="stat-tile">
            <div class="stat-tile-label">${isYTD?"YTD Budget":"Total Budgeted"}</div>
            <div class="stat-tile-value" style="color:var(--color-primary);">${fmt(totalBudget)}</div>

          <div class="stat-tile">
            <div class="stat-tile-label">${isYTD?"YTD Spent":"Total Spent"}</div>

            : `<span style="font-size:13px;color:var(--color-text-secondary);">Over budget by: </span><span style="font-size:15px;font-weight:700;color:var(--color-danger);">${fmt(Math.abs(remaining))}</span>`}

    ${isYTD ? `

            <div style="margin-bottom:11px;">
