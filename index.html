<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />
  <title>Finance Tracker</title>
  <meta name="theme-color" content="#0b1220" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Finance" />
  <meta name="mobile-web-app-capable" content="yes" />

  <link rel="manifest" href='application/manifest+json,{
    "name":"Finance Tracker","short_name":"Finance","start_url":"./","display":"standalone",
    "background_color":"#0b1220","theme_color":"#0b1220","orientation":"portrait",
    "icons":[{"src":"image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 180 180%22%3E%3Crect width=%22180%22 height=%22180%22 rx=%2240%22 fill=%22%230b1220%22/%3E%3Ctext x=%2290%22 y=%22125%22 font-size=%22100%22 text-anchor=%22middle%22 fill=%22%23ffffff%22%3E$%3C/text%3E%3C/svg%3E","sizes":"180x180","type":"image/svg+xml"}]
  }' />

  <style>
    :root {
      --color-bg-primary: #0b1220;
      --color-bg-secondary: #111b2e;
      --color-text-primary: #eaf1ff;
      --color-text-secondary: #9fb0d0;
      --color-border: rgba(255,255,255,0.08);
      --color-primary: #6aa6ff;
      --color-success: #4ade80;
      --color-warning: #fbbf24;
      --color-danger: #f87171;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(180deg, #070c16 0%, #0b1220 60%);
      color: var(--color-text-primary);
      min-height: 100vh;
      padding-bottom: 70px;
    }

    .app-header {
      background: var(--color-bg-secondary);
      border-bottom: 1px solid var(--color-border);
      padding: calc(env(safe-area-inset-top,0) + 12px) 16px 12px;
      position: sticky; top: 0; z-index: 10;
      display: flex; align-items: center; justify-content: space-between; gap: 8px;
    }
    .header-text { flex: 1; min-width: 0; }
    .app-title  { margin: 0; font-size: 20px; font-weight: 700; }
    .app-subtitle { margin: 4px 0 0; font-size: 13px; color: var(--color-text-secondary); }

    .quick-save-btn {
      display: flex; align-items: center; gap: 5px;
      background: rgba(106,166,255,0.1); border: 1px solid rgba(106,166,255,0.25);
      border-radius: 10px; padding: 7px 12px; font-size: 12px; font-weight: 700;
      color: var(--color-primary); cursor: pointer; font-family: inherit;
      white-space: nowrap; transition: background .15s;
    }
    .quick-save-btn:hover { background: rgba(106,166,255,0.2); }
    .quick-save-btn.saving { color: var(--color-success); border-color: rgba(74,222,128,0.3); background: rgba(74,222,128,0.08); }

    .content { max-width: 800px; margin: 0 auto; padding: 16px; }
    .view { display: none; }
    .view.active { display: block; }

    .card {
      background: linear-gradient(180deg, rgba(15,26,46,0.92), rgba(11,18,32,0.92));
      border: 1px solid var(--color-border); border-radius: 16px;
      padding: 16px; margin-bottom: 16px;
    }
    .card-header { margin-bottom: 12px; display: flex; align-items: center; justify-content: space-between; gap: 8px; }
    .card-title  { margin: 0; font-size: 16px; font-weight: 700; }
    .card-body   { font-size: 14px; color: var(--color-text-secondary); }

    /* ---- Transaction rows ---- */
    .tx-list { list-style: none; padding: 0; margin: 0; }

    .tx-row {
      padding: 9px 0;
      border-bottom: 1px solid rgba(148,163,184,0.1);
    }
    .tx-row:last-child { border-bottom: none; }

    .tx-row-display {
      display: flex; justify-content: space-between; align-items: center; gap: 8px;
    }
    .tx-row-left  { flex: 1; min-width: 0; }
    .tx-row-cat   { font-size: 13px; color: var(--color-text-primary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .tx-row-meta  { font-size: 11px; color: var(--color-text-secondary); margin-top: 2px; }
    .tx-row-right { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
    .tx-row-amount { font-size: 14px; font-weight: 700; color: var(--color-primary); white-space: nowrap; }

    .tx-action-btn {
      background: none; border: none; padding: 4px 5px; cursor: pointer;
      font-size: 14px; border-radius: 6px; line-height: 1;
      transition: background .15s;
    }
    .tx-action-btn:hover { background: rgba(255,255,255,0.07); }

    /* inline edit form */
    .tx-edit-form {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
      padding: 8px 0 4px;
    }
    .tx-edit-form .full { grid-column: 1 / -1; }
    .tx-edit-form .tx-edit-actions {
      grid-column: 1 / -1;
      display: flex; gap: 6px; justify-content: flex-end;
    }

    /* ---- Filter/sort bar ---- */
    .filter-bar {
      display: flex; gap: 8px; flex-wrap: wrap;
      margin-bottom: 12px;
    }
    .filter-bar select {
      flex: 1; min-width: 130px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(148,163,184,0.3);
      border-radius: 8px; padding: 7px 10px;
      font-size: 12px; color: var(--color-text-primary);
      font-family: inherit;
      -webkit-appearance: none; appearance: none;
    }
    .filter-bar select:focus { outline: none; border-color: var(--color-primary); }

    .tx-count-badge {
      font-size: 11px; font-weight: 700;
      background: rgba(106,166,255,0.12);
      border: 1px solid rgba(106,166,255,0.2);
      border-radius: 99px; padding: 2px 9px;
      color: var(--color-primary); white-space: nowrap;
      align-self: center;
    }

    /* ---- Budget bucket styles ---- */
    .bucket-summary-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 16px; }
    .bucket-summary-card { background: rgba(10,19,38,0.7); border: 1px solid var(--color-border); border-radius: 12px; padding: 10px 10px 8px; text-align: center; }
    .bucket-summary-label { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: .6px; color: var(--color-text-secondary); margin-bottom: 5px; }
    .bucket-summary-value { font-size: 18px; font-weight: 800; color: var(--color-primary); line-height: 1; margin-bottom: 2px; }
    .bucket-summary-sub   { font-size: 10px; color: var(--color-text-secondary); }
    .bucket-section       { margin-bottom: 20px; }
    .bucket-section:last-child { margin-bottom: 0; }
    .bucket-section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; padding-bottom: 6px; border-bottom: 1px solid var(--color-border); }
    .bucket-section-title  { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .7px; color: var(--color-text-secondary); }
    .bucket-section-totals { font-size: 11px; color: var(--color-text-secondary); }
    .bucket-section-totals span { font-weight: 700; color: var(--color-text-primary); }
    .bucket-item           { margin-bottom: 10px; }
    .bucket-item:last-child{ margin-bottom: 0; }
    .bucket-item-row       { display: flex; justify-content: space-between; align-items: baseline; gap: 8px; margin-bottom: 5px; }
    .bucket-item-name      { font-size: 13px; color: var(--color-text-primary); flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .bucket-item-amounts   { font-size: 12px; white-space: nowrap; flex-shrink: 0; }
    .bucket-item-actual    { font-weight: 700; }
    .bucket-item-budget    { color: var(--color-text-secondary); }
    .progress-bar-track    { width: 100%; height: 6px; background: rgba(255,255,255,0.07); border-radius: 99px; overflow: hidden; }
    .progress-bar-fill     { height: 100%; border-radius: 99px; transition: width .3s ease; }
    .progress-bar-fill.under { background: var(--color-success); }
    .progress-bar-fill.warn  { background: var(--color-warning); }
    .progress-bar-fill.over  { background: var(--color-danger); }
    .progress-bar-fill.unset { background: rgba(106,166,255,0.35); }
    .empty-bucket { font-size: 12px; color: var(--color-text-secondary); font-style: italic; padding: 6px 0 2px; }

    /* ---- Admin ---- */
    .admin-section { margin-bottom: 0; }
    .admin-section-header { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; cursor: pointer; border-bottom: 1px solid var(--color-border); user-select: none; }
    .admin-section-header:hover { opacity: .8; }
    .admin-section-left   { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .admin-section-title  { font-size: 13px; font-weight: 700; color: var(--color-text-secondary); }
    .admin-section-meta   { font-size: 11px; color: var(--color-text-secondary); background: rgba(106,166,255,0.1); border: 1px solid rgba(106,166,255,0.15); border-radius: 99px; padding: 2px 8px; }
    .admin-section-toggle { font-size: 10px; color: var(--color-text-secondary); flex-shrink: 0; }
    .admin-section-body   { padding: 10px 0 4px; }
    .admin-item-row       { display: flex; align-items: center; gap: 8px; padding: 8px 0; border-bottom: 1px solid rgba(148,163,184,0.07); }
    .admin-item-row:last-of-type { border-bottom: none; }
    .admin-item-name   { flex: 1; font-size: 13px; color: var(--color-text-primary); }
    .admin-item-budget { font-size: 13px; font-weight: 700; color: var(--color-primary); min-width: 60px; text-align: right; }
    .admin-item-edit-row { display: flex; align-items: center; gap: 6px; padding: 6px 0; flex-wrap: wrap; border-bottom: 1px solid rgba(148,163,184,0.07); }
    .admin-add-row       { display: flex; align-items: center; gap: 6px; padding: 10px 0 4px; flex-wrap: wrap; border-top: 1px solid rgba(148,163,184,0.07); margin-top: 4px; }
    .admin-btn { background: rgba(106,166,255,0.1); border: 1px solid rgba(106,166,255,0.2); border-radius: 8px; padding: 5px 10px; font-size: 12px; color: var(--color-primary); cursor: pointer; font-family: inherit; white-space: nowrap; }
    .admin-btn:hover { background: rgba(106,166,255,0.2); }
    .admin-btn-danger  { background: rgba(248,113,113,0.1); border-color: rgba(248,113,113,0.2); color: var(--color-danger); }
    .admin-btn-danger:hover  { background: rgba(248,113,113,0.2); }
    .admin-btn-success { background: rgba(74,222,128,0.1); border-color: rgba(74,222,128,0.2); color: var(--color-success); }
    .admin-btn-success:hover { background: rgba(74,222,128,0.2); }
    .admin-input { background: rgba(255,255,255,0.06); border: 1px solid rgba(148,163,184,0.35); border-radius: 8px; padding: 7px 10px; font-size: 13px; color: var(--color-text-primary); font-family: inherit; }
    .admin-input:focus { outline: none; border-color: var(--color-primary); }
    .admin-input::placeholder { color: rgba(159,176,208,0.4); }
    .file-info-row   { display: flex; align-items: center; gap: 10px; padding: 10px 12px; background: rgba(10,19,38,0.7); border: 1px solid var(--color-border); border-radius: 10px; margin-bottom: 14px; }
    .file-info-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; color: var(--color-text-secondary); white-space: nowrap; }
    .file-info-name  { font-size: 13px; font-weight: 600; color: var(--color-primary); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    /* ---- Shared form ---- */
    .form-group { margin-bottom: 12px; }
    .form-label { display: block; font-size: 13px; font-weight: 600; color: var(--color-text-secondary); margin-bottom: 6px; }
    .form-input, .form-select, .form-textarea {
      width: 100%; max-width: 100%; -webkit-appearance: none; appearance: none;
      background: rgba(255,255,255,0.06); border: 1px solid rgba(148,163,184,0.35);
      border-radius: 10px; padding: 10px 12px; font-size: 14px;
      color: var(--color-text-primary); font-family: inherit;
    }
    .form-input::placeholder, .form-textarea::placeholder { color: rgba(159,176,208,0.45); }
    .form-input:focus, .form-select:focus, .form-textarea:focus { outline: none; border-color: var(--color-primary); box-shadow: 0 0 0 1px rgba(106,166,255,0.4); }
    .form-textarea { min-height: 80px; resize: vertical; }
    .form-select optgroup { color: var(--color-text-secondary); font-size: 11px; font-weight: 700; }
    .form-select option    { color: var(--color-text-primary); background: #111b2e; }

    /* inline edit inputs share admin-input style but are slightly different */
    .tx-edit-input {
      width: 100%; background: rgba(255,255,255,0.06);
      border: 1px solid rgba(148,163,184,0.35); border-radius: 8px;
      padding: 7px 10px; font-size: 13px; color: var(--color-text-primary);
      font-family: inherit; -webkit-appearance: none; appearance: none;
    }
    .tx-edit-input:focus { outline: none; border-color: var(--color-primary); }
    .tx-edit-input::placeholder { color: rgba(159,176,208,0.4); }

    .btn { display: inline-block; border: none; border-radius: 12px; padding: 10px 16px; font-size: 14px; font-weight: 700; cursor: pointer; color: #081226; background: linear-gradient(180deg,#6aa6ff,#4c86ff); box-shadow: 0 6px 16px rgba(76,134,255,0.3); }
    .btn:hover { background: linear-gradient(180deg,#5a96ef,#4c86ff); }
    .btn-block { width: 100%; text-align: center; }
    .btn-sm    { padding: 6px 12px; font-size: 12px; border-radius: 8px; box-shadow: none; }
    .btn-ghost { background: rgba(106,166,255,0.1); border: 1px solid rgba(106,166,255,0.2); color: var(--color-primary); box-shadow: none; }
    .btn-ghost:hover { background: rgba(106,166,255,0.2); }
    .btn-danger-sm { background: rgba(248,113,113,0.12); border: 1px solid rgba(248,113,113,0.2); color: var(--color-danger); box-shadow: none; }
    .btn-danger-sm:hover { background: rgba(248,113,113,0.22); }

    .text-muted { color: var(--color-text-secondary); font-size: 13px; }

    .log-form-panel {
      background: rgba(6,11,22,0.85); border: 1px solid rgba(148,163,184,0.2);
      border-radius: 12px; padding: 12px 12px 6px; overflow: hidden;
    }

    .bottom-nav {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: var(--color-bg-secondary); border-top: 1px solid var(--color-border);
      display: flex; justify-content: space-around;
      padding: 6px 0 calc(6px + env(safe-area-inset-bottom,0)); z-index: 20;
    }
    .nav-btn { flex: 1; background: none; border: none; color: #64748b; padding: 4px 4px 2px; cursor: pointer; display: flex; flex-direction: column; align-items: center; font-size: 10px; font-weight: 500; gap: 4px; }
    .nav-btn.active { color: var(--color-primary); }
    .nav-icon { width: 24px; height: 24px; border-radius: 8px; display: flex; align-items: center; justify-content: center; background: rgba(148,163,184,0.2); font-size: 14px; }
    .nav-btn.active .nav-icon { background: rgba(106,166,255,0.15); }
  </style>
</head>
<body>

  <header class="app-header">
    <div class="header-text">
      <h1 class="app-title" id="appTitle">Finance Tracker</h1>
      <p class="app-subtitle" id="appSubtitle">Loading…</p>
    </div>
    <button class="quick-save-btn" id="quickSaveBtn" type="button">
      <span id="quickSaveIcon">💾</span>
      <span id="quickSaveLabel">Quick Save</span>
    </button>
  </header>

  <main class="content">
    <section id="logView"     class="view active"></section>
    <section id="budgetView"  class="view"></section>
    <section id="monthlyView" class="view"></section>
    <section id="annualView"  class="view"></section>
    <section id="adminView"   class="view"></section>
    <input id="importFileInput" type="file" accept="application/json" style="display:none;" />
  </main>

  <nav class="bottom-nav">
    <button class="nav-btn active" data-view="log"><div class="nav-icon">➕</div><span>Log</span></button>
    <button class="nav-btn" data-view="budget"><div class="nav-icon">📊</div><span>Budget</span></button>
    <button class="nav-btn" data-view="monthly"><div class="nav-icon">📅</div><span>Monthly</span></button>
    <button class="nav-btn" data-view="annual"><div class="nav-icon">📈</div><span>Annual</span></button>
    <button class="nav-btn" data-view="admin"><div class="nav-icon">⚙️</div><span>Admin</span></button>
  </nav>

  <script>

    // ---- Default seed data ----

    const DEFAULT_BILLS = [
      { name: "Rent / Mortgage",             budgetAmount: 1500 },
      { name: "Electric",                    budgetAmount: 135  },
      { name: "Water",                       budgetAmount: 35   },
      { name: "Gas / Heat",                  budgetAmount: 94   },
      { name: "Internet",                    budgetAmount: 70   },
      { name: "Cell Phone",                  budgetAmount: 80   },
      { name: "Car Payment",                 budgetAmount: 500  },
      { name: "Car Insurance",               budgetAmount: 150  },
      { name: "Health Insurance",            budgetAmount: 400  },
      { name: "Renter's / Home Insurance",   budgetAmount: 30   },
      { name: "Student Loan Payment",        budgetAmount: 400  },
      { name: "Minimum Credit Card Payment", budgetAmount: 100  }
    ].map(i => ({ ...i, id: i.name }));

    const DEFAULT_SUBS = [
      { name: "Spotify / Music",              budgetAmount: 12 },
      { name: "Netflix",                      budgetAmount: 18 },
      { name: "Hulu / Streaming",             budgetAmount: 18 },
      { name: "YouTube Premium",              budgetAmount: 14 },
      { name: "iCloud / Google One Storage",  budgetAmount: 3  },
      { name: "Gym Membership",               budgetAmount: 45 },
      { name: "Amazon Prime",                 budgetAmount: 15 },
      { name: "News / Magazine Subscription", budgetAmount: 10 }
    ].map(i => ({ ...i, id: i.name }));

    const DEFAULT_INVESTMENTS = [
      { name: "Emergency Fund",            budgetAmount: 200 },
      { name: "401(k) / IRA Contribution", budgetAmount: 500 },
      { name: "Brokerage / Investing",     budgetAmount: 200 },
      { name: "House Down Payment Fund",   budgetAmount: 300 },
      { name: "Vacation Fund",             budgetAmount: 100 },
      { name: "General Savings",           budgetAmount: 200 }
    ].map(i => ({ ...i, id: i.name }));

    const DEFAULT_DISC = [
      "Restaurants / Takeout","Groceries","Gas / Fuel","Shopping / Clothing",
      "Entertainment / Going Out","Personal Care / Haircut","Gifts / Holidays",
      "Pet Care","Travel","Home Supplies / Household","Medical / Out-of-Pocket","Misc"
    ].map(name => ({ id: name, name, budgetAmount: 0 }));

    // ---- Global state ----

    let appSettings = {
      recurringBills: [], recurringSubscriptions: [],
      recurringInvestments: [], discretionaryCategories: []
    };

    let months = {}, plannerState = { currentHouseSavings: 0, scenarios: [] };
    let activeView = "log", activeMonthKey = null;
    let saveTimeout = null, activeFileName = "finance-tracker-backup.json";
    let editingBudgetItem = null, quickSaveFlashTimeout = null;
    let collapsedAdminSections = new Set(["bills","subs","invsts","disc"]);

    // Transaction editing & filtering state (session-only, not persisted)
    let editingTxId   = null;
    let txFilterCat   = "";
    let txSortOrder   = "newest";

    const STORAGE_KEY = "financeTrackerState_v1";

    // ---- Helpers ----

    function uid() { return crypto.randomUUID ? crypto.randomUUID() : String(Date.now() + Math.random()); }
    function formatMonthKey(d) { return d.getFullYear() + "-" + String(d.getMonth()+1).padStart(2,"0"); }
    function formatMonthLabelFromKey(key) {
      const [y,m] = key.split("-");
      return new Date(+y,+m-1,1).toLocaleString(undefined,{month:"long",year:"numeric"});
    }
    function fmt(n) { return "$" + Number(n||0).toFixed(2); }
    function progressClass(actual, budget) {
      if (!budget) return "unset";
      const p = actual/budget;
      return p >= 1 ? "over" : p >= 0.8 ? "warn" : "under";
    }

    function ensureMonthExists(key) {
      if (!months[key]) months[key] = { meta:{label:key}, transactions:[] };
    }

    function allCategories() {
      return [
        ...appSettings.recurringBills,
        ...appSettings.recurringSubscriptions,
        ...appSettings.recurringInvestments,
        ...appSettings.discretionaryCategories
      ].map(i => i.name);
    }

    function computeActuals(transactions) {
      const t = {};
      (transactions||[]).forEach(tx => {
        if (!tx.category) return;
        t[tx.category] = (t[tx.category]||0) + Number(tx.amount||0);
      });
      return t;
    }

    function buildCategoryOptions(selectedValue) {
      const groups = [
        { label:"Must Pay Bills",          items: appSettings.recurringBills },
        { label:"Subscriptions and Other", items: appSettings.recurringSubscriptions },
        { label:"Savings & Investments",   items: appSettings.recurringInvestments },
        { label:"Discretionary",           items: appSettings.discretionaryCategories }
      ];
      if (groups.every(g => g.items.length === 0))
        return `<option value="">— No categories configured. Add them in Admin —</option>`;
      return groups.filter(g => g.items.length > 0).map(g => `
        <optgroup label="${g.label}">
          ${g.items.map(i => `<option value="${i.name}"${i.name===selectedValue?" selected":""}>${i.name}</option>`).join("")}
        </optgroup>`).join("");
    }

    function renderBucketItem(name, actual, budget) {
      const pct = budget ? Math.min((actual/budget)*100,100) : 0;
      const cls = progressClass(actual,budget);
      const color = cls==="over" ? "var(--color-danger)" : cls==="warn" ? "var(--color-warning)" : cls==="under" ? "var(--color-success)" : "var(--color-primary)";
      return `
        <div class="bucket-item">
          <div class="bucket-item-row">
            <div class="bucket-item-name">${name}</div>
            <div class="bucket-item-amounts">
              <span class="bucket-item-actual" style="color:${color};">${fmt(actual)}</span>
              <span class="bucket-item-budget"> / ${budget ? fmt(budget) : "—"}</span>
            </div>
          </div>
          <div class="progress-bar-track"><div class="progress-bar-fill ${cls}" style="width:${pct}%;"></div></div>
        </div>`;
    }

    function getSectionArray(s) {
      return s==="bills" ? appSettings.recurringBills
           : s==="subs"  ? appSettings.recurringSubscriptions
           : s==="invsts"? appSettings.recurringInvestments
           :               appSettings.discretionaryCategories;
    }

    // ---- Quick Save ----

    async function quickSave() {
      await saveToFile(activeFileName);
      const btn = document.getElementById("quickSaveBtn");
      const icon = document.getElementById("quickSaveIcon");
      const lbl  = document.getElementById("quickSaveLabel");
      btn.classList.add("saving"); icon.textContent="✓"; lbl.textContent="Saved!";
      clearTimeout(quickSaveFlashTimeout);
      quickSaveFlashTimeout = setTimeout(()=>{ btn.classList.remove("saving"); icon.textContent="💾"; lbl.textContent="Quick Save"; }, 1800);
    }

    // ---- Persistence ----

    function buildStateObject() { return { appSettings, months, plannerState, activeFileName }; }

    function applyStateObject(state) {
      if (!state) state = {};
      appSettings  = { ...appSettings, ...(state.appSettings||{}) };
      months       = state.months || {};
      plannerState = { ...plannerState, ...(state.plannerState||{}) };
      if (state.activeFileName) activeFileName = state.activeFileName;

      if (!appSettings.recurringBills?.length)          appSettings.recurringBills          = DEFAULT_BILLS.map(i=>({...i}));
      if (!appSettings.recurringSubscriptions?.length)  appSettings.recurringSubscriptions  = DEFAULT_SUBS.map(i=>({...i}));
      if (!appSettings.recurringInvestments?.length)    appSettings.recurringInvestments    = DEFAULT_INVESTMENTS.map(i=>({...i}));
      if (!appSettings.discretionaryCategories?.length) appSettings.discretionaryCategories = DEFAULT_DISC.map(i=>({...i}));

      if (!activeMonthKey) activeMonthKey = formatMonthKey(new Date());
      ensureMonthExists(activeMonthKey);
      renderAll();
    }

    function loadState() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        applyStateObject(raw ? JSON.parse(raw) : {});
      } catch(e) { console.error(e); applyStateObject({}); }
    }

    function saveState() {
      clearTimeout(saveTimeout);
      saveTimeout = setTimeout(()=>{
        try { localStorage.setItem(STORAGE_KEY, JSON.stringify(buildStateObject())); }
        catch(e) { console.error(e); }
      }, 400);
    }

    async function saveToFile(filename) {
      const data = JSON.stringify(buildStateObject(), null, 2);
      if (window.showSaveFilePicker) {
        try {
          const h = await window.showSaveFilePicker({ suggestedName: filename, types:[{description:"JSON Backup",accept:{"application/json":[".json"]}}] });
          const w = await h.createWritable(); await w.write(data); await w.close();
          activeFileName = h.name; saveState(); if (activeView==="admin") renderAdminView(); return;
        } catch(e) { if (e.name==="AbortError") return; }
      }
      const a = Object.assign(document.createElement("a"),{href:URL.createObjectURL(new Blob([data],{type:"application/json"})),download:filename});
      a.click(); URL.revokeObjectURL(a.href);
      activeFileName = filename; saveState(); if (activeView==="admin") renderAdminView();
    }

    function importStateFromFile(file) {
      const r = new FileReader();
      r.onload = e => {
        try { const p = JSON.parse(e.target.result); activeFileName = file.name; applyStateObject(p); saveState(); }
        catch(e) { alert("Could not import file."); }
      };
      r.readAsText(file);
    }

      activeView = v;
      document.querySelectorAll(".view").forEach(el => el.classList.toggle("active", el.id === v+"View"));
      document.querySelectorAll(".nav-btn").forEach(btn => btn.classList.toggle("active", btn.dataset.view===v));
      renderActiveView();
    }

        case "budget":  renderBudgetView();  break;
        case "monthly": renderMonthlyView(); break;
        case "annual":  renderAnnualView();  break;
        case "admin":   renderAdminView();   break;
      }
    }

      container.innerHTML = `

          <div class="card-header">

                <option value="newest"      ${txSortOrder==="newest"      ?"selected":""}>Newest First</option>

    // Build an HTML string for a list of transaction rows
    function renderTxList(txArray, month) {
      if (txArray.length === 0) return '<p class="text-muted">No transactions.</p>';
      return `<ul class="tx-list">${txArray.map(t => renderTxRow(t, month)).join("")}</ul>`;

        return `

    // ---- Transaction click handler ----

    function handleTxClick(e) {
      const btn = e.target.closest("[data-tx-action]");
      if (!btn) return;
      const action = btn.dataset.txAction;
      const id     = btn.dataset.id;
      const month  = months[activeMonthKey];

      if (action === "edit") {
        editingTxId = id;
        renderLogView();
        return;
      }

      if (action === "cancel-edit") {
        editingTxId = null;
        renderLogView();
        return;
      }

      if (action === "save-edit") {
        const row = document.querySelector(`.tx-row[data-id="${id}"]`);
        if (!row) return;
        const tx = month.transactions.find(t => t.id === id);
        if (!tx) return;
        const dateVal = row.querySelector("[data-field='dateISO']").value;
        const amount  = Number(row.querySelector("[data-field='amount']").value || 0);
        const cat     = row.querySelector("[data-field='category']").value;
        const note    = row.querySelector("[data-field='note']").value.trim();
        if (!dateVal || !cat || !amount) { alert("Date, category and amount are required."); return; }
        tx.dateISO   = dateVal;
        tx.amount    = amount;
        tx.category  = cat;
        tx.note      = note;
        editingTxId  = null;
        saveState();
        renderLogView();
        return;
      }

      if (action === "delete") {
        if (!confirm("Delete this transaction?")) return;
        const idx = month.transactions.findIndex(t => t.id === id);
        if (idx !== -1) month.transactions.splice(idx, 1);
        if (editingTxId === id) editingTxId = null;
        saveState();
        renderLogView();
        return;
      }
    }

    function renderAdminBudgetSection(section, title, items, isDisc) {

    function handleAdminClick(e) {
      const t = e.target;
      if (t.id==="adminOverwriteBtn") { saveToFile(activeFileName); return; }
      if (t.id==="adminSaveAsBtn") {
        const n = (document.getElementById("adminSaveAsInput")?.value.trim()||"");
        if (!n) { alert("Please enter a filename."); return; }
        saveToFile(n.endsWith(".json")?n:n+".json"); return;
      }
      if (t.id==="adminLoadFileBtn") { document.getElementById("importFileInput").click(); return; }

      const toggle = t.closest("[data-toggle]");
      if (toggle) {
        const s = toggle.dataset.toggle;
        collapsedAdminSections.has(s) ? collapsedAdminSections.delete(s) : collapsedAdminSections.add(s);
        renderAdminView(); return;
      }
      const editBtn = t.closest("[data-action='edit']");
      if (editBtn) { editingBudgetItem={section:editBtn.dataset.section,id:editBtn.dataset.id}; renderAdminView(); return; }
      const cancelBtn = t.closest("[data-action='cancel']");
      if (cancelBtn) { editingBudgetItem=null; renderAdminView(); return; }
      const saveBtn = t.closest("[data-action='save']");
      if (saveBtn) {
        const {section,id} = saveBtn.dataset;
        const row = document.querySelector(`.admin-item-edit-row[data-id="${id}"]`);
        if (!row) return;
        const name = row.querySelector(".admin-edit-name").value.trim();
        const budget = Number(row.querySelector(".admin-edit-budget").value||0);
        if (!name) { alert("Please enter a name."); return; }
        const item = getSectionArray(section).find(i=>i.id===id);
        if (item) { item.name=name; item.budgetAmount=budget; }
        editingBudgetItem=null; saveState(); renderAdminView(); return;
      }
      const deleteBtn = t.closest("[data-action='delete']");
      if (deleteBtn) {
        const {section,id} = deleteBtn.dataset;
        if (!confirm("Delete this item?")) return;
        const arr=getSectionArray(section), idx=arr.findIndex(i=>i.id===id);
        if (idx!==-1) arr.splice(idx,1);
        saveState(); renderAdminView(); return;
      }
      const addBtn = t.closest("[data-action='add']");
      if (addBtn) {
        const section = addBtn.dataset.section;
        const row = document.querySelector(`.admin-add-row[data-section="${section}"]`);
        if (!row) return;
        const name = row.querySelector(".admin-add-name").value.trim();
        const budget = Number(row.querySelector(".admin-add-budget").value||0);
        if (!name) { alert("Please enter a name."); return; }
        getSectionArray(section).push({id:uid(),name,budgetAmount:budget});
        saveState(); renderAdminView(); return;
      }
    }

    // ---- Init ----

    document.addEventListener("DOMContentLoaded", () => {
      document.querySelectorAll(".nav-btn").forEach(btn => btn.addEventListener("click", () => switchView(btn.dataset.view)));
      document.getElementById("quickSaveBtn").addEventListener("click", quickSave);
      const imp = document.getElementById("importFileInput");
      imp.addEventListener("change", e => { const f=e.target.files?.[0]; if(f) importStateFromFile(f); imp.value=""; });
      document.getElementById("adminView").addEventListener("click", handleAdminClick);
      loadState();
    });
  </script>
</body>
</html>
