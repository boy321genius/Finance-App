function renderMonthlyView() {
  const container = document.getElementById("monthlyView");
  const todayKey  = formatMonthKey(new Date());
  if (!monthlyViewKey) monthlyViewKey = activeMonthKey || todayKey;
  if (monthlyViewKey > todayKey) monthlyViewKey = todayKey;

  const bills    = appSettings.recurringBills          || [];
  const subs     = appSettings.recurringSubscriptions  || [];
  const invsts   = appSettings.recurringInvestments    || [];
  const disc     = appSettings.discretionaryCategories || [];
  const allItems = [...bills, ...subs, ...invsts, ...disc];

  const [vy, vm] = monthlyViewKey.split("-").map(Number);
  const [ty, tm] = todayKey.split("-").map(Number);
  const isYTD    = monthlyViewMode === "ytd";

  const ytdEndMonth   = (vy === ty) ? tm : (vy < ty ? 12 : vm);
  const ytdMonthCount = ytdEndMonth;
  const ytdYear       = vy;

  let viewTxs;
  if (isYTD) {
    viewTxs = [];
    for (let mo = 1; mo <= ytdEndMonth; mo++) {
      const key = ytdYear + "-" + String(mo).padStart(2, "0");
      viewTxs.push(...((months[key]?.transactions) || []));
    }
  } else {
    ensureMonthExists(monthlyViewKey);
    viewTxs = months[monthlyViewKey].transactions || [];
  }

  const rawActuals = computeActuals(viewTxs);
  const actuals    = computeEffectiveActuals(rawActuals, allItems);

  // All transactions this calendar year (for annual-paid detection)
  const mYearTxs = [];
  for (let mo = 1; mo <= 12; mo++) {
    const key = ytdYear + "-" + String(mo).padStart(2, "0");
    mYearTxs.push(...(months[key]?.transactions || []));
  }

  const monthDiff = (vy - ty) * 12 + (vm - tm);
  const navSub = isYTD
    ? (vy === ty ? "Current Year" : vy < ty ? `${ty - vy} year${ty - vy > 1 ? "s" : ""} ago` : "")
    : (monthDiff === 0 ? "Current Month" : monthDiff === -1 ? "Last Month" : monthDiff < -1 ? `${Math.abs(monthDiff)} months ago` : "");
  const navLabel   = isYTD ? `${ytdYear} Year to Date` : formatMonthLabelFromKey(monthlyViewKey);
  const canGoNext  = isYTD ? vy < ty : monthlyViewKey < todayKey;

  const monthlyBudget = allItems.reduce((s, i) => s + Number(i.budgetAmount || 0), 0);
  const totalBudget   = isYTD ? monthlyBudget * ytdMonthCount : monthlyBudget;
  const totalSpent    = Object.values(actuals).reduce((s, v) => s + v, 0);
  const remaining     = totalBudget - totalSpent;
  const overallPct    = totalBudget ? Math.min((totalSpent / totalBudget) * 100, 100) : 0;
  const overallCls    = overallPct >= 100 ? "over" : overallPct >= 80 ? "warn" : "under";

  let countOnTrack = 0, countAtRisk = 0, countOver = 0, countNotStarted = 0;
  allItems.forEach(item => {
    const actual = actuals[item.name] || 0;
    const budget = Number(item.budgetAmount || 0) * (isYTD ? ytdMonthCount : 1);
    if (!budget) return;
    // Annual items that are paid count as on-track regardless
    if (item.annualEnabled && isAnnualPaid(item, mYearTxs)) { countOnTrack++; return; }
    if (!actual) { countNotStarted++; return; }
    const pct = actual / budget;
    if (pct >= 1) countOver++;
    else if (pct >= 0.8) countAtRisk++;
    else countOnTrack++;
  });

  const overItems = allItems
    .filter(i => {
      if (i.annualEnabled && isAnnualPaid(i, mYearTxs)) return false;
      const a=actuals[i.name]||0, b=Number(i.budgetAmount||0)*(isYTD?ytdMonthCount:1);
      return b && a > b;
    })
    .map(i => ({ name:i.name, actual:actuals[i.name]||0, budget:Number(i.budgetAmount)*(isYTD?ytdMonthCount:1), over:(actuals[i.name]||0)-Number(i.budgetAmount)*(isYTD?ytdMonthCount:1) }));

  const atRiskItems = allItems
    .filter(i => {
      if (i.annualEnabled && isAnnualPaid(i, mYearTxs)) return false;
      const a=actuals[i.name]||0, b=Number(i.budgetAmount||0)*(isYTD?ytdMonthCount:1);
      if(!b)return false; const p=a/b; return p>=0.8&&p<1;
    })
    .map(i => ({ name:i.name, actual:actuals[i.name]||0, budget:Number(i.budgetAmount)*(isYTD?ytdMonthCount:1), pct:((actuals[i.name]||0)/(Number(i.budgetAmount)*(isYTD?ytdMonthCount:1)))*100 }));

  // ── Snapshot: scoped to Must Pay Bills + Subs only ──
  const fixedItems         = [...bills, ...subs];
  const fixedMonthlyBudget = fixedItems.reduce((s, i) => s + Number(i.budgetAmount || 0), 0);
  const fixedTotalBudget   = isYTD ? fixedMonthlyBudget * ytdMonthCount : fixedMonthlyBudget;
  const fixedTotalSpent    = fixedItems.reduce((s, i) => s + (actuals[i.name] || 0), 0);
  const fixedRemaining     = fixedTotalBudget - fixedTotalSpent;
  const fixedOverallPct    = fixedTotalBudget ? Math.min((fixedTotalSpent / fixedTotalBudget) * 100, 100) : 0;
  const fixedOverallCls    = fixedOverallPct >= 100 ? "over" : fixedOverallPct >= 80 ? "warn" : "under";

  // ── Income: stored in months[key].meta.income ──
  let viewIncome = 0;
  if (isYTD) {
    for (let mo = 1; mo <= ytdEndMonth; mo++) {
      const key = ytdYear + "-" + String(mo).padStart(2, "0");
      viewIncome += Number(months[key]?.meta?.income || 0);
    }
  } else {
    ensureMonthExists(monthlyViewKey);
    viewIncome = Number(months[monthlyViewKey].meta.income || 0);
  }

  // ── Prior month actuals for MoM comparison (monthly mode only) ──
  const prevMonthKey = formatMonthKey(new Date(vy, vm - 2, 1));
  const prevRawActuals = computeActuals(months[prevMonthKey]?.transactions || []);
  const prevActuals    = computeEffectiveActuals(prevRawActuals, allItems);

  // ── Top Spending: scoped to Discretionary only ──
  const discRanked = disc
    .filter(i => (actuals[i.name] || 0) > 0)
    .map(i => ({ name: i.name, actual: actuals[i.name] || 0, budget: Number(i.budgetAmount || 0) * (isYTD ? ytdMonthCount : 1) }))
    .sort((a, b) => b.actual - a.actual).slice(0, 5);

  // ── Over-budget items: all categories ──
  const overBudgetItems = allItems
    .filter(i => {
      if (i.annualEnabled && isAnnualPaid(i, mYearTxs)) return false;
      const a = actuals[i.name] || 0;
      const b = Number(i.budgetAmount || 0) * (isYTD ? ytdMonthCount : 1);
      return b > 0 && a > b;
    })
    .map(i => {
      const b = Number(i.budgetAmount) * (isYTD ? ytdMonthCount : 1);
      const a = actuals[i.name] || 0;
      return { name: i.name, budget: b, actual: a, over: a - b };
    })
    .sort((a, b) => b.over - a.over);

  // ── Discretionary deep-dive rows (all disc items with any activity) ──
  const discDeepDive = disc.map(i => {
    const curr = actuals[i.name] || 0;
    const prev = isYTD ? 0 : (prevActuals[i.name] || 0);
    const budget = Number(i.budgetAmount || 0) * (isYTD ? ytdMonthCount : 1);
    const delta = curr - prev;
    return { name: i.name, curr, prev, budget, delta };
  }).filter(r => r.curr > 0 || r.prev > 0);

  const discTotal      = disc.reduce((s, i) => s + (actuals[i.name] || 0), 0);
  const discPrevTotal  = isYTD ? 0 : disc.reduce((s, i) => s + (prevActuals[i.name] || 0), 0);
  const discBudget     = disc.reduce((s, i) => s + Number(i.budgetAmount || 0) * (isYTD ? ytdMonthCount : 1), 0);

  container.innerHTML = `
    <div class="view-mode-toggle">
      <button class="view-mode-btn ${!isYTD?"active":""}" id="modeMonthly">📅 Monthly</button>
      <button class="view-mode-btn ${isYTD ?"active":""}" id="modeYTD">📈 Year to Date</button>
    </div>

    <div class="month-nav">
      <button class="month-nav-btn" id="monthNavPrev">&#8249;</button>
      <div class="month-nav-center">
        <span class="month-nav-label">${navLabel}</span>
        ${navSub ? `<span class="month-nav-sub">${navSub}</span>` : ""}
      </div>
      <button class="month-nav-btn" id="monthNavNext" ${canGoNext?"":"disabled"}>&#8250;</button>
    </div>

    <!-- ══ SNAPSHOT CARD ══ -->
    <div class="card">
      <div class="card-header"><h2 class="card-title">${isYTD?"📋 YTD Snapshot":"📋 Monthly Snapshot"}</h2></div>
      <div class="card-body">

        <!-- Income row — full width, sits above budgeted/spent -->
        <div style="background:rgba(74,222,128,0.06);border:1px solid rgba(74,222,128,0.18);border-radius:10px;padding:10px 14px;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between;gap:12px;">
          <span style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--color-success);">${isYTD ? "YTD Income" : "Monthly Income"}</span>
          ${isYTD
            ? `<span style="font-size:20px;font-weight:800;color:var(--color-success);">${fmt(viewIncome)}</span>`
            : `<div style="display:flex;align-items:center;gap:4px;">
                 <span style="font-size:13px;color:var(--color-success);font-weight:700;">$</span>
                 <input id="incomeInput" type="number" min="0" step="1"
                   value="${viewIncome > 0 ? viewIncome : ""}"
                   placeholder="Enter income…"
                   style="background:none;border:none;border-bottom:1px solid rgba(74,222,128,0.35);
                          color:var(--color-success);font-size:18px;font-weight:800;text-align:right;
                          font-family:inherit;outline:none;padding:2px 0;width:140px;
                          -webkit-appearance:none;appearance:none;" />
               </div>`}
        </div>

        <!-- Budgeted vs Spent tiles -->

            <div class="stat-tile-label">${isYTD?"YTD Spent":"Total Spent"}</div>

          </div>
        </div>

        <div style="margin-bottom:10px;">
          <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:5px;">
            <span style="color:var(--color-text-secondary);">Budget used</span>
            <span style="font-weight:700;color:${progressColor(fixedOverallCls)};">${fixedOverallPct.toFixed(1)}%</span>
          </div>
          <div class="progress-bar-track thick">
            <div class="progress-bar-fill ${fixedOverallCls}" style="width:${fixedOverallPct}%;"></div>
          </div>
        </div>

       <div style="display:flex;align-items:center;padding:8px 0 0;">
  <span style="flex:1;font-size:13px;color:var(--color-text-secondary);">
    ${viewIncome > 0
      ? `Income after bills:<br><strong style="color:${viewIncome - fixedTotalSpent >= 0 ? "var(--color-success)" : "var(--color-danger)"};">${fmt(viewIncome - fixedTotalSpent)}</strong>`
      : `&nbsp;`}
  </span>
  <span style="flex:1;font-size:13px;color:var(--color-text-secondary);text-align:right;">
    ${fixedRemaining >= 0
      ? `Budget surplus:<br><strong style="color:var(--color-success);">${fmt(fixedRemaining)}</strong>`
      : `Over budget:<br><strong style="color:var(--color-danger);">+${fmt(Math.abs(fixedRemaining))}</strong>`}
  </span>
</div>
      </div>
    </div>

    <!-- ══ OVER BUDGET CARD ══ -->
    ${overBudgetItems.length > 0 ? `
    <div class="card">
      <div class="card-header" style="margin-bottom:4px;">
        <h2 class="card-title">🚨 Over Budget</h2>
        <span style="font-size:12px;font-weight:700;color:var(--color-danger);">${overBudgetItems.length} item${overBudgetItems.length>1?"s":""}</span>
      </div>
      <div class="card-body">
        <div style="display:grid;grid-template-columns:1fr 68px 68px 72px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--color-text-secondary);padding:0 0 6px;border-bottom:1px solid var(--color-border);margin-bottom:2px;">
          <span>Category</span>
          <span style="text-align:right;">Budget</span>
          <span style="text-align:right;">Actual</span>
          <span style="text-align:right;color:var(--color-danger);">Over By</span>
        </div>
        ${overBudgetItems.map(i => `
          <div style="display:grid;grid-template-columns:1fr 68px 68px 72px;align-items:center;padding:7px 0;border-bottom:1px solid rgba(255,255,255,0.04);">
            <span style="font-size:12px;color:var(--color-text-primary);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;padding-right:8px;">${i.name}</span>
            <span style="font-size:12px;color:var(--color-text-secondary);text-align:right;">${fmt(i.budget)}</span>
            <span style="font-size:12px;font-weight:700;color:var(--color-danger);text-align:right;">${fmt(i.actual)}</span>
            <span style="font-size:12px;font-weight:800;color:var(--color-danger);text-align:right;">+${fmt(i.over)}</span>
          </div>`).join("")}
        <div style="display:grid;grid-template-columns:1fr 68px 68px 72px;align-items:center;padding:8px 0 2px;border-top:1px solid var(--color-border);margin-top:2px;">
          <span style="font-size:12px;font-weight:700;color:var(--color-text-primary);">Total</span>
          <span></span>
          <span></span>
          <span style="font-size:13px;font-weight:800;color:var(--color-danger);text-align:right;">+${fmt(overBudgetItems.reduce((s,i)=>s+i.over,0))}</span>
        </div>
      </div>
    </div>` : ""}

    <!-- ══ DISCRETIONARY DEEP-DIVE CARD ══ -->
    <div class="card">
      <div class="card-header"><h2 class="card-title">🔍 Discretionary Spending</h2></div>
      <div class="card-body">
        ${discDeepDive.length === 0
          ? `<p class="text-muted" style="margin:0;">No discretionary spending logged yet.</p>`
          : (() => {
              const cols = !isYTD ? "1fr 62px 62px 62px" : "1fr 80px 80px";
              return `
              <div style="display:grid;grid-template-columns:${cols};font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--color-text-secondary);padding:0 0 6px;border-bottom:1px solid var(--color-border);margin-bottom:2px;">
                <span>Category</span>
                ${!isYTD ? `<span style="text-align:right;">${formatMonthLabelFromKey(prevMonthKey).split(" ")[0]}</span>` : ""}
                <span style="text-align:right;">${isYTD ? "YTD" : formatMonthLabelFromKey(monthlyViewKey).split(" ")[0]}</span>
                <span style="text-align:right;">${!isYTD ? "MoM" : "Budget"}</span>
              </div>

              ${discDeepDive.map(r => {
                const momColor  = r.delta > 0 ? "var(--color-danger)" : r.delta < 0 ? "var(--color-success)" : "var(--color-text-secondary)";
                const momLabel  = r.delta === 0 ? "—" : (r.delta > 0 ? "+" : "") + fmt(r.delta);
                const currColor = progressColor(progressClass(r.curr, r.budget));
                const budgColor = r.curr > r.budget && r.budget > 0 ? "var(--color-danger)" : "var(--color-text-secondary)";
                return `
                <div style="display:grid;grid-template-columns:${cols};align-items:center;padding:7px 0;border-bottom:1px solid rgba(255,255,255,0.04);">
                  <span style="font-size:12px;color:var(--color-text-primary);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;padding-right:8px;">${r.name}</span>
                  ${!isYTD ? `<span style="font-size:12px;color:var(--color-text-secondary);text-align:right;">${r.prev > 0 ? fmt(r.prev) : "—"}</span>` : ""}
                  <span style="font-size:12px;font-weight:700;color:${currColor};text-align:right;">${fmt(r.curr)}</span>
                  ${!isYTD
                    ? `<span style="font-size:11px;font-weight:700;color:${momColor};text-align:right;">${momLabel}</span>`
                    : `<span style="font-size:12px;color:${budgColor};text-align:right;">${r.budget > 0 ? fmt(r.budget) : "—"}</span>`}
                </div>`;
              }).join("")}

              <div style="display:grid;grid-template-columns:${cols};align-items:center;padding:9px 0 2px;border-top:1px solid var(--color-border);margin-top:2px;">
                <span style="font-size:12px;font-weight:700;color:var(--color-text-primary);">Total</span>
                ${!isYTD ? `<span style="font-size:12px;font-weight:700;color:var(--color-text-secondary);text-align:right;">${discPrevTotal > 0 ? fmt(discPrevTotal) : "—"}</span>` : ""}
                <span style="font-size:13px;font-weight:800;color:${progressColor(progressClass(discTotal, discBudget))};text-align:right;">${fmt(discTotal)}</span>
                ${!isYTD
                  ? (() => { const d = discTotal - discPrevTotal; const c = d > 0 ? "var(--color-danger)" : d < 0 ? "var(--color-success)" : "var(--color-text-secondary)"; return `<span style="font-size:11px;font-weight:800;color:${c};text-align:right;">${d===0?"—":(d>0?"+":"")+fmt(d)}</span>`; })()
                  : `<span style="font-size:12px;color:var(--color-text-secondary);text-align:right;">${discBudget > 0 ? fmt(discBudget) : "—"}</span>`}
              </div>`;
            })()}
      </div>
    </div>

    <!-- ══ TOP SPENDING CARD ══ -->
    <div class="card">
      <div class="card-header"><h2 class="card-title">🏆 Top Spending</h2></div>
      <div class="card-body">
        <div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--color-text-secondary);margin-bottom:12px;">Discretionary — Highest to Lowest</div>
        ${discRanked.length === 0
          ? `<p class="text-muted" style="margin:0;">No discretionary spending logged yet.</p>`
          : discRanked.map((item, idx) => {
              const pct   = item.budget ? Math.min((item.actual / item.budget) * 100, 100) : 0;
              const cls   = progressClass(item.actual, item.budget);
              const color = progressColor(cls);
              const medal = ["🥇","🥈","🥉","4️⃣","5️⃣"][idx];
              return `<div style="margin-bottom:13px;">
                <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px;">
                  <span style="font-size:15px;line-height:1;flex-shrink:0;">${medal}</span>
                  <span style="font-size:13px;color:var(--color-text-primary);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${item.name}</span>
                  <span style="font-size:13px;font-weight:700;color:${color};white-space:nowrap;">${fmt(item.actual)}</span>
                </div>
                ${item.budget
                  ? `<div class="progress-bar-track"><div class="progress-bar-fill ${cls}" style="width:${pct}%;"></div></div>`
                  : `<div style="font-size:10px;color:var(--color-text-secondary);">No budget set</div>`}
              </div>`;
            }).join("")}
      </div>
    </div>
  `;

  // ── Income input wiring (monthly mode only) ──
  const incomeInput = document.getElementById("incomeInput");
  if (incomeInput) {
    incomeInput.addEventListener("change", () => {
      ensureMonthExists(monthlyViewKey);
      months[monthlyViewKey].meta.income = Number(incomeInput.value) || 0;
      saveState();
      renderMonthlyView();
    });
    // Also update live on blur without re-render to avoid focus loss mid-typing
    incomeInput.addEventListener("blur", () => {
      ensureMonthExists(monthlyViewKey);
      const val = Number(incomeInput.value) || 0;
      if (val !== Number(months[monthlyViewKey].meta.income || 0)) {
        months[monthlyViewKey].meta.income = val;
        saveState();
        renderMonthlyView();
      }
    });
  }

  document.getElementById("modeMonthly").addEventListener("click", () => { monthlyViewMode = "monthly"; renderMonthlyView(); });
  document.getElementById("modeYTD").addEventListener("click",     () => { monthlyViewMode = "ytd";     renderMonthlyView(); });

  document.getElementById("monthNavPrev").addEventListener("click", () => {
    if (isYTD) { monthlyViewKey = (vy-1) + "-" + String(vm).padStart(2,"0"); }
    else { monthlyViewKey = formatMonthKey(new Date(vy, vm-2, 1)); }
    ensureMonthExists(monthlyViewKey); renderMonthlyView();
  });
  document.getElementById("monthNavNext")?.addEventListener("click", () => {
    if (isYTD) {
      if (vy+1 <= ty) { monthlyViewKey = (vy+1)+"-"+String(vm).padStart(2,"0"); ensureMonthExists(monthlyViewKey); renderMonthlyView(); }
    } else {
      const candidate = formatMonthKey(new Date(vy, vm, 1));
      if (candidate <= todayKey) { monthlyViewKey = candidate; ensureMonthExists(monthlyViewKey); renderMonthlyView(); }
    }
  });
}

// ─────────────────────────────────────────
//  ANNUAL / FUTURE VIEW
// ─────────────────────────────────────────

function renderAnnualView() {
  const container   = document.getElementById("annualView");
  const goals       = plannerState.goals || [];
  const mustPayMonthly = (appSettings.recurringBills||[]).reduce((s,i)=>s+Number(i.budgetAmount||0),0);

  function calcMonthlyPayment(principal, rate, years) {
    if (!principal||!rate) return 0;
    const r=rate/100/12, n=years*12;
    return principal*(r*Math.pow(1+r,n))/(Math.pow(1+r,n)-1);
  }
  function goalProjection(g) {
    const rem=Math.max(0,Number(g.targetAmount||0)-Number(g.currentAmount||0));
    const mo =Number(g.monthlyContribution||0);
    if (!rem) return {monthsLeft:0, projectedDate:"Achieved! 🎉"};
    if (!mo)  return {monthsLeft:null, projectedDate:"Set a monthly contribution"};
    const n=Math.ceil(rem/mo), d=new Date(); d.setMonth(d.getMonth()+n);
    return {monthsLeft:n, projectedDate:d.toLocaleString(undefined,{month:"short",year:"numeric"})};
  }

  const tabs = [
    { id:"overview", icon:"📊", label:"Overview" },
    ...goals.map(g => ({ id:g.id, icon:g.icon||"🎯", label:g.name.split(" ")[0] }))
  ];

  if (futureActiveTab !== "overview" && !goals.find(g=>g.id===futureActiveTab)) {
    futureActiveTab = "overview";
  }

  const tabNav = `
    <div class="future-tab-nav">
      ${tabs.map(t=>`
        <button class="future-tab-btn${futureActiveTab===t.id?" active":""}" data-future-tab="${t.id}">
          <span class="future-tab-icon">${t.icon}</span>
          <span class="future-tab-label">${t.label}</span>
        </button>`).join("")}
    </div>`;

  function renderOverview() {
    const rows = goals.map(g => {
      let pct=0, sub="", color="var(--color-primary)";
      if (g.type==="emergency") {
        const goalTarget = mustPayMonthly * Number(g.goalMonths||6);
        pct = goalTarget ? Math.min((Number(g.currentAmount||0)/goalTarget)*100,100) : 0;
        sub = `${fmt(Number(g.currentAmount||0))} of ${fmt(goalTarget)} · ${g.goalMonths||6}-month goal`;
      } else if (g.type==="home") {
        const sc=g.scenarios?.[activeHomeScenario]||{homePrice:225000,downPct:20};
        const hp=Number(sc.homePrice||0), dp=Number(sc.downPct||20);
        const down=hp*dp/100, loan=hp-down, rate=Number(g.interestRate||6.25), yrs=Number(g.loanTermYears||30);
        const pi=calcMonthlyPayment(loan,rate,yrs);
        const totalMonthly=pi+(hp*0.017/12)+(hp*0.005/12)+(dp<20?loan*0.0075/12:0)+Number(g.hoaFee||300);
        const totalCash=down+(hp*0.02+600+500+hp*0.005+hp*0.0075+loan*0.00375+hp*0.02+750)+(1500+350+hp*0.02+hp*0.01)+totalMonthly*3;
        const cur=Number(g.currentSavings||0);
        pct=totalCash?Math.min((cur/totalCash)*100,100):0;
        sub=`${fmt(cur)} of ~${fmt(totalCash)} needed · Scenario A`;
      } else if (g.type==="debt") {
        const bal  = Number(g.debtBalance ?? g.currentAmount ?? 0);
        const orig = Number(g.debtOriginal ?? bal);
        const paid = Math.max(0, orig - bal);
        pct   = orig > 0 ? Math.min((paid / orig) * 100, 100) : 0;
        sub   = `${fmt(bal)} remaining · ${fmt(paid)} paid off`;
        color = pct>=80?"var(--color-success)":pct>=40?"var(--color-warning)":"var(--color-danger)";
      } else if (g.type==="investment") {
        const cur = Number(g.currentAmount||0);
        const tgt = Number(g.targetAmount||0);
        const yrs = Number(g.investYears||10);
        if (tgt > 0) {
          pct = Math.min((cur/tgt)*100, 100);
          sub = `${fmt(cur)} of ${fmt(tgt)} target · ${yrs}-yr horizon`;
        } else {
          const r = 7/100/12, n = yrs*12, mo = Number(g.monthlyContribution||0);
          const proj = r===0 ? cur+mo*n : cur*Math.pow(1+r,n)+mo*((Math.pow(1+r,n)-1)/r);
          sub = `${fmt(cur)} now · ~${proj>=1e6?"$"+(proj/1e6).toFixed(1)+"M":"$"+(proj/1e3).toFixed(0)+"K"} projected in ${yrs} yrs`;
        }
      } else {
        pct=Number(g.targetAmount)?Math.min((Number(g.currentAmount||0)/Number(g.targetAmount))*100,100):0;
        const proj=goalProjection(g);
        sub=`${fmt(Number(g.currentAmount||0))} of ${fmt(Number(g.targetAmount||0))}${proj.projectedDate?" · "+proj.projectedDate:""}`;
      }
      color = pct>=100?"var(--color-success)":pct>=60?"var(--color-warning)":"var(--color-primary)";
      const barPct=Math.min(pct,100);
      return `
        <div class="overview-goal-row" data-future-tab="${g.id}">
          <span class="overview-row-icon">${g.icon||"🎯"}</span>
          <div class="overview-row-info">
            <div class="overview-row-name">${g.name}</div>
            <div class="overview-row-sub">${sub}</div>
            <div class="overview-mini-bar">
              <div class="progress-bar-track" style="height:5px;">
                <div class="progress-bar-fill" style="width:${barPct}%;background:${color};border-radius:3px;"></div>
              </div>
            </div>
          </div>
          <div class="overview-row-right">
            <div class="overview-row-pct" style="color:${color};">${pct.toFixed(0)}%</div>
            <div class="overview-row-arrow">›</div>
          </div>
        </div>`;
    }).join("");
    return `
      <div class="card" style="padding:0;overflow:hidden;">
        <div class="card-header" style="padding:14px 16px 12px;"><h2 class="card-title">Your Goals</h2></div>
        ${goals.length===0?'<p class="text-muted" style="padding:20px 16px;">No goals yet — add one below.</p>':`<div>${rows}</div>`}
      </div>`;
  }

  function renderEmergencyTab(g) {
    const isEditing = editingGoalId === g.id;
    const current   = Number(g.currentAmount||0);
    const baseline  = Number(g.baselineMonths||3);
    const goalMo    = Number(g.goalMonths||6);
    const baseTgt   = mustPayMonthly * baseline;
    const goalTgt   = mustPayMonthly * goalMo;
    const basePct   = baseTgt  ? Math.min((current/baseTgt)*100,100)  : 0;
    const goalPct   = goalTgt  ? Math.min((current/goalTgt)*100,100)  : 0;
    const color = goalPct>=100?"var(--color-success)":goalPct>=60?"var(--color-warning)":"var(--color-primary)";
    const MONTHS=[2,3,4,5,6,7,8];

    return `
      <div class="card">
        <div class="card-header"><h2 class="card-title">🛡️ Current Status</h2></div>
        <div class="card-body">
          <div class="stat-grid-2" style="margin-bottom:14px;">
            <div class="stat-tile"><div class="stat-tile-label">Currently Saved</div><div class="stat-tile-value" style="color:${color};">${fmt(current)}</div></div>
            <div class="stat-tile"><div class="stat-tile-label">Monthly Must-Pays</div><div class="stat-tile-value" style="color:var(--color-primary);">${fmt(mustPayMonthly)}</div></div>
          </div>
          ${mustPayMonthly===0?`<p style="font-size:12px;color:var(--color-warning);margin:0;">⚠️ Add Must-Pay bills in Admin to see coverage calculations.</p>`:""}
        </div>
      </div>
      <div class="card">
        <div class="card-header"><h2 class="card-title">📊 Coverage Range (2–8 months)</h2></div>
        <div class="card-body">
          ${MONTHS.map(mo=>{
            const tgt=mustPayMonthly*mo;
            const pct=tgt?Math.min((current/tgt)*100,100):0;
            const isBase=mo===baseline, isGoal=mo===goalMo;
            const barColor=isGoal?"var(--color-primary)":isBase?"var(--color-success)":"rgba(148,163,184,0.3)";
            const tag=isBase?" 🔒":isGoal?" 🎯":"";
            return `<div class="ef-month-bar-row"><span class="ef-month-label">${mo} mo${tag}</span><div class="progress-bar-track" style="flex:1;height:8px;"><div class="progress-bar-fill" style="width:${pct}%;background:${barColor};border-radius:4px;"></div></div><span class="ef-month-amount">${fmt(tgt)}</span></div>`;
          }).join("")}
        </div>
      </div>
      <div class="card">
        <div class="card-header"><h2 class="card-title">🎯 Your Targets</h2></div>
        <div class="card-body">
          ${[{label:`Baseline — ${baseline} months`,icon:"🔒",tgt:baseTgt,pct:basePct,color:"var(--color-success)"},{label:`Full Goal — ${goalMo} months`,icon:"🎯",tgt:goalTgt,pct:goalPct,color:"var(--color-primary)"}]
            .map(m=>`<div class="ef-milestone-row" style="margin-bottom:8px;"><span class="ef-milestone-icon">${m.icon}</span><div style="flex:1;"><div class="ef-milestone-label">${m.label}</div><div class="ef-milestone-sub">${m.pct<100?fmt(m.tgt-current)+" still needed":"✅ Achieved!"}</div></div><div style="text-align:right;"><div class="ef-milestone-value" style="color:${m.pct>=100?"var(--color-success)":m.color};">${fmt(m.tgt)}</div><div style="font-size:10px;color:var(--color-text-secondary);">${m.pct.toFixed(0)}% funded</div></div></div>`).join("")}
        </div>
      </div>
      ${isEditing ? `
      <div class="card">
        <div class="card-header"><h2 class="card-title">✏️ Update</h2></div>
        <div class="card-body">
          <div style="margin-bottom:12px;"><label class="goal-field-label">Currently Saved ($)</label><input class="goal-input" type="number" step="0.01" data-edit-field="currentAmount" value="${current}"></div>
          <div style="margin-bottom:12px;"><label class="goal-field-label">Baseline — minimum target (months of Must-Pays)</label><div class="ef-month-selector" id="efBaselineOpts">${MONTHS.map(mo=>`<span class="ef-month-opt${mo===baseline?" active-baseline":""}" data-ef-baseline="${mo}">${mo} mo</span>`).join("")}</div><input type="hidden" id="efBaselineVal" value="${baseline}"></div>
          <div style="margin-bottom:14px;"><label class="goal-field-label">Full Goal — stretch target (months of Must-Pays)</label><div class="ef-month-selector" id="efGoalOpts">${MONTHS.map(mo=>`<span class="ef-month-opt${mo===goalMo?" active-goal":""}" data-ef-goal="${mo}">${mo} mo</span>`).join("")}</div><input type="hidden" id="efGoalVal" value="${goalMo}"></div>
          <div class="goal-actions"><button class="admin-btn" data-goal-action="cancel-edit" data-id="${g.id}">Cancel</button><button class="admin-btn admin-btn-success" data-goal-action="save-ef" data-id="${g.id}">✓ Save</button></div>
        </div>
      </div>` : `<div style="display:flex;justify-content:center;"><button class="admin-btn" data-goal-action="edit" data-id="${g.id}">✏️ Update Savings & Targets</button></div>`}`;
  }

  function renderHomeTab(g) {
    const scenarios=g.scenarios||[{homePrice:225000,downPct:20},{homePrice:245000,downPct:20},{homePrice:265000,downPct:20}];
    const sc=scenarios[activeHomeScenario]||scenarios[0];
    const current=Number(g.currentSavings||0);
    const todayMonthKey = formatMonthKey(new Date());
    const monthIncome   = Number(months[activeMonthKey || todayMonthKey]?.meta?.income || 0);
    const netIncome     = monthIncome || Number(g.monthlyNetIncome||0);
    const rate=Number(g.interestRate??6.25), years=Number(g.loanTermYears??30), hoaFee=Number(g.hoaFee??300);
    const propTaxRate=Number(g.propTaxRate??1.7), hoiRate=Number(g.hoiRate??0.5), pmiRate=Number(g.pmiRate??0.75);
    const lenderTitleRate=Number(g.lenderTitleRate??2.0), appraisal=Number(g.appraisal??600), inspection=Number(g.inspection??500);
    const countyTaxRate=Number(g.countyTaxRate??0.5), stateTaxRate=Number(g.stateTaxRate??0.75), mortgageTaxRate=Number(g.mortgageTaxRate??0.375);
    const prepaidRate=Number(g.prepaidEscrowRate??2.0), attorneyFees=Number(g.attorneyFees??750);
    const movingCost=Number(g.movingCost??1500), utilityDeposits=Number(g.utilityDeposits??350);
    const furnishingsRate=Number(g.furnishingsRate??2.0), repairsRate=Number(g.repairsRate??1.0), reserveMonths=Number(g.reserveMonths??3);
    const homePrice=Number(sc.homePrice||0), downPct=Number(sc.downPct||20);
    const downAmt=homePrice*downPct/100, loanAmt=homePrice-downAmt;
    const pi=calcMonthlyPayment(loanAmt,rate,years);
    const propTaxMo=homePrice*propTaxRate/100/12, hoiMo=homePrice*hoiRate/100/12, pmiMo=downPct<20?loanAmt*pmiRate/100/12:0;
    const total=pi+propTaxMo+hoiMo+pmiMo+hoaFee;

    const furnishings=homePrice*furnishingsRate/100, repairs=homePrice*repairsRate/100;
    const totalMoveIn=movingCost+utilityDeposits+furnishings+repairs;
    const reserve=total*reserveMonths, totalCash=downAmt+totalClosing+totalMoveIn+reserve;
    const shortfall=Math.max(0,totalCash-current), cashPct=totalCash?Math.min((current/totalCash)*100,100):0;

    function affordRow(label,deductions){const left=netIncome-deductions-total,can=left>=0;return`<div class="hp-afford-row"><span class="hp-afford-label">${label}</span><span class="hp-afford-value" style="color:${can?"var(--color-success)":"var(--color-danger)"};">${can?"✅ "+fmt(left)+" left":"❌ "+fmt(Math.abs(left))+" short"}</span></div>`;}

            .map(([l,v])=>`<div class="hp-row"><span class="hp-row-label">${l}</span><span class="hp-row-value" style="${!v?"opacity:.3;":""}">${v>0?fmt(v):"—"}</span></div>`).join("")}

          ${[[`Lender / Title (${lenderTitleRate}%)`,lenderTitle],["Appraisal",appraisal],["Home Inspection",inspection],[`County Transfer Tax (${countyTaxRate}%)`,countyTax],[`State Transfer Tax (${stateTaxRate}%)`,stateTax],[`Mortgage Recording Tax (${mortgageTaxRate}%)`,mortgageTax],[`Prepaid Escrow (${prepaidRate}%)`,prepaidEscrow],["Attorney Fees",attorneyFees]]
            .map(([l,v])=>`<div class="hp-row"><span class="hp-row-label">${l}</span><span class="hp-row-value">${fmt(v)}</span></div>`).join("")}
          <div class="hp-row" style="padding-top:5px;border-top:1px solid var(--color-border);margin-top:4px;"><span class="hp-row-label" style="font-weight:600;">Total Closing</span><span class="hp-row-value" style="color:var(--color-primary);">${fmt(totalClosing)}</span></div>
          <div class="hp-section-title" style="margin:12px 0 8px;">Move-In Costs</div>
          ${[["Moving / Movers",movingCost],["Utility Deposits",utilityDeposits],[`Furnishings (${furnishingsRate}%)`,furnishings],[`Immediate Repairs (${repairsRate}%)`,repairs]]
            .map(([l,v])=>`<div class="hp-row"><span class="hp-row-label">${l}</span><span class="hp-row-value">${fmt(v)}</span></div>`).join("")}
          <div class="hp-row" style="padding-top:5px;border-top:1px solid var(--color-border);margin-top:4px;"><span class="hp-row-label" style="font-weight:600;">Total Move-In</span><span class="hp-row-value" style="color:var(--color-primary);">${fmt(totalMoveIn)}</span></div>
          <div class="hp-section-title" style="margin:12px 0 8px;">Payment Reserve</div>
          <div class="hp-row"><span class="hp-row-label">${reserveMonths}-Month Buffer (${fmt(total)}/mo)</span><span class="hp-row-value">${fmt(reserve)}</span></div>
          <div class="hp-total-row" style="margin-top:8px;"><span class="hp-total-label">Total Cash Needed</span><span class="hp-total-value">${fmt(totalCash)}</span></div>

      <!-- ✅ AFFORDABILITY CARD 2: Savings vs cash needed, all scenarios -->
      <div class="card">
        <div class="card-header"><h2 class="card-title">🏦 Am I Ready to Close?</h2></div>
        <div class="card-body">
          <p style="font-size:11px;color:var(--color-text-secondary);margin:0 0 14px;line-height:1.5;">Your current savings vs. total cash needed (down payment + closing + move-in + reserve) for each scenario.</p>
          ${scenarios.map((s,i) => {
            const hp   = Number(s.homePrice||0), dp = Number(s.downPct||20);
            const loan = hp - hp*dp/100;
            const scPi  = calcMonthlyPayment(loan, rate, years);
            const scPmi = dp < 20 ? loan*pmiRate/100/12 : 0;
            const scTotal = scPi + hp*propTaxRate/100/12 + hp*hoiRate/100/12 + scPmi + hoaFee;
            const scDown  = hp*dp/100;
            const scClose = hp*lenderTitleRate/100 + appraisal + inspection + hp*countyTaxRate/100 + hp*stateTaxRate/100 + loan*mortgageTaxRate/100 + hp*prepaidRate/100 + attorneyFees;
            const scMoveIn= movingCost + utilityDeposits + hp*furnishingsRate/100 + hp*repairsRate/100;
            const scReserve = scTotal * reserveMonths;
            const scCash  = scDown + scClose + scMoveIn + scReserve;
            const scPct   = scCash ? Math.min((current/scCash)*100,100) : 0;
            const scShort = Math.max(0, scCash - current);
            const scOver  = Math.max(0, current - scCash);
            const barColor= scPct>=100?"var(--color-success)":scPct>=60?"var(--color-warning)":"var(--color-primary)";
            const scLabel = ["A","B","C"][i];
            return `
              <div style="margin-bottom:${i<scenarios.length-1?"18px":"0"};">
                <div style="display:flex;align-items:baseline;justify-content:space-between;margin-bottom:5px;">
                  <span style="font-size:13px;font-weight:700;color:var(--color-text-primary);">Scenario ${scLabel} — ${fmt(hp)}</span>
                  <span style="font-size:11px;color:var(--color-text-secondary);">${dp}% down · ${fmt(scCash)} needed</span>
                </div>
                <div class="progress-bar-track" style="height:10px;margin-bottom:5px;">
                  <div class="progress-bar-fill" style="width:${scPct}%;background:${barColor};border-radius:5px;transition:width .3s;"></div>
                </div>
                <div style="display:flex;justify-content:space-between;align-items:center;">
                  <span style="font-size:11px;color:var(--color-text-secondary);">${fmt(current)} saved · ${scPct.toFixed(0)}% of goal</span>
                  <span style="font-size:12px;font-weight:800;color:${scOver>0?"var(--color-success)":"var(--color-danger)"};">${scOver>0?"🎉 +"+fmt(scOver)+" surplus":"−"+fmt(scShort)+" to go"}</span>
                </div>
              </div>`;
          }).join("")}
        </div>
      </div>
      <div class="card" style="border-color:rgba(106,166,255,0.18);">
        <div class="card-header" style="cursor:pointer;" data-goal-action="hp-toggle-inputs" data-id="${g.id}">
          <h2 class="card-title">⚙️ Inputs &amp; Assumptions</h2>
          <span style="font-size:12px;color:var(--color-text-secondary);user-select:none;">${hpInputsOpen?"▲ Collapse":"▼ Expand"}</span>
        </div>
        ${hpInputsOpen ? `
        <div class="card-body" style="display:flex;flex-direction:column;gap:14px;">
          <div><div class="hp-inputs-group-label">💼 My Numbers</div><div class="hp-inputs-grid-2">${dolField("Current House Savings ($)","hp-currentSavings",current)}<div><label class="hp-input-label">Monthly Net Income ($) <span style="font-size:9px;color:var(--color-primary);font-weight:700;">↔ Monthly tab</span></label><input class="goal-input" id="hp-netIncome" type="number" step="50" min="0" value="${netIncome||""}"><div style="font-size:10px;color:var(--color-text-secondary);margin-top:3px;line-height:1.4;">${monthIncome>0?`Auto-filled from ${formatMonthLabelFromKey(activeMonthKey||todayMonthKey)}`:"Enter income in the Monthly tab to auto-fill"}</div></div></div></div>
          <div><div class="hp-inputs-group-label">🏠 Scenarios</div>${scenarios.map((s,i)=>`<div class="hp-scenario-row"><span class="hp-scenario-label">${["A","B","C"][i]}</span><div style="flex:2;"><label class="hp-input-label">Home Price ($)</label><input class="goal-input" type="number" step="5000" id="hp-sc-price-${i}" value="${s.homePrice||225000}"></div><div style="flex:1;"><label class="hp-input-label">Down %</label><input class="goal-input" type="number" step="5" min="3" max="50" id="hp-sc-dpct-${i}" value="${s.downPct||20}"></div></div>`).join("")}</div>
          <div><div class="hp-inputs-group-label">🏦 Loan Terms</div><div class="hp-inputs-grid-3">${pctField("Rate (%)","hp-rate",rate)}${field("Term (yrs)","hp-years",years,'step="5" min="10" max="40"')}${dolField("HOA ($/mo)","hp-hoa",hoaFee)}</div></div>
          <div><div class="hp-inputs-group-label">📅 Monthly Assumptions</div><div class="hp-inputs-grid-3">${pctField("Prop Tax %/yr","hp-propTax",propTaxRate)}${pctField("HOI %/yr","hp-hoi",hoiRate)}${pctField("PMI %/yr","hp-pmi",pmiRate)}</div><div class="hp-inputs-note">PMI applies only when down payment &lt; 20%</div></div>
          <div><div class="hp-inputs-group-label">🔑 Closing Costs</div><div class="hp-inputs-grid-2">${pctField("Lender/Title %","hp-lenderTitle",lenderTitleRate)}${pctField("County Transfer %","hp-countyTax",countyTaxRate)}${pctField("State Transfer %","hp-stateTax",stateTaxRate)}${pctField("Mortgage Tax %","hp-mortgageTax",mortgageTaxRate)}${pctField("Prepaid Escrow %","hp-prepaid",prepaidRate)}${dolField("Appraisal ($)","hp-appraisal",appraisal)}${dolField("Inspection ($)","hp-inspection",inspection)}${dolField("Attorney Fees ($)","hp-attorney",attorneyFees)}</div></div>
          <div><div class="hp-inputs-group-label">📦 Move-In Costs</div><div class="hp-inputs-grid-2">${dolField("Moving ($)","hp-moving",movingCost)}${dolField("Utility Deposits ($)","hp-utilDeposits",utilityDeposits)}${pctField("Furnishings %","hp-furnishings",furnishingsRate)}${pctField("Repairs %","hp-repairs",repairsRate)}</div></div>
          <div><div class="hp-inputs-group-label">🛡️ Payment Reserve</div>${field("Reserve Buffer (months of total payment)","hp-reserveMonths",reserveMonths,'step="1" min="1" max="12"')}<div class="hp-inputs-note">Cash cushion to cover payments while settling in</div></div>
          <button class="btn btn-block" id="hp-saveNumbers" type="button" style="padding:11px;font-size:14px;font-weight:700;">✓ Save &amp; Recalculate</button>
        </div>` : ""}
      </div>`;
  }

  function renderRetirementTab(g) {
    const currentSavings = Number(g.retCurrentSavings ?? g.currentAmount ?? 0);
    const monthlyContrib = Number(g.retMonthlyContrib ?? g.monthlyContribution ?? 0);
    const currentAge     = Number(g.retCurrentAge     ?? 35);
    const retirementAge  = Number(g.retRetirementAge  ?? 65);
    const yearsToRetire  = Math.max(0, retirementAge - currentAge);
    const monthsToRetire = yearsToRetire * 12;

    // Future value: lump sum + monthly contributions compounded monthly
    function fv(principal, monthly, annualRate, years) {
      if (years <= 0) return principal;
      const r = annualRate / 100 / 12;
      const n = years * 12;
      if (r === 0) return principal + monthly * n;
      return principal * Math.pow(1 + r, n) + monthly * ((Math.pow(1 + r, n) - 1) / r);
    }

    function fmtBig(n) {
      if (n >= 1e6) return "$" + (n / 1e6).toFixed(2) + "M";
      if (n >= 1e3) return "$" + (n / 1e3).toFixed(0) + "K";
      return "$" + Number(n).toFixed(0);
    }

    function yearsToTarget(target) {
      if (currentSavings >= target) return 0;
      for (let y = 1; y <= 60; y++) {
        if (fv(currentSavings, monthlyContrib, 7, y) >= target) return y;
      }
      return null;
    }

    const SCENARIOS = [
      { label:"4%",  rate:4,  color:"var(--color-text-secondary)", bg:"rgba(148,163,184,0.1)", border:"rgba(148,163,184,0.2)" },
      { label:"6%",  rate:6,  color:"var(--color-warning)",        bg:"rgba(251,191,36,0.08)", border:"rgba(251,191,36,0.2)"  },
      { label:"7%",  rate:7,  color:"var(--color-primary)",        bg:"rgba(106,166,255,0.1)", border:"rgba(106,166,255,0.25)"},
      { label:"8%",  rate:8,  color:"var(--color-success)",        bg:"rgba(74,222,128,0.08)", border:"rgba(74,222,128,0.2)"  },
      { label:"10%", rate:10, color:"#fb923c",                     bg:"rgba(251,146,60,0.08)", border:"rgba(251,146,60,0.2)"  },
    ];

    // Key numbers at 7%
    const retBal7        = fv(currentSavings, monthlyContrib, 7, yearsToRetire);
    const totalContrib   = currentSavings + monthlyContrib * monthsToRetire;
    const growthAt7      = Math.max(0, retBal7 - totalContrib);
    const growthPct7     = retBal7 > 0 ? (growthAt7 / retBal7) * 100 : 0;
    const contribPct7    = 100 - growthPct7;
    const monthlyIncome7 = retBal7 * 0.04 / 12;

    // Build table row years: smart set covering key intervals
    const rowYearSet = new Set();
    if (yearsToRetire > 0) {
      [5, 10, 15, 20, 25, 30].forEach(y => { if (y < yearsToRetire) rowYearSet.add(y); });
      rowYearSet.add(yearsToRetire);                                          // retirement
      if (yearsToRetire + 10 <= 50) rowYearSet.add(yearsToRetire + 10);      // +10 post-retirement
      if (yearsToRetire + 20 <= 55) rowYearSet.add(yearsToRetire + 20);      // +20 post-retirement
    } else {
      [5, 10, 20, 30].forEach(y => rowYearSet.add(y));
    }
    const rowYears = Array.from(rowYearSet).sort((a, b) => a - b);

    const tableRows = rowYears.map(years => {
      const age   = currentAge + years;
      const isRet = years === yearsToRetire && yearsToRetire > 0;
      const trCls = isRet ? ' class="ret-row-retire"' : '';
      const cells = SCENARIOS.map(s => {
        const val = fv(currentSavings, monthlyContrib, s.rate, years);
        return `<td style="text-align:right;font-weight:${isRet?"800":"500"};color:${isRet?s.color:"var(--color-text-primary)"};">${fmtBig(val)}</td>`;
      }).join("");
      return `<tr${trCls}>
        <td style="color:${isRet?"var(--color-primary)":"var(--color-text-secondary)"};font-weight:${isRet?"700":"400"};white-space:nowrap;">
          ${isRet?"🎯 ":""}Age ${age}<span style="display:block;font-size:9px;opacity:.65;">${years}yr${years!==1?"s":""}</span>
        </td>
        ${cells}
      </tr>`;
    }).join("");

    // Income rows at retirement
    const incomeRows = SCENARIOS.map(s => {
      const bal     = fv(currentSavings, monthlyContrib, s.rate, yearsToRetire);
      const monthly = bal * 0.04 / 12;
      return `<div class="ret-income-row">
        <div>
          <span style="font-size:13px;font-weight:700;color:${s.color};">${s.label} return</span>
          <span style="font-size:10px;color:var(--color-text-secondary);margin-left:5px;">→ ${fmtBig(bal)}</span>
        </div>
        <span style="font-size:15px;font-weight:800;color:${s.color};">${fmt(monthly)}<span style="font-size:10px;font-weight:600;color:var(--color-text-secondary);">/mo</span></span>
      </div>`;
    }).join("");

    // Milestones
    const milestoneTargets = [
      { target:100000,  emoji:"💰", label:"$100K"  },
      { target:250000,  emoji:"💎", label:"$250K"  },
      { target:500000,  emoji:"🔥", label:"$500K"  },
      { target:1000000, emoji:"🎉", label:"$1 Million" },
      { target:2000000, emoji:"🚀", label:"$2 Million" },
    ];
    const milestoneRows = milestoneTargets.map(m => {
      if (currentSavings >= m.target) {
        return `<div class="ret-milestone-row">
          <span class="ret-milestone-icon">${m.emoji}</span>
          <div class="ret-milestone-info">
            <div class="ret-milestone-main" style="color:var(--color-success);">Already at ${m.label} ✓</div>
          </div>
        </div>`;
      }
      const yrs = yearsToTarget(m.target);
      if (yrs === null) {
        return `<div class="ret-milestone-row" style="opacity:.5;">
          <span class="ret-milestone-icon">${m.emoji}</span>
          <div class="ret-milestone-info">
            <div class="ret-milestone-main">${m.label} — not reached in 60 yrs</div>
            <div class="ret-milestone-sub">Increase contributions to reach this</div>
          </div>
        </div>`;
      }
      const ageAtMilestone = currentAge + yrs;
      const isPreRetire    = ageAtMilestone < retirementAge;
      const timing         = isPreRetire ? "before retirement 🎯" : "after retirement 🏖️";
      return `<div class="ret-milestone-row">
        <span class="ret-milestone-icon">${m.emoji}</span>
        <div class="ret-milestone-info">
