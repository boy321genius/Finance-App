          <span style="color:var(--color-text-secondary);">Monthly average</span>
          <span style="font-weight:700;color:var(--color-primary);">${fmt(ytdMonthCount ? totalSpent/ytdMonthCount : 0)}</span>
        </div>
      </div>
    </div>` : ""}

    <div class="card">
      <div class="card-header"><h2 class="card-title">🔢 Quick Stats</h2></div>
      <div class="card-body">
        <div class="insight-row"><span class="insight-row-label">Total transactions</span><span class="insight-row-value" style="color:var(--color-primary);">${viewTxs.length}</span></div>
        <div class="insight-row"><span class="insight-row-label">Avg transaction size</span><span class="insight-row-value" style="color:var(--color-primary);">${fmt(avgTx)}</span></div>
        ${biggestTx ? `
        <div class="insight-row"><span class="insight-row-label">Largest transaction</span><span class="insight-row-value" style="color:var(--color-warning);">${fmt(biggestTx.amount)}</span></div>
        <div class="insight-row" style="padding-top:2px;"><span style="font-size:11px;color:var(--color-text-secondary);">${biggestTx.category}${biggestTx.note?" • "+biggestTx.note:""} · ${biggestTx.dateISO}</span></div>` : ""}
      </div>
    </div>

    <div class="card">
      <div class="card-header"><h2 class="card-title">🩺 Budget Health</h2></div>
      <div class="card-body">
        <div class="stat-grid-4" style="margin-bottom:${overItems.length||atRiskItems.length?"16px":"0"};">
          ${[{label:"On Track",count:countOnTrack,color:"var(--color-success)",icon:"✅"},{label:"At Risk",count:countAtRisk,color:"var(--color-warning)",icon:"⚠️"},{label:"Over Budget",count:countOver,color:"var(--color-danger)",icon:"🚨"},{label:"Not Started",count:countNotStarted,color:"var(--color-text-secondary)",icon:"⏳"}]
            .map(h=>`<div class="health-tile"><span class="health-tile-icon">${h.icon}</span><div><div class="health-tile-count" style="color:${h.color};">${h.count}</div><div class="health-tile-label">${h.label}</div></div></div>`).join("")}
        </div>
        ${overItems.length>0?`<div style="margin-bottom:12px;"><div class="section-label" style="color:var(--color-danger);">Over Budget</div>${overItems.map(i=>`<div class="insight-row"><span class="insight-row-label">${i.name}</span><span class="insight-row-value" style="color:var(--color-danger);">+${fmt(i.over)} over</span></div>`).join("")}</div>`:""}
        ${atRiskItems.length>0?`<div><div class="section-label" style="color:var(--color-warning);">At Risk (80–99%)</div>${atRiskItems.map(i=>`<div class="insight-row"><span class="insight-row-label">${i.name}</span><span class="insight-row-value" style="color:var(--color-warning);">${i.pct.toFixed(0)}% used</span></div>`).join("")}</div>`:""}
        ${overItems.length===0&&atRiskItems.length===0&&viewTxs.length>0?`<p style="font-size:13px;color:var(--color-success);margin:0;">✅ All categories on track!</p>`:""}
        ${viewTxs.length===0?`<p class="text-muted" style="margin:0;">No transactions logged yet.</p>`:""}
      </div>
    </div>

    <div class="card">
      <div class="card-header"><h2 class="card-title">🪣 Spending by Bucket</h2></div>
      <div class="card-body">
        ${buckets.map(bucket => {
          const bMonthly=bucket.items.reduce((s,i)=>s+Number(i.budgetAmount||0),0);
          const bTotal=bMonthly*(isYTD?ytdMonthCount:1);
          const aTotal=bucket.items.reduce((s,i)=>s+(actuals[i.name]||0),0);
          const pct=bTotal?Math.min((aTotal/bTotal)*100,100):0;
          const cls=progressClass(aTotal,bTotal);
          const color=progressColor(cls);
          const bPct=totalBudget?((bTotal/totalBudget)*100).toFixed(0):0;
          return `
            <div style="margin-bottom:16px;">
              <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:5px;">
                <span style="font-size:13px;font-weight:600;color:var(--color-text-primary);">${bucket.label}</span>
                <span style="font-size:12px;white-space:nowrap;"><span style="font-weight:700;color:${color};">${fmt(aTotal)}</span><span style="color:var(--color-text-secondary);"> / ${bTotal?fmt(bTotal):"—"}</span></span>
              </div>
              <div class="progress-bar-track"><div class="progress-bar-fill ${cls}" style="width:${pct}%;"></div></div>
              ${bTotal?`<div style="font-size:10px;color:var(--color-text-secondary);margin-top:3px;">${bPct}% of total budget</div>`:""}
            </div>`;
        }).join("")}
      </div>
    </div>

    <div class="card">
      <div class="card-header"><h2 class="card-title">🏆 Top Spending</h2></div>
      <div class="card-body">
        ${ranked.length===0?'<p class="text-muted">No spending logged yet.</p>':ranked.map((item,idx)=>{
          const pct=item.budget?Math.min((item.actual/item.budget)*100,100):0;
          const cls=progressClass(item.actual,item.budget);
          const color=progressColor(cls);
          const medal=["🥇","🥈","🥉","4️⃣","5️⃣"][idx];
          return `<div style="margin-bottom:13px;"><div style="display:flex;align-items:center;gap:8px;margin-bottom:4px;"><span style="font-size:15px;line-height:1;flex-shrink:0;">${medal}</span><span style="font-size:13px;color:var(--color-text-primary);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${item.name}</span><span style="font-size:13px;font-weight:700;color:${color};white-space:nowrap;">${fmt(item.actual)}</span></div>${item.budget?`<div class="progress-bar-track"><div class="progress-bar-fill ${cls}" style="width:${pct}%;"></div></div>`:`<div style="font-size:10px;color:var(--color-text-secondary);">No budget set</div>`}</div>`;
        }).join("")}
      </div>
    </div>

    ${isCurrentMonth ? `
    <div class="card">
      <div class="card-header"><h2 class="card-title">📅 Spending Pace</h2></div>
      <div class="card-body">
        <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:5px;">
          <span style="color:var(--color-text-secondary);">Day <strong style="color:var(--color-text-primary);">${dayOfMonth}</strong> of <strong style="color:var(--color-text-primary);">${daysInMonth}</strong></span>
          <span style="font-weight:700;color:var(--color-primary);">${pacePct.toFixed(0)}% through the month</span>
        </div>
        <div class="progress-bar-track" style="margin-bottom:14px;"><div class="progress-bar-fill unset" style="width:${pacePct}%;"></div></div>
        <div class="stat-grid-2" style="margin-bottom:${monthlyBudget>0?"12px":"0"};">
          <div class="stat-tile"><div class="stat-tile-label">Spent So Far</div><div class="stat-tile-value" style="color:var(--color-primary);font-size:18px;">${fmt(totalSpent)}</div></div>
          <div class="stat-tile"><div class="stat-tile-label">Projected End-of-Month</div><div class="stat-tile-value" style="color:${projectedSpend>monthlyBudget?"var(--color-danger)":"var(--color-warning)"};font-size:18px;">${fmt(projectedSpend)}</div></div>
        </div>
        ${monthlyBudget>0?`<p style="font-size:12px;color:var(--color-text-secondary);margin:0;text-align:center;line-height:1.6;">At this pace you'll finish <strong style="color:${projectedSpend>monthlyBudget?"var(--color-danger)":"var(--color-success)"};">${projectedSpend>monthlyBudget?fmt(projectedSpend-monthlyBudget)+" over budget":fmt(monthlyBudget-projectedSpend)+" under budget"}</strong></p>`:""}
      </div>
    </div>` : ""}

    ${unbudgeted.length>0 ? `
    <div class="card">
      <div class="card-header"><h2 class="card-title">🔍 Unbudgeted Spending</h2></div>
      <div class="card-body">
        <p style="font-size:12px;color:var(--color-text-secondary);margin:0 0 10px;line-height:1.5;">Spending logged in categories with no budget set. Consider adding budgets in Admin.</p>
        ${unbudgeted.map(i=>`<div class="insight-row"><span class="insight-row-label">${i.name}</span><span class="insight-row-value" style="color:var(--color-warning);">${fmt(i.actual)}</span></div>`).join("")}
      </div>
    </div>` : ""}
  `;

  document.getElementById("modeMonthly").addEventListener("click", () => { monthlyViewMode = "monthly"; renderMonthlyView(); });
  document.getElementById("modeYTD").addEventListener("click",     () => { monthlyViewMode = "ytd";     renderMonthlyView(); });

  document.getElementById("monthNavPrev").addEventListener("click", () => {
    if (isYTD) { monthlyViewKey = (vy-1) + "-" + String(vm).padStart(2,"0"); }
    else { monthlyViewKey = formatMonthKey(new Date(vy, vm-2, 1)); }
    ensureMonthExists(monthlyViewKey); renderMonthlyView();
  });
  document.getElementById("monthNavNext")?.addEventListener("click", () => {
    if (isYTD) {
      if (vy+1 <= ty) { monthlyViewKey = (vy+1)+"-"+String(vm).padStart(2,"0"); ensureMonthExists(monthlyViewKey); renderMonthlyView(); }
    } else {
      const candidate = formatMonthKey(new Date(vy, vm, 1));
      if (candidate <= todayKey) { monthlyViewKey = candidate; ensureMonthExists(monthlyViewKey); renderMonthlyView(); }
    }
  });
}

// ─────────────────────────────────────────
//  ANNUAL / FUTURE VIEW
// ─────────────────────────────────────────

function renderAnnualView() {
  const container   = document.getElementById("annualView");
  const goals       = plannerState.goals || [];
  const mustPayMonthly = (appSettings.recurringBills||[]).reduce((s,i)=>s+Number(i.budgetAmount||0),0);

  function calcMonthlyPayment(principal, rate, years) {
    if (!principal||!rate) return 0;
    const r=rate/100/12, n=years*12;
    return principal*(r*Math.pow(1+r,n))/(Math.pow(1+r,n)-1);
  }
  function goalProjection(g) {
    const rem=Math.max(0,Number(g.targetAmount||0)-Number(g.currentAmount||0));
    const mo =Number(g.monthlyContribution||0);
    if (!rem) return {monthsLeft:0, projectedDate:"Achieved! 🎉"};
    if (!mo)  return {monthsLeft:null, projectedDate:"Set a monthly contribution"};
    const n=Math.ceil(rem/mo), d=new Date(); d.setMonth(d.getMonth()+n);
    return {monthsLeft:n, projectedDate:d.toLocaleString(undefined,{month:"short",year:"numeric"})};
  }

  const tabs = [
    { id:"overview", icon:"📊", label:"Overview" },
    ...goals.map(g => ({ id:g.id, icon:g.icon||"🎯", label:g.name.split(" ")[0] }))
  ];

  if (futureActiveTab !== "overview" && !goals.find(g=>g.id===futureActiveTab)) {
    futureActiveTab = "overview";
  }

  const tabNav = `
    <div class="future-tab-nav">
      ${tabs.map(t=>`
        <button class="future-tab-btn${futureActiveTab===t.id?" active":""}" data-future-tab="${t.id}">
          <span class="future-tab-icon">${t.icon}</span>
          <span class="future-tab-label">${t.label}</span>
        </button>`).join("")}
    </div>`;

  function renderOverview() {
    const rows = goals.map(g => {
      let pct=0, sub="", color="var(--color-primary)";
      if (g.type==="emergency") {
        const goalTarget = mustPayMonthly * Number(g.goalMonths||6);
        pct = goalTarget ? Math.min((Number(g.currentAmount||0)/goalTarget)*100,100) : 0;
        sub = `${fmt(Number(g.currentAmount||0))} of ${fmt(goalTarget)} · ${g.goalMonths||6}-month goal`;
      } else if (g.type==="home") {
        const sc=g.scenarios?.[activeHomeScenario]||{homePrice:225000,downPct:20};
        const hp=Number(sc.homePrice||0), dp=Number(sc.downPct||20);
        const down=hp*dp/100, loan=hp-down, rate=Number(g.interestRate||6.25), yrs=Number(g.loanTermYears||30);
        const pi=calcMonthlyPayment(loan,rate,yrs);
        const totalMonthly=pi+(hp*0.017/12)+(hp*0.005/12)+(dp<20?loan*0.0075/12:0)+Number(g.hoaFee||300);
        const totalCash=down+(hp*0.02+600+500+hp*0.005+hp*0.0075+loan*0.00375+hp*0.02+750)+(1500+350+hp*0.02+hp*0.01)+totalMonthly*3;
        const cur=Number(g.currentSavings||0);
        pct=totalCash?Math.min((cur/totalCash)*100,100):0;
        sub=`${fmt(cur)} of ~${fmt(totalCash)} needed · Scenario A`;
      } else {
        pct=Number(g.targetAmount)?Math.min((Number(g.currentAmount||0)/Number(g.targetAmount))*100,100):0;
        const proj=goalProjection(g);
        sub=`${fmt(Number(g.currentAmount||0))} of ${fmt(Number(g.targetAmount||0))}${proj.projectedDate?" · "+proj.projectedDate:""}`;
      }
      color = pct>=100?"var(--color-success)":pct>=60?"var(--color-warning)":"var(--color-primary)";
      const barPct=Math.min(pct,100);
      return `
        <div class="overview-goal-row" data-future-tab="${g.id}">
          <span class="overview-row-icon">${g.icon||"🎯"}</span>
          <div class="overview-row-info">
            <div class="overview-row-name">${g.name}</div>
            <div class="overview-row-sub">${sub}</div>
            <div class="overview-mini-bar">
              <div class="progress-bar-track" style="height:5px;">
                <div class="progress-bar-fill" style="width:${barPct}%;background:${color};border-radius:3px;"></div>
              </div>
            </div>
          </div>
          <div class="overview-row-right">
            <div class="overview-row-pct" style="color:${color};">${pct.toFixed(0)}%</div>
            <div class="overview-row-arrow">›</div>
          </div>
        </div>`;
    }).join("");
    return `
      <div class="card" style="padding:0;overflow:hidden;">
        <div class="card-header" style="padding:14px 16px 12px;"><h2 class="card-title">Your Goals</h2></div>
        ${goals.length===0?'<p class="text-muted" style="padding:20px 16px;">No goals yet — add one below.</p>':`<div>${rows}</div>`}
      </div>`;
  }

  function renderEmergencyTab(g) {
    const isEditing = editingGoalId === g.id;
    const current   = Number(g.currentAmount||0);
    const baseline  = Number(g.baselineMonths||3);
    const goalMo    = Number(g.goalMonths||6);
    const baseTgt   = mustPayMonthly * baseline;
    const goalTgt   = mustPayMonthly * goalMo;
    const basePct   = baseTgt  ? Math.min((current/baseTgt)*100,100)  : 0;
    const goalPct   = goalTgt  ? Math.min((current/goalTgt)*100,100)  : 0;
    const color = goalPct>=100?"var(--color-success)":goalPct>=60?"var(--color-warning)":"var(--color-primary)";
    const MONTHS=[2,3,4,5,6,7,8];

    return `
      <div class="card">
        <div class="card-header"><h2 class="card-title">🛡️ Current Status</h2></div>
        <div class="card-body">
          <div class="stat-grid-2" style="margin-bottom:14px;">
            <div class="stat-tile"><div class="stat-tile-label">Currently Saved</div><div class="stat-tile-value" style="color:${color};">${fmt(current)}</div></div>
            <div class="stat-tile"><div class="stat-tile-label">Monthly Must-Pays</div><div class="stat-tile-value" style="color:var(--color-primary);">${fmt(mustPayMonthly)}</div></div>
          </div>
          ${mustPayMonthly===0?`<p style="font-size:12px;color:var(--color-warning);margin:0;">⚠️ Add Must-Pay bills in Admin to see coverage calculations.</p>`:""}
        </div>
      </div>
      <div class="card">
        <div class="card-header"><h2 class="card-title">📊 Coverage Range (2–8 months)</h2></div>
        <div class="card-body">
          ${MONTHS.map(mo=>{
            const tgt=mustPayMonthly*mo;
            const pct=tgt?Math.min((current/tgt)*100,100):0;
            const isBase=mo===baseline, isGoal=mo===goalMo;
            const barColor=isGoal?"var(--color-primary)":isBase?"var(--color-success)":"rgba(148,163,184,0.3)";
            const tag=isBase?" 🔒":isGoal?" 🎯":"";
            return `<div class="ef-month-bar-row"><span class="ef-month-label">${mo} mo${tag}</span><div class="progress-bar-track" style="flex:1;height:8px;"><div class="progress-bar-fill" style="width:${pct}%;background:${barColor};border-radius:4px;"></div></div><span class="ef-month-amount">${fmt(tgt)}</span></div>`;
          }).join("")}
        </div>
      </div>
      <div class="card">
        <div class="card-header"><h2 class="card-title">🎯 Your Targets</h2></div>
        <div class="card-body">
          ${[{label:`Baseline — ${baseline} months`,icon:"🔒",tgt:baseTgt,pct:basePct,color:"var(--color-success)"},{label:`Full Goal — ${goalMo} months`,icon:"🎯",tgt:goalTgt,pct:goalPct,color:"var(--color-primary)"}]
            .map(m=>`<div class="ef-milestone-row" style="margin-bottom:8px;"><span class="ef-milestone-icon">${m.icon}</span><div style="flex:1;"><div class="ef-milestone-label">${m.label}</div><div class="ef-milestone-sub">${m.pct<100?fmt(m.tgt-current)+" still needed":"✅ Achieved!"}</div></div><div style="text-align:right;"><div class="ef-milestone-value" style="color:${m.pct>=100?"var(--color-success)":m.color};">${fmt(m.tgt)}</div><div style="font-size:10px;color:var(--color-text-secondary);">${m.pct.toFixed(0)}% funded</div></div></div>`).join("")}
        </div>
      </div>
      ${isEditing ? `
      <div class="card">
        <div class="card-header"><h2 class="card-title">✏️ Update</h2></div>
        <div class="card-body">
          <div style="margin-bottom:12px;"><label class="goal-field-label">Currently Saved ($)</label><input class="goal-input" type="number" step="0.01" data-edit-field="currentAmount" value="${current}"></div>
          <div style="margin-bottom:12px;"><label class="goal-field-label">Baseline — minimum target (months of Must-Pays)</label><div class="ef-month-selector" id="efBaselineOpts">${MONTHS.map(mo=>`<span class="ef-month-opt${mo===baseline?" active-baseline":""}" data-ef-baseline="${mo}">${mo} mo</span>`).join("")}</div><input type="hidden" id="efBaselineVal" value="${baseline}"></div>
          <div style="margin-bottom:14px;"><label class="goal-field-label">Full Goal — stretch target (months of Must-Pays)</label><div class="ef-month-selector" id="efGoalOpts">${MONTHS.map(mo=>`<span class="ef-month-opt${mo===goalMo?" active-goal":""}" data-ef-goal="${mo}">${mo} mo</span>`).join("")}</div><input type="hidden" id="efGoalVal" value="${goalMo}"></div>
          <div class="goal-actions"><button class="admin-btn" data-goal-action="cancel-edit" data-id="${g.id}">Cancel</button><button class="admin-btn admin-btn-success" data-goal-action="save-ef" data-id="${g.id}">✓ Save</button></div>
        </div>
      </div>` : `<div style="display:flex;justify-content:center;"><button class="admin-btn" data-goal-action="edit" data-id="${g.id}">✏️ Update Savings & Targets</button></div>`}`;
  }

  function renderHomeTab(g) {
    const scenarios=g.scenarios||[{homePrice:225000,downPct:20},{homePrice:245000,downPct:20},{homePrice:265000,downPct:20}];
    const sc=scenarios[activeHomeScenario]||scenarios[0];
    const current=Number(g.currentSavings||0), netIncome=Number(g.monthlyNetIncome||0);
    const rate=Number(g.interestRate??6.25), years=Number(g.loanTermYears??30), hoaFee=Number(g.hoaFee??300);
    const propTaxRate=Number(g.propTaxRate??1.7), hoiRate=Number(g.hoiRate??0.5), pmiRate=Number(g.pmiRate??0.75);
    const lenderTitleRate=Number(g.lenderTitleRate??2.0), appraisal=Number(g.appraisal??600), inspection=Number(g.inspection??500);
    const countyTaxRate=Number(g.countyTaxRate??0.5), stateTaxRate=Number(g.stateTaxRate??0.75), mortgageTaxRate=Number(g.mortgageTaxRate??0.375);
    const prepaidRate=Number(g.prepaidEscrowRate??2.0), attorneyFees=Number(g.attorneyFees??750);
    const movingCost=Number(g.movingCost??1500), utilityDeposits=Number(g.utilityDeposits??350);
    const furnishingsRate=Number(g.furnishingsRate??2.0), repairsRate=Number(g.repairsRate??1.0), reserveMonths=Number(g.reserveMonths??3);
    const homePrice=Number(sc.homePrice||0), downPct=Number(sc.downPct||20);
    const downAmt=homePrice*downPct/100, loanAmt=homePrice-downAmt;
    const pi=calcMonthlyPayment(loanAmt,rate,years);
    const propTaxMo=homePrice*propTaxRate/100/12, hoiMo=homePrice*hoiRate/100/12, pmiMo=downPct<20?loanAmt*pmiRate/100/12:0;
    const total=pi+propTaxMo+hoiMo+pmiMo+hoaFee;
    const lenderTitle=homePrice*lenderTitleRate/100, countyTax=homePrice*countyTaxRate/100, stateTax=homePrice*stateTaxRate/100;
    const mortgageTax=loanAmt*mortgageTaxRate/100, prepaidEscrow=homePrice*prepaidRate/100;
    const totalClosing=lenderTitle+appraisal+inspection+countyTax+stateTax+mortgageTax+prepaidEscrow+attorneyFees;
    const furnishings=homePrice*furnishingsRate/100, repairs=homePrice*repairsRate/100;
    const totalMoveIn=movingCost+utilityDeposits+furnishings+repairs;
    const reserve=total*reserveMonths, totalCash=downAmt+totalClosing+totalMoveIn+reserve;
    const shortfall=Math.max(0,totalCash-current), cashPct=totalCash?Math.min((current/totalCash)*100,100):0;
    const cashColor=cashPct>=100?"var(--color-success)":cashPct>=60?"var(--color-warning)":"var(--color-primary)";
    const mustPay=(appSettings.recurringBills||[]).reduce((s,i)=>s+Number(i.budgetAmount||0),0);
    const subsPay=(appSettings.recurringSubscriptions||[]).reduce((s,i)=>s+Number(i.budgetAmount||0),0);
    function affordRow(label,deductions){const left=netIncome-deductions-total,can=left>=0;return`<div class="hp-afford-row"><span class="hp-afford-label">${label}</span><span class="hp-afford-value" style="color:${can?"var(--color-success)":"var(--color-danger)"};">${can?"✅ "+fmt(left)+" left":"❌ "+fmt(Math.abs(left))+" short"}</span></div>`;}
    function field(label,id,val,opts=""){return`<div><label class="hp-input-label">${label}</label><input class="goal-input" id="${id}" type="number" value="${val}" ${opts}></div>`;}
    function pctField(l,id,v){return field(l,id,v,'step="0.01" min="0"');}
    function dolField(l,id,v){return field(l,id,v,'step="50" min="0"');}

    return `
      <div class="card">
        <div class="card-header"><h2 class="card-title">🏡 Current Status</h2></div>
        <div class="card-body">
          <div class="stat-grid-2" style="margin-bottom:14px;">
            <div class="stat-tile"><div class="stat-tile-label">House Savings</div><div class="stat-tile-value" style="color:${cashColor};">${fmt(current)}</div></div>
            <div class="stat-tile"><div class="stat-tile-label">Net Income / mo</div><div class="stat-tile-value" style="color:var(--color-primary);">${netIncome>0?fmt(netIncome):"—"}</div></div>
          </div>
          ${totalCash>0?`<div class="progress-bar-track" style="height:9px;margin-bottom:6px;"><div class="progress-bar-fill" style="width:${cashPct}%;background:${cashColor};border-radius:4px;"></div></div><div style="display:flex;justify-content:space-between;align-items:center;"><span style="font-size:11px;color:var(--color-text-secondary);">${cashPct.toFixed(0)}% of total cash goal</span><span style="font-size:12px;font-weight:700;color:${shortfall>0?"var(--color-danger)":"var(--color-success)"};">${shortfall>0?"−"+fmt(shortfall)+" to go":"🎉 Goal Met!"}</span></div>`:`<p style="font-size:12px;color:var(--color-text-secondary);margin:0;">Enter a home price in Inputs to see progress.</p>`}
        </div>
      </div>
      <div class="card">
        <div class="card-header"><h2 class="card-title">🏠 Active Scenario</h2></div>
        <div class="card-body">
          <div class="hp-scenario-tabs">
            ${scenarios.map((s,i)=>`<div class="hp-scenario-tab${i===activeHomeScenario?" active":""}" data-goal-action="home-scenario" data-id="${g.id}" data-sc="${i}"><div style="font-size:10px;font-weight:800;letter-spacing:.5px;">${["A","B","C"][i]}</div><div style="font-size:12px;font-weight:700;">${fmt(s.homePrice||0)}</div><div style="font-size:10px;color:var(--color-text-secondary);">${s.downPct||20}% down</div></div>`).join("")}
          </div>
        </div>
      </div>
      <div class="card">
        <div class="card-header"><h2 class="card-title">📅 Monthly Payment</h2></div>
        <div class="card-body">
          ${[["Principal & Interest",pi],[`Property Tax (${propTaxRate}%/yr)`,propTaxMo],[`Homeowners Insurance (${hoiRate}%/yr)`,hoiMo],[`PMI (${pmiRate}%/yr)`+(downPct>=20?" — waived":""),pmiMo],["HOA / Condo Fee",hoaFee]]
            .map(([l,v])=>`<div class="hp-row"><span class="hp-row-label">${l}</span><span class="hp-row-value" style="${!v?"opacity:.3;":""}">${v>0?fmt(v):"—"}</span></div>`).join("")}
          <div class="hp-total-row"><span class="hp-total-label">Total Monthly</span><span class="hp-total-value">${fmt(total)}</span></div>
        </div>
      </div>
      <div class="card">
        <div class="card-header"><h2 class="card-title">💰 Cash Needed at Closing</h2></div>
        <div class="card-body">
          <div class="hp-section-title" style="margin-bottom:8px;">Down Payment</div>
          <div class="hp-row"><span class="hp-row-label">Down Payment (${downPct}%)</span><span class="hp-row-value">${fmt(downAmt)}</span></div>
          <div class="hp-section-title" style="margin:12px 0 8px;">Closing Costs</div>
          ${[[`Lender / Title (${lenderTitleRate}%)`,lenderTitle],["Appraisal",appraisal],["Home Inspection",inspection],[`County Transfer Tax (${countyTaxRate}%)`,countyTax],[`State Transfer Tax (${stateTaxRate}%)`,stateTax],[`Mortgage Recording Tax (${mortgageTaxRate}%)`,mortgageTax],[`Prepaid Escrow (${prepaidRate}%)`,prepaidEscrow],["Attorney Fees",attorneyFees]]
            .map(([l,v])=>`<div class="hp-row"><span class="hp-row-label">${l}</span><span class="hp-row-value">${fmt(v)}</span></div>`).join("")}
          <div class="hp-row" style="padding-top:5px;border-top:1px solid var(--color-border);margin-top:4px;"><span class="hp-row-label" style="font-weight:600;">Total Closing</span><span class="hp-row-value" style="color:var(--color-primary);">${fmt(totalClosing)}</span></div>
          <div class="hp-section-title" style="margin:12px 0 8px;">Move-In Costs</div>
          ${[["Moving / Movers",movingCost],["Utility Deposits",utilityDeposits],[`Furnishings (${furnishingsRate}%)`,furnishings],[`Immediate Repairs (${repairsRate}%)`,repairs]]
            .map(([l,v])=>`<div class="hp-row"><span class="hp-row-label">${l}</span><span class="hp-row-value">${fmt(v)}</span></div>`).join("")}
          <div class="hp-row" style="padding-top:5px;border-top:1px solid var(--color-border);margin-top:4px;"><span class="hp-row-label" style="font-weight:600;">Total Move-In</span><span class="hp-row-value" style="color:var(--color-primary);">${fmt(totalMoveIn)}</span></div>
          <div class="hp-section-title" style="margin:12px 0 8px;">Payment Reserve</div>
          <div class="hp-row"><span class="hp-row-label">${reserveMonths}-Month Buffer (${fmt(total)}/mo)</span><span class="hp-row-value">${fmt(reserve)}</span></div>
          <div class="hp-total-row" style="margin-top:8px;"><span class="hp-total-label">Total Cash Needed</span><span class="hp-total-value">${fmt(totalCash)}</span></div>
        </div>
      </div>
      <div class="card">
        <div class="card-header"><h2 class="card-title">✅ Can I Afford This?</h2></div>
        <div class="card-body">
          ${netIncome>0?`<p style="font-size:11px;color:var(--color-text-secondary);margin:0 0 10px;line-height:1.5;">${fmt(total)}/mo housing cost vs. ${fmt(netIncome)}/mo net income</p>${affordRow("Housing only",0)}${affordRow("Housing + required bills",mustPay)}${affordRow("Housing + bills + subs",mustPay+subsPay)}`:`<p style="font-size:12px;color:var(--color-text-secondary);margin:0;font-style:italic;">Enter your net income in Inputs below to see affordability.</p>`}
        </div>
      </div>
      <div class="card" style="border-color:rgba(106,166,255,0.18);">
        <div class="card-header" style="cursor:pointer;" data-goal-action="hp-toggle-inputs" data-id="${g.id}">
          <h2 class="card-title">⚙️ Inputs &amp; Assumptions</h2>
          <span style="font-size:12px;color:var(--color-text-secondary);user-select:none;">${hpInputsOpen?"▲ Collapse":"▼ Expand"}</span>
        </div>
        ${hpInputsOpen ? `
        <div class="card-body" style="display:flex;flex-direction:column;gap:14px;">
          <div><div class="hp-inputs-group-label">💼 My Numbers</div><div class="hp-inputs-grid-2">${dolField("Current House Savings ($)","hp-currentSavings",current)}${dolField("Monthly Net Income ($)","hp-netIncome",netIncome||"")}</div></div>
          <div><div class="hp-inputs-group-label">🏠 Scenarios</div>${scenarios.map((s,i)=>`<div class="hp-scenario-row"><span class="hp-scenario-label">${["A","B","C"][i]}</span><div style="flex:2;"><label class="hp-input-label">Home Price ($)</label><input class="goal-input" type="number" step="5000" id="hp-sc-price-${i}" value="${s.homePrice||225000}"></div><div style="flex:1;"><label class="hp-input-label">Down %</label><input class="goal-input" type="number" step="5" min="3" max="50" id="hp-sc-dpct-${i}" value="${s.downPct||20}"></div></div>`).join("")}</div>
          <div><div class="hp-inputs-group-label">🏦 Loan Terms</div><div class="hp-inputs-grid-3">${pctField("Rate (%)","hp-rate",rate)}${field("Term (yrs)","hp-years",years,'step="5" min="10" max="40"')}${dolField("HOA ($/mo)","hp-hoa",hoaFee)}</div></div>
          <div><div class="hp-inputs-group-label">📅 Monthly Assumptions</div><div class="hp-inputs-grid-3">${pctField("Prop Tax %/yr","hp-propTax",propTaxRate)}${pctField("HOI %/yr","hp-hoi",hoiRate)}${pctField("PMI %/yr","hp-pmi",pmiRate)}</div><div class="hp-inputs-note">PMI applies only when down payment &lt; 20%</div></div>
          <div><div class="hp-inputs-group-label">🔑 Closing Costs</div><div class="hp-inputs-grid-2">${pctField("Lender/Title %","hp-lenderTitle",lenderTitleRate)}${pctField("County Transfer %","hp-countyTax",countyTaxRate)}${pctField("State Transfer %","hp-stateTax",stateTaxRate)}${pctField("Mortgage Tax %","hp-mortgageTax",mortgageTaxRate)}${pctField("Prepaid Escrow %","hp-prepaid",prepaidRate)}${dolField("Appraisal ($)","hp-appraisal",appraisal)}${dolField("Inspection ($)","hp-inspection",inspection)}${dolField("Attorney Fees ($)","hp-attorney",attorneyFees)}</div></div>
          <div><div class="hp-inputs-group-label">📦 Move-In Costs</div><div class="hp-inputs-grid-2">${dolField("Moving ($)","hp-moving",movingCost)}${dolField("Utility Deposits ($)","hp-utilDeposits",utilityDeposits)}${pctField("Furnishings %","hp-furnishings",furnishingsRate)}${pctField("Repairs %","hp-repairs",repairsRate)}</div></div>
          <div><div class="hp-inputs-group-label">🛡️ Payment Reserve</div>${field("Reserve Buffer (months of total payment)","hp-reserveMonths",reserveMonths,'step="1" min="1" max="12"')}<div class="hp-inputs-note">Cash cushion to cover payments while settling in</div></div>
          <button class="btn btn-block" id="hp-saveNumbers" type="button" style="padding:11px;font-size:14px;font-weight:700;">✓ Save &amp; Recalculate</button>
        </div>` : ""}
      </div>`;
  }

  function renderGenericTab(g) {
    const isEditing=editingGoalId===g.id;
    const pct=Number(g.targetAmount)?Math.min((Number(g.currentAmount||0)/Number(g.targetAmount))*100,100):0;
    const color=pct>=100?"var(--color-success)":pct>=80?"var(--color-warning)":"var(--color-primary)";
    const proj=goalProjection(g);
    const remaining=Math.max(0,Number(g.targetAmount||0)-Number(g.currentAmount||0));
    return `
      <div class="card">
        <div class="card-header"><h2 class="card-title">${g.icon||"🎯"} Progress</h2></div>
        <div class="card-body">
          <div style="margin-bottom:14px;">
            <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:6px;"><span style="font-weight:700;color:${color};">${fmt(Number(g.currentAmount||0))}</span><span style="color:var(--color-text-secondary);">${fmt(Number(g.targetAmount||0))} goal</span></div>
            <div class="progress-bar-track" style="height:10px;"><div class="progress-bar-fill" style="width:${pct}%;background:${color};border-radius:5px;"></div></div>
            <div style="text-align:center;margin-top:8px;font-size:20px;font-weight:800;color:${color};">${pct.toFixed(1)}%</div>
          </div>
          <div class="goal-stats-grid">
            <div class="goal-stat-tile"><div class="goal-stat-label">Remaining</div><div class="goal-stat-value">${fmt(remaining)}</div></div>
            <div class="goal-stat-tile"><div class="goal-stat-label">Monthly Contribution</div><div class="goal-stat-value">${g.monthlyContribution?fmt(g.monthlyContribution):"—"}</div></div>
            <div class="goal-stat-tile"><div class="goal-stat-label">Projected Completion</div><div class="goal-stat-value" style="font-size:13px;line-height:1.2;">${proj.projectedDate}</div></div>
            <div class="goal-stat-tile"><div class="goal-stat-label">${g.targetDate?"Target Date":"Months to Goal"}</div><div class="goal-stat-value">${g.targetDate?g.targetDate:(proj.monthsLeft!==null?proj.monthsLeft:"—")}</div></div>
          </div>
          ${g.note?`<div class="goal-note" style="margin-top:12px;">${g.note}</div>`:""}
        </div>
      </div>
      ${isEditing?`
      <div class="card">
        <div class="card-header"><h2 class="card-title">✏️ Edit Goal</h2></div>
        <div class="card-body">
          <div class="goal-edit-grid">
            <div><label class="goal-field-label">Current Saved ($)</label><input class="goal-input" type="number" step="0.01" data-edit-field="currentAmount" value="${g.currentAmount||0}"></div>
            <div><label class="goal-field-label">Goal Target ($)</label><input class="goal-input" type="number" step="0.01" data-edit-field="targetAmount" value="${g.targetAmount||0}"></div>
            <div><label class="goal-field-label">Monthly Contribution ($)</label><input class="goal-input" type="number" step="0.01" data-edit-field="monthlyContribution" value="${g.monthlyContribution||0}"></div>
            <div><label class="goal-field-label">Target Date (optional)</label><input class="goal-input" type="month" data-edit-field="targetDate" value="${g.targetDate||""}"></div>
            <div class="full"><label class="goal-field-label">Goal Name</label><input class="goal-input" type="text" data-edit-field="name" value="${g.name||""}"></div>
            <div class="full"><label class="goal-field-label">Note (optional)</label><input class="goal-input" type="text" data-edit-field="note" value="${g.note||""}" placeholder="Any helpful context"></div>
          </div>
          <div class="goal-actions" style="margin-top:10px;">
            <button class="admin-btn admin-btn-danger" data-goal-action="delete" data-id="${g.id}">🗑️ Delete</button>
            <button class="admin-btn" data-goal-action="cancel-edit" data-id="${g.id}">Cancel</button>
            <button class="admin-btn admin-btn-success" data-goal-action="save-edit" data-id="${g.id}">✓ Save</button>
          </div>
        </div>
      </div>`:`
      <div style="display:flex;justify-content:center;gap:8px;">
        <button class="admin-btn" data-goal-action="edit" data-id="${g.id}">✏️ Edit Goal</button>
        <button class="admin-btn admin-btn-danger" style="padding:6px 12px;" data-goal-action="delete" data-id="${g.id}">🗑️ Delete</button>
      </div>`}`;
  }

  const ICONS = ["🎯","🛡️","🏖️","🏠","🚗","✈️","💍","🎓","💼","🌟","🏥","📦","🌴","💡","🐾"];
  let tabContent = "";

  if (futureActiveTab === "overview") {
    tabContent = renderOverview();
  } else {
    const g = goals.find(g=>g.id===futureActiveTab);
    if (g) {
      if      (g.type==="emergency") tabContent = renderEmergencyTab(g);
      else if (g.type==="home")      tabContent = renderHomeTab(g);
      else                           tabContent = renderGenericTab(g);
    }
  }

  const addGoalSection = `
    <div id="newGoalFormWrap"></div>
    <div class="goal-add-card" id="addGoalBtn">
      <div style="font-size:24px;">＋</div>
      <div class="goal-add-label">Add a custom long-term goal</div>
    </div>`;

  container.innerHTML = tabNav + tabContent + (futureActiveTab==="overview" ? addGoalSection : "");

  container.querySelectorAll("[data-future-tab]").forEach(el => {
    el.addEventListener("click", () => {
      futureActiveTab = el.dataset.futureTab;
      editingGoalId = null;
      renderAnnualView();
    });
  });

  const formWrap = document.getElementById("newGoalFormWrap");
  if (formWrap) {
    document.getElementById("addGoalBtn")?.addEventListener("click", () => {
      let selectedIcon = "🎯";
      formWrap.innerHTML = `
        <div class="goal-new-form">
          <div class="goal-new-form-title">New Goal</div>
          <label class="goal-field-label">Pick an icon</label>
          <div class="goal-icon-picker" id="iconPicker">${ICONS.map(ic=>`<span class="goal-icon-opt${ic===selectedIcon?" selected":""}" data-icon="${ic}">${ic}</span>`).join("")}</div>
          <div class="goal-edit-grid" style="margin-top:6px;">
            <div class="full"><label class="goal-field-label">Goal Name</label><input class="goal-input" id="newGoalName" type="text" placeholder="e.g. Vacation Fund"></div>
            <div><label class="goal-field-label">Current Saved ($)</label><input class="goal-input" id="newGoalCurrent" type="number" step="0.01" placeholder="0"></div>
            <div><label class="goal-field-label">Target Amount ($)</label><input class="goal-input" id="newGoalTarget" type="number" step="0.01" placeholder="10000"></div>
            <div><label class="goal-field-label">Monthly Contribution ($)</label><input class="goal-input" id="newGoalMonthly" type="number" step="0.01" placeholder="100"></div>
            <div><label class="goal-field-label">Target Date (optional)</label><input class="goal-input" id="newGoalDate" type="month"></div>
            <div class="full"><label class="goal-field-label">Note (optional)</label><input class="goal-input" id="newGoalNote" type="text" placeholder="Any helpful context"></div>
          </div>
          <div class="goal-actions">
            <button class="admin-btn" id="cancelNewGoal">Cancel</button>
            <button class="admin-btn admin-btn-success" id="saveNewGoal">＋ Add Goal</button>
          </div>
        </div>`;
      document.getElementById("iconPicker").addEventListener("click", e => {
        const opt = e.target.closest("[data-icon]"); if (!opt) return;
        selectedIcon = opt.dataset.icon;
        document.querySelectorAll(".goal-icon-opt").forEach(el=>el.classList.toggle("selected",el.dataset.icon===selectedIcon));
      });
      document.getElementById("cancelNewGoal").addEventListener("click",()=>{ formWrap.innerHTML=""; });
      document.getElementById("saveNewGoal").addEventListener("click",()=>{
        const name=document.getElementById("newGoalName").value.trim();
        if (!name){alert("Please enter a goal name.");return;}
        const newGoal={id:uid(),type:"generic",name,icon:selectedIcon,
          currentAmount:Number(document.getElementById("newGoalCurrent").value||0),
          targetAmount:Number(document.getElementById("newGoalTarget").value||0),
          monthlyContribution:Number(document.getElementById("newGoalMonthly").value||0),
          targetDate:document.getElementById("newGoalDate").value||"",
          note:document.getElementById("newGoalNote").value.trim()};
        plannerState.goals.push(newGoal);
        futureActiveTab = newGoal.id;
        saveState(); renderAnnualView();
      });
    });
  }

  document.getElementById("hp-saveNumbers")?.addEventListener("click", () => {
    const g = plannerState.goals.find(g=>g.id===futureActiveTab && g.type==="home") || plannerState.goals.find(g=>g.type==="home");
    if (!g) return;
    const v = id => Number(document.getElementById(id)?.value || 0);
    g.currentSavings=v("hp-currentSavings"); g.monthlyNetIncome=v("hp-netIncome");
    g.interestRate=v("hp-rate")||6.25; g.loanTermYears=v("hp-years")||30; g.hoaFee=v("hp-hoa");
    g.propTaxRate=v("hp-propTax")||1.7; g.hoiRate=v("hp-hoi")||0.5; g.pmiRate=v("hp-pmi")||0.75;
    g.lenderTitleRate=v("hp-lenderTitle")||2.0; g.appraisal=v("hp-appraisal"); g.inspection=v("hp-inspection");
    g.countyTaxRate=v("hp-countyTax"); g.stateTaxRate=v("hp-stateTax"); g.mortgageTaxRate=v("hp-mortgageTax");
    g.prepaidEscrowRate=v("hp-prepaid"); g.attorneyFees=v("hp-attorney"); g.movingCost=v("hp-moving");
    g.utilityDeposits=v("hp-utilDeposits"); g.furnishingsRate=v("hp-furnishings"); g.repairsRate=v("hp-repairs");
    g.reserveMonths=v("hp-reserveMonths")||3;
    if (g.scenarios) { g.scenarios.forEach((s,i)=>{ const p=document.getElementById("hp-sc-price-"+i), d=document.getElementById("hp-sc-dpct-"+i); if(p)s.homePrice=Number(p.value||0); if(d)s.downPct=Number(d.value||20); }); }
    saveState(); renderAnnualView();
  });

  document.getElementById("efBaselineOpts")?.addEventListener("click",e=>{
    const opt=e.target.closest("[data-ef-baseline]"); if(!opt)return;
    const v=opt.dataset.efBaseline;
    document.getElementById("efBaselineVal").value=v;
    document.querySelectorAll("[data-ef-baseline]").forEach(el=>el.classList.toggle("active-baseline",el.dataset.efBaseline===v));
  });
  document.getElementById("efGoalOpts")?.addEventListener("click",e=>{
    const opt=e.target.closest("[data-ef-goal]"); if(!opt)return;
    const v=opt.dataset.efGoal;
    document.getElementById("efGoalVal").value=v;
    document.querySelectorAll("[data-ef-goal]").forEach(el=>el.classList.toggle("active-goal",el.dataset.efGoal===v));
  });
}

function handleFutureClick(e) {
  const btn=e.target.closest("[data-goal-action]"); if(!btn)return;
  const action=btn.dataset.goalAction, id=btn.dataset.id;
  if (action==="home-scenario")    { activeHomeScenario=Number(btn.dataset.sc||0); renderAnnualView(); return; }
  if (action==="hp-toggle-inputs") { hpInputsOpen=!hpInputsOpen; renderAnnualView(); return; }
  if (action==="edit")        { editingGoalId=id;   renderAnnualView(); return; }
  if (action==="cancel-edit") { editingGoalId=null;  renderAnnualView(); return; }
  if (action==="save-ef") {
    const g=plannerState.goals.find(g=>g.id===id); if(!g)return;
    const av=document.getElementById("annualView");
    g.currentAmount  = Number(av.querySelector("[data-edit-field='currentAmount']")?.value||0);
    g.baselineMonths = Number(document.getElementById("efBaselineVal")?.value||3);
    g.goalMonths     = Number(document.getElementById("efGoalVal")?.value||6);
    editingGoalId=null; saveState(); renderAnnualView(); return;
  }
  if (action==="save-edit") {
    const av=document.getElementById("annualView");
    const g=plannerState.goals.find(g=>g.id===id); if(!g)return;
    g.currentAmount=Number(av.querySelector("[data-edit-field='currentAmount']")?.value||0);
    g.targetAmount=Number(av.querySelector("[data-edit-field='targetAmount']")?.value||0);
    g.monthlyContribution=Number(av.querySelector("[data-edit-field='monthlyContribution']")?.value||0);
    g.targetDate=av.querySelector("[data-edit-field='targetDate']")?.value||"";
    g.name=av.querySelector("[data-edit-field='name']")?.value.trim()||g.name;
    g.note=av.querySelector("[data-edit-field='note']")?.value.trim()||"";
    editingGoalId=null; saveState(); renderAnnualView(); return;
  }
  if (action==="delete") {
    if(!confirm("Delete this goal?"))return;
    plannerState.goals=plannerState.goals.filter(g=>g.id!==id);
    futureActiveTab="overview"; saveState(); renderAnnualView(); return;
  }
}

// ─────────────────────────────────────────
//  ADMIN VIEW
// ─────────────────────────────────────────

function renderAdminView() {
  const container = document.getElementById("adminView");
  const bills  = appSettings.recurringBills          || [];
  const subs   = appSettings.recurringSubscriptions  || [];
  const invsts = appSettings.recurringInvestments    || [];
  const disc   = appSettings.discretionaryCategories || [];

  // Build storage layer badges
  const layerBadges = `
    <div class="storage-layer-row">
      <div class="storage-layer-badge ${opfsAvailable ? "slb-active" : "slb-inactive"}">
        <span class="slb-dot"></span> OPFS ${opfsAvailable ? "✓" : "(unavailable)"}
      </div>
      <div class="storage-layer-badge slb-active">
        <span class="slb-dot"></span> IndexedDB ✓
      </div>
      <div class="storage-layer-badge slb-active">
        <span class="slb-dot"></span> localStorage ✓
      </div>
    </div>`;

  container.innerHTML = `

    <div class="card">
      <div class="card-header"><h2 class="card-title">💾 Data Management</h2></div>
      <div class="card-body">

        ${IS_STANDALONE ? `
          <div class="storage-mode-tile ${opfsAvailable ? "smt-opfs" : "smt-pwa"}">
            <span class="smt-icon">${opfsAvailable ? "🔒" : "🏠"}</span>
            <div class="smt-body">
              <div class="smt-title">${opfsAvailable ? "OPFS + Installed App (Best Protection)" : "Installed App (Protected)"}</div>
              <div class="smt-sub">${opfsAvailable
                ? "Your data is written to the Origin Private File System — the most durable local storage available on iOS. Data is additionally mirrored to IndexedDB and localStorage as fallbacks."
                : "Your data is stored inside the installed app — protected from the 7-day inactivity wipe. Export a backup periodically as a safety net."}</div>
            </div>
          </div>
        ` : `
          <div class="storage-mode-tile ${opfsAvailable ? "smt-opfs" : "smt-browser"}">
            <span class="smt-icon">${opfsAvailable ? "🔒" : "🌐"}</span>
            <div class="smt-body">
              <div class="smt-title">${opfsAvailable ? "OPFS Active (Good Protection)" : "Safari Storage (At Risk)"}</div>
              <div class="smt-sub">${opfsAvailable
                ? "Your data is in the Origin Private File System — more durable than standard Safari storage, but still subject to iOS eviction if your device runs critically low on storage. Install to Home Screen + regular exports for maximum safety."
                : "Your data is in Safari's temporary memory. iOS can delete it if you haven't opened the app in 7+ days, clear browsing history, or run low on device storage."}</div>
            </div>
          </div>
          ${!opfsAvailable ? `<div class="install-steps"><strong>Protect your data →</strong> tap <strong>Share ⬆</strong> in Safari, then <strong>"Add to Home Screen"</strong>. Free, takes 10 seconds, and removes the 7-day data timer.</div>` : ""}
        `}

        <div style="margin-bottom:12px;">
          <div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--color-text-secondary);margin-bottom:6px;">Active Storage Layers</div>
          ${layerBadges}
          <div style="font-size:10px;color:var(--color-text-secondary);margin-top:5px;line-height:1.4;">
            ${opfsAvailable
              ? "Data is written to all three layers on every save. If one layer fails or is evicted, the others remain."
              : "OPFS requires iOS 16.4+. Install the app to Home Screen to maximize storage durability."}
          </div>
        </div>

        <div class="backup-status-row">
          <span class="backup-status-label">Last backed up</span>
          <span class="backup-status-value ${lastExportedAt ? "backed" : "not-backed"}">
            ${lastExportedAt
              ? "✓ " + timeAgo(lastExportedAt) + " · " + lastExportedAt.toLocaleDateString(undefined, { month: "short", day: "numeric" })
              : "⚠ None this session"}
          </span>
        </div>

        <button class="btn" id="adminSnapshotBtn" type="button" style="width:100%;margin-bottom:10px;">📤 Export Backup</button>
        <p style="font-size:11px;color:var(--color-text-secondary);margin:-4px 0 12px;line-height:1.5;text-align:center;">
          Opens the share sheet — save to Files or iCloud.<br>

          You can safely delete old backups from the Files app.
        </p>
        <button class="btn btn-ghost" id="adminImportBtn" type="button" style="width:100%;font-size:13px;">📥 Restore from Backup File</button>

      </div>
    </div>

    <div class="card">
      <div class="card-header"><h2 class="card-title">✏️ Edit Budget</h2></div>
      <div class="card-body">
        ${renderAdminBudgetSection("bills",  "🏠 Must Pay Bills",            bills,  false)}
        ${renderAdminBudgetSection("subs",   "📱 Subs &amp; Other",          subs,   false)}
        ${renderAdminBudgetSection("invsts", "💰 Savings", invsts, false)}
        ${renderAdminBudgetSection("disc",   "🛍️ Discretionary Categories", disc,   true)}
      </div>
    </div>
  `;
}

function renderAdminBudgetSection(section, title, items, isDisc) {
  const collapsed = collapsedAdminSections.has(section);
  const total = items.reduce((s, i) => s + Number(i.budgetAmount || 0), 0);
  const meta  = isDisc
    ? `${items.length} categor${items.length !== 1 ? "ies" : "y"}`
    : `${items.length} item${items.length !== 1 ? "s" : ""} · ${fmt(total)}/mo`;

  return `
    <div class="admin-section" style="margin-bottom:4px;">
      <div class="admin-section-header" data-toggle="${section}">
        <div class="admin-section-left">
          <span class="admin-section-title">${title}</span>
          <span class="admin-section-meta">${meta}</span>
        </div>
        <span class="admin-section-toggle">${collapsed ? "▶" : "▼"}</span>
      </div>
      ${collapsed ? "" : `
        <div class="admin-section-body">
          ${isDisc ? `<p style="font-size:11px;color:var(--color-text-secondary);margin:0 0 8px;line-height:1.5;">These categories appear in the Log tab dropdown. Setting a budget enables progress tracking.</p>` : ""}
          ${items.length === 0
            ? `<p class="empty-bucket" style="padding:8px 0 4px;">No items yet — add one below.</p>`
            : items.map(item => renderAdminBudgetItemRow(section, item, isDisc)).join("")}
          <div class="admin-add-row" data-section="${section}">
            <input class="admin-input admin-add-name" type="text" placeholder="${isDisc ? "Category name" : "Item name"}" style="flex:1;min-width:120px;">
            <input class="admin-input admin-add-budget" type="number" placeholder="${isDisc ? "$ budget (opt)" : "$ budget"}" style="width:110px;">
            <button class="admin-btn admin-btn-success" data-action="add" data-section="${section}">+ Add</button>
          </div>
        </div>`}
    </div>`;
}

function renderAdminBudgetItemRow(section, item, isDisc) {
  const editing = editingBudgetItem?.section === section && editingBudgetItem?.id === item.id;
  if (editing) {
    return `
      <div class="admin-item-edit-row" data-id="${item.id}">
        <input class="admin-input admin-edit-name" type="text" value="${item.name}" placeholder="Name" style="flex:1;min-width:120px;">
        <input class="admin-input admin-edit-budget" type="number" value="${item.budgetAmount || ""}" placeholder="${isDisc ? "$ budget (opt)" : "$ budget"}" style="width:110px;">
        <button class="admin-btn admin-btn-success" data-action="save" data-section="${section}" data-id="${item.id}">✓ Save</button>
        <button class="admin-btn" data-action="cancel">✕</button>
      </div>`;
  }
  const budgetDisplay = item.budgetAmount ? fmt(item.budgetAmount) : (isDisc ? "No budget" : "—");
  return `
    <div class="admin-item-row">
      <div class="admin-item-name">${item.name}</div>
      <div class="admin-item-budget" style="${!item.budgetAmount && isDisc ? "color:var(--color-text-secondary);font-weight:400;" : ""}">${budgetDisplay}</div>
      <div style="display:flex;gap:6px;flex-shrink:0;">
        <button class="admin-btn"                  data-action="edit"   data-section="${section}" data-id="${item.id}">✏️</button>
        <button class="admin-btn admin-btn-danger"  data-action="delete" data-section="${section}" data-id="${item.id}">🗑️</button>
      </div>
    </div>`;
}

function handleAdminClick(e) {
  const t = e.target;
  const toggle = t.closest("[data-toggle]");
  if (toggle) { const s=toggle.dataset.toggle; collapsedAdminSections.has(s)?collapsedAdminSections.delete(s):collapsedAdminSections.add(s); renderAdminView(); return; }
  const editBtn = t.closest("[data-action='edit']");
  if (editBtn) { editingBudgetItem={section:editBtn.dataset.section,id:editBtn.dataset.id}; renderAdminView(); return; }
  const cancelBtn = t.closest("[data-action='cancel']");
  if (cancelBtn) { editingBudgetItem=null; renderAdminView(); return; }
  const saveBtn = t.closest("[data-action='save']");
  if (saveBtn) {
    const {section,id}=saveBtn.dataset;
    const row=document.querySelector(`.admin-item-edit-row[data-id="${id}"]`); if(!row)return;
    const name=row.querySelector(".admin-edit-name").value.trim();
    const budget=Number(row.querySelector(".admin-edit-budget").value||0);
    if(!name){alert("Please enter a name.");return;}
    const item=getSectionArray(section).find(i=>i.id===id);
    if(item){item.name=name;item.budgetAmount=budget;}
    editingBudgetItem=null; saveState(); renderAdminView(); return;
  }
  const deleteBtn = t.closest("[data-action='delete']");
  if (deleteBtn) {
    const {section,id}=deleteBtn.dataset;
    if(!confirm("Delete this item?"))return;
    const arr=getSectionArray(section), idx=arr.findIndex(i=>i.id===id);
    if(idx!==-1)arr.splice(idx,1);
    saveState(); renderAdminView(); return;
  }
  const addBtn = t.closest("[data-action='add']");
  if (addBtn) {
    const section=addBtn.dataset.section;
    const row=document.querySelector(`.admin-add-row[data-section="${section}"]`); if(!row)return;
    const name=row.querySelector(".admin-add-name").value.trim();
    const budget=Number(row.querySelector(".admin-add-budget").value||0);
    if(!name){alert("Please enter a name.");return;}
    getSectionArray(section).push({id:uid(),name,budgetAmount:budget});
    saveState(); renderAdminView(); return;
  }
}

// ─────────────────────────────────────────
//  INIT
// ─────────────────────────────────────────

document.addEventListener("DOMContentLoaded", async () => {
  document.querySelectorAll(".nav-btn").forEach(btn =>
    btn.addEventListener("click", () => switchView(btn.dataset.view))
  );

  const imp = document.getElementById("importFileInput");
  imp.addEventListener("change", e => {
    const f = e.target.files?.[0];
    if (f) importStateFromFile(f);
    imp.value = "";
  });

  document.getElementById("adminView").addEventListener("click", e => {
    const t = e.target;
    if (t.id === "adminSnapshotBtn") { handleBackupButtonClick(); return; }
    if (t.id === "adminImportBtn")   { document.getElementById("importFileInput").click(); return; }
    handleAdminClick(e);
  });
  document.getElementById("annualView").addEventListener("click", handleFutureClick);

  await loadState();
});
</script>
</body>
</html>
